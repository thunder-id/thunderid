{{- if .Values.setup.enabled }}
{{- $usingSqlite := or (eq .Values.configuration.database.config.type "sqlite") (eq .Values.configuration.database.runtime.type "sqlite") (eq .Values.configuration.database.user.type "sqlite") (and .Values.configuration.consent.enabled (eq .Values.configuration.consent.database.type "sqlite")) }}
{{- if and .Values.declarativeResources.enabled .Values.declarativeResources.configMap.name .Values.declarativeResources.secret.name }}
{{- fail "Invalid declarativeResources configuration: set only one source, declarativeResources.configMap.name or declarativeResources.secret.name." }}
{{- end }}
{{- if and .Values.declarativeResources.enabled (not .Values.declarativeResources.configMap.name) (not .Values.declarativeResources.secret.name) }}
{{- fail "Invalid declarativeResources configuration: set declarativeResources.configMap.name or declarativeResources.secret.name when declarativeResources.enabled=true." }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "thunderid.fullname" . }}-setup
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderid.labels" . | nindent 4 }}
    app.kubernetes.io/component: setup
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-5"
    {{- if not .Values.setup.preserveJob }}
    "helm.sh/hook-delete-policy": hook-succeeded
    {{- end }}
spec:
  completions: 1
  parallelism: 1
  backoffLimit: {{ .Values.setup.backoffLimit }}
  {{- if not .Values.setup.preserveJob }}
  ttlSecondsAfterFinished: {{ .Values.setup.ttlSecondsAfterFinished }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "thunderid.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: setup
      annotations:
        checksum.deployment.yaml: {{ include (print $.Template.BasePath "/setup-config-map.yaml") . | sha256sum }}
        {{- if include "thunderid.shouldIncludeSecretChecksum" . }}
        checksum.secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "thunderid.serviceAccountName" . }}
      restartPolicy: OnFailure
      securityContext:
        {{- if .Values.deployment.securityContext.enableRunAsUser }}
        runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
        {{- end }}
        {{- if .Values.deployment.securityContext.enableRunAsGroup }}
        runAsGroup: {{ .Values.deployment.securityContext.runAsGroup }}
        {{- end }}
        {{- if .Values.deployment.securityContext.enableFsGroup }}
        fsGroup: {{ .Values.deployment.securityContext.fsGroup }}
        {{- end }}
        {{- if .Values.deployment.securityContext.seccompProfile.enabled }}
        seccompProfile:
          type: {{ .Values.deployment.securityContext.seccompProfile.type }}
        {{- end }}
      {{- if .Values.deployment.image.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.deployment.image.imagePullSecret }}
      {{- end }}
      {{- if or .Values.persistence.enabled $usingSqlite }}
      initContainers:
        - name: init-database
          {{- if .Values.deployment.image.digest }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}@{{ .Values.deployment.image.digest }}
          {{- else }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}:{{ default "latest" .Values.deployment.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            {{- if .Values.deployment.securityContext.enableRunAsUser }}
            runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
            runAsGroup: {{ .Values.deployment.securityContext.runAsUser }}
            {{- end }}
            capabilities:
              drop:
                - ALL
          command: ['sh', '-c']
          args:
            - |
              if [ ! -f /data/.initialized ]; then
                echo "Copying database directory from image..."
                cp -r /opt/thunderid/database/* /data/
                touch /data/.initialized
                echo "Database initialization complete"
              else
                echo "Database already initialized"
              fi
              {{- if and .Values.configuration.consent.enabled (eq .Values.configuration.consent.database.type "sqlite") }}
              if [ ! -f /data/consent/consentdb.db ]; then
                echo "Copying consent database from image..."
                mkdir -p /data/consent
                if [ -d /opt/thunderid/consent/repository/database ]; then
                  cp -r /opt/thunderid/consent/repository/database/* /data/consent/
                  echo "Consent database initialization complete"
                else
                  echo "Error: consent database source directory not found" >&2
                  exit 1
                fi
              else
                echo "Consent database already initialized"
              fi
              {{- end }}
          volumeMounts:
            - name: database-storage
              mountPath: /data
      {{- end }}
      containers:
        - name: setup
          {{- if .Values.deployment.image.digest }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}@{{ .Values.deployment.image.digest }}
          {{- else }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}:{{ default "latest" .Values.deployment.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          command: ["./setup.sh"]
          {{- if .Values.setup.args }}
          args:
            {{- toYaml .Values.setup.args | nindent 12 }}
          {{- end }}
          env:
            {{- if .Values.setup.debug }}
            - name: DEBUG
              value: "true"
            {{- end }}
            {{- if .Values.configuration.consent.enabled }}
            - name: WITH_CONSENT
              value: "true"
            {{- else }}
            - name: WITH_CONSENT
              value: "false"
            {{- end }}
            - name: ADMIN_USERNAME
              value: {{ .Values.setup.admin.username | quote }}
            {{- if and .Values.setup.admin.passwordRef.key (not .Values.setup.admin.passwordRef.name) }}
            {{- fail "setup.admin.passwordRef.name is required when setup.admin.passwordRef.key is set" }}
            {{- end }}
            {{- if .Values.setup.admin.passwordRef.name }}
            {{- if not .Values.setup.admin.passwordRef.key }}
            {{- fail "setup.admin.passwordRef.key is required when setup.admin.passwordRef.name is set" }}
            {{- end }}
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.setup.admin.passwordRef.name | quote }}
                  key: {{ .Values.setup.admin.passwordRef.key | quote }}
            {{- else }}
            - name: ADMIN_PASSWORD
              value: {{ .Values.setup.admin.password | quote }}
            {{- end }}
            {{- include "thunderid.databasePasswordEnvVars" . | nindent 12 }}
            {{- include "thunderid.secretEnvVars" (dict "secretEnv" .Values.setup.secretEnv) | nindent 12 }}
            {{- include "thunderid.cacheRedisPasswordEnvVars" . | nindent 12 }}
            {{- if .Values.setup.env }}
            {{- toYaml .Values.setup.env | nindent 12 }}
            {{- end }}
          resources:
            requests:
              memory: {{ .Values.setup.resources.requests.memory }}
              cpu: {{ .Values.setup.resources.requests.cpu }}
            limits:
              memory: {{ .Values.setup.resources.limits.memory }}
              cpu: {{ .Values.setup.resources.limits.cpu }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.deployment.securityContext.readOnlyRootFilesystem }}
            runAsNonRoot: true
            {{- if .Values.deployment.securityContext.enableRunAsUser }}
            runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
            {{- end }}
            capabilities:
              drop:
                - all
          volumeMounts:
            {{- if or .Values.persistence.enabled $usingSqlite }}
            - name: database-storage
              mountPath: /opt/thunderid/database
            {{- end }}
            {{- if and .Values.configuration.consent.enabled (eq .Values.configuration.consent.database.type "sqlite") }}
            - name: database-storage
              mountPath: /opt/thunderid/consent/repository/database
              subPath: consent
            {{- end }}
            - name: deployment-yaml-volume
              mountPath: /opt/thunderid/deployment.yaml
              subPath: deployment.yaml
            {{- if .Values.configuration.consent.enabled }}
            - name: deployment-yaml-volume
              mountPath: /opt/thunderid/consent/repository/conf/deployment.yaml
              subPath: consent-deployment.yaml
            {{- end }}
            {{- /* Validate bootstrap configuration - patterns are mutually exclusive */ -}}
            {{- if and .Values.bootstrap.scripts .Values.bootstrap.configMap.name }}
            {{- fail "\n\n❌ ERROR: Invalid bootstrap configuration detected!\n\nYou cannot use both 'bootstrap.scripts' and 'bootstrap.configMap' at the same time." }}
            {{- end }}
            {{- if or .Values.bootstrap.scripts .Values.bootstrap.configMap.name }}
            {{- if and .Values.bootstrap.configMap.name (not .Values.bootstrap.configMap.files) }}
            # Pattern 3: Replace entire bootstrap directory (configMap without files list)
            - name: bootstrap-scripts
              mountPath: /opt/thunderid/bootstrap
            {{- else }}
            # Pattern 1 & 2: Mount individual scripts to preserve defaults

            # Pattern 1: Inline scripts from values.yaml
            {{- if .Values.bootstrap.scripts }}
            {{- range $filename, $content := .Values.bootstrap.scripts }}
            - name: bootstrap-scripts
              mountPath: /opt/thunderid/bootstrap/{{ $filename }}
              subPath: {{ $filename }}
            {{- end }}
            {{- end }}

            # Pattern 2: External ConfigMap with file list
            {{- if and .Values.bootstrap.configMap.name .Values.bootstrap.configMap.files }}
            {{- range .Values.bootstrap.configMap.files }}
            - name: bootstrap-scripts
              mountPath: /opt/thunderid/bootstrap/{{ . }}
              subPath: {{ . }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.setup.extraVolumeMounts }}
            {{- toYaml .Values.setup.extraVolumeMounts | nindent 12 }}
            {{- end }}
            {{- if .Values.declarativeResources.enabled }}
            {{- if and .Values.declarativeResources.configMap.name .Values.declarativeResources.configMap.items }}
{{ include "thunderid.declarativeResourceVolumeMounts" (dict "items" .Values.declarativeResources.configMap.items "field" "declarativeResources.configMap.items" "mountPath" .Values.declarativeResources.mountPath "readOnly" .Values.declarativeResources.readOnly) | nindent 12 }}
            {{- else if and .Values.declarativeResources.secret.name .Values.declarativeResources.secret.items }}
{{ include "thunderid.declarativeResourceVolumeMounts" (dict "items" .Values.declarativeResources.secret.items "field" "declarativeResources.secret.items" "mountPath" .Values.declarativeResources.mountPath "readOnly" .Values.declarativeResources.readOnly) | nindent 12 }}
            {{- else }}
            - name: declarative-resources
              mountPath: {{ .Values.declarativeResources.mountPath }}
              readOnly: {{ .Values.declarativeResources.readOnly }}
            {{- end }}
            {{- end }}
      volumes:
        {{- if or .Values.persistence.enabled $usingSqlite }}
        - name: database-storage
          persistentVolumeClaim:
            claimName: {{ include "thunderid.fullname" . }}-database-pvc
        {{- end }}
        - name: deployment-yaml-volume
          configMap:
            name: {{ include "thunderid.fullname" . }}-setup-config-map
        {{- if or .Values.bootstrap.scripts .Values.bootstrap.configMap.name }}
        - name: bootstrap-scripts
          configMap:
            name: {{ if .Values.bootstrap.configMap.name }}{{ .Values.bootstrap.configMap.name }}{{ else }}{{ include "thunderid.fullname" . }}-bootstrap{{ end }}
            defaultMode: 0755
        {{- end }}
        {{- if .Values.setup.extraVolumes }}
        {{- toYaml .Values.setup.extraVolumes | nindent 8 }}
        {{- end }}
        {{- if .Values.declarativeResources.enabled }}
        - name: declarative-resources
          {{- if .Values.declarativeResources.configMap.name }}
          configMap:
            name: {{ .Values.declarativeResources.configMap.name }}
            {{- if .Values.declarativeResources.configMap.items }}
            items:
{{ include "thunderid.declarativeResourceItems" (dict "items" .Values.declarativeResources.configMap.items "field" "declarativeResources.configMap.items") | nindent 14 }}
            {{- end }}
          {{- else }}
          secret:
            secretName: {{ .Values.declarativeResources.secret.name }}
            {{- if .Values.declarativeResources.secret.items }}
            items:
{{ include "thunderid.declarativeResourceItems" (dict "items" .Values.declarativeResources.secret.items "field" "declarativeResources.secret.items") | nindent 14 }}
            {{- end }}
          {{- end }}
        {{- end }}
{{- end }}
