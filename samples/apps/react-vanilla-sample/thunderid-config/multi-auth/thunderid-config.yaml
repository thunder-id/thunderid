resource_type: flow
id: 6b8aa940-e8e7-42d8-88b6-4411a09fad85
name: Sample Vanilla Multi Auth Single Step Registration with SMS and Passkey
handle: sample-vanilla-multi-auth-single-step-sms
flowType: REGISTRATION
nodes:
- id: start
  type: START
  onSuccess: user_type_resolver
- id: user_type_resolver
  type: TASK_EXECUTION
  executor:
    name: UserTypeResolver
  onSuccess: choose_auth
  onIncomplete: prompt_usertype
- id: prompt_usertype
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
      id: heading_usertype
      label: "{{ t(signup:forms.user_type.title) }}"
      variant: HEADING_1
    - type: BLOCK
      id: block_usertype
      components:
      - type: SELECT
        id: usertype_input
        ref: userType
        label: "{{ t(signup:forms.user_type.fields.user_type.label) }}"
        placeholder: "{{ t(signup:forms.user_type.fields.user_type.placeholder) }}"
        required: true
        options: []
      - type: ACTION
        id: action_usertype
        label: "{{ t(signup:forms.user_type.actions.continue.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
  prompts:
  - inputs:
    - ref: usertype_input
      identifier: userType
      type: SELECT
      required: true
    action:
      ref: action_usertype
      nextNode: user_type_resolver
- id: choose_auth
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image_logo
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
      id: display_heading
      label: "{{ t(signup:forms.credentials.title) }}"
      variant: HEADING_1
    - type: BLOCK
      id: block_credentials
      components:
      - type: TEXT_INPUT
        id: input_username
        ref: username
        label: "{{ t(signup:forms.credentials.fields.username.label) }}"
        placeholder: "{{ t(signup:forms.credentials.fields.username.placeholder) }}"
        required: true
      - type: PASSWORD_INPUT
        id: input_password
        ref: password
        label: "{{ t(signup:forms.credentials.fields.password.label) }}"
        placeholder: "{{ t(signup:forms.credentials.fields.password.placeholder) }}"
        required: true
      - type: ACTION
        id: action_001
        label: "{{ t(signup:forms.credentials.actions.submit.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
    - type: DIVIDER
      id: divider_001
      label: Or
      variant: HORIZONTAL
    - type: BLOCK
      id: block_google
      components:
      - type: ACTION
        id: google_auth
        label: Continue with Google
        image: assets/images/icons/google.svg
        variant: OUTLINED
        eventType: TRIGGER
    - type: BLOCK
      id: block_github
      components:
      - type: ACTION
        id: github_auth
        label: Continue with GitHub
        image: assets/images/icons/github.svg
        variant: OUTLINED
        eventType: TRIGGER
    - type: BLOCK
      id: block_sms
      components:
      - type: ACTION
        id: prompt_mobile
        label: Continue with SMS OTP
        image: assets/images/icons/sms.svg
        variant: OUTLINED
        eventType: TRIGGER
    - type: BLOCK
      id: block_passkey
      components:
      - type: ACTION
        id: action_passkey
        label: Create account with Passkey
        variant: OUTLINED
        eventType: TRIGGER
  prompts:
  - inputs:
    - ref: input_username
      identifier: username
      type: TEXT_INPUT
      required: true
    - ref: input_password
      identifier: password
      type: PASSWORD_INPUT
      required: true
    action:
      ref: action_001
      nextNode: credentials_auth
  - action:
      ref: google_auth
      nextNode: google_auth
  - action:
      ref: github_auth
      nextNode: github_auth
  - action:
      ref: prompt_mobile
      nextNode: prompt_sms_identifier
  - action:
      ref: action_passkey
      nextNode: collect_passkey_user_info
- id: credentials_auth
  type: TASK_EXECUTION
  executor:
    name: CredentialsAuthExecutor
  onSuccess: provisioning
- id: google_auth
  type: TASK_EXECUTION
  properties:
    idpId: "019e201d-5634-7533-a971-538b66914721"
  executor:
    name: GoogleOIDCAuthExecutor
    inputs:
    - ref: google_code
      identifier: code
      type: TEXT_INPUT
      required: true
  onSuccess: provisioning
- id: github_auth
  type: TASK_EXECUTION
  properties:
    idpId: "019e3a5e-2ff3-7bfb-ae19-27aada871b80"
  executor:
    name: GithubOAuthExecutor
    inputs:
    - ref: github_code
      identifier: code
      type: TEXT_INPUT
      required: true
  onSuccess: provisioning
- id: prompt_sms_identifier
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image_sms
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
      id: heading_sms_identifier
      label: Sign Up with SMS OTP
      variant: HEADING_1
    - type: BLOCK
      id: block_sms_identifier
      components:
      - type: TEXT_INPUT
        id: sms_identifier_input
        ref: username
        label: "{{ t(signup:forms.credentials.fields.username.label) }}"
