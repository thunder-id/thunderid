openapi: 3.0.3

info:
  title: Health Check API
  version: "1.0"
  description: Check server health for liveness and readiness probes. Used by load balancers and orchestrators to determine instance availability.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: Health
    description: Health check operations

security: []

paths:
  /health/liveness:
    get:
      tags:
        - Health
      summary: Liveness check
      description: Returns 200 if the server process is alive.
      responses:
        '200':
          description: Service is alive

  /health/readiness:
    get:
      tags:
        - Health
      summary: Readiness check
      description: Returns 200 if the service is ready to accept traffic.
      responses:
        '200':
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
              example:
                status: "UP"
                serviceStatus:
                  - serviceName: "ConfigDB"
                    status: "UP"
                  - serviceName: "RuntimeTransientDB"
                    status: "UP"
                  - serviceName: "EntityDB"
                    status: "UP"
        '503':
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServerStatus'
              example:
                status: "DOWN"
                serviceStatus:
                  - serviceName: "ConfigDB"
                    status: "DOWN"
                  - serviceName: "RuntimeTransientDB"
                    status: "UP"
                  - serviceName: "EntityDB"
                    status: "UP"

components:
  schemas:
    ServerStatus:
      type: object
      properties:
        status:
          type: string
          enum:
            - UP
            - DOWN
            - UNKNOWN
        serviceStatus:
          type: array
          items:
            $ref: '#/components/schemas/ServiceStatus'
    ServiceStatus:
      type: object
      properties:
        serviceName:
          type: string
          enum:
            - ConfigDB
            - RuntimeTransientDB
            - EntityDB
        status:
          type: string
          enum:
            - UP
            - DOWN
            - UNKNOWN
