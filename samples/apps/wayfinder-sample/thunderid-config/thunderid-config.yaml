---
# resource_type: application
id: wayfinder-app
name: Wayfinder
description: Wayfinder Travel sample application
ou_handle: default
url: http://localhost:5173
logo_url: "emoji:✈️"
registration_flow_handle: wayfinder-registration-flow
recovery_flow_handle: wayfinder-recovery-flow
is_registration_flow_enabled: true
is_recovery_flow_enabled: true
assertion:
  validity_period: 3600
  user_attributes:
    - given_name
    - family_name
    - email
    - groups
    - username
allowed_user_types:
  - Customer
inbound_auth_config:
  - type: oauth2
    config:
      client_id: "{{.WAYFINDER_CLIENT_ID}}"
      redirect_uris:
        - http://localhost:5173
      grant_types:
        - authorization_code
      response_types:
        - code
      token_endpoint_auth_method: none
      pkce_required: true
      public_client: true
      token:
        access_token:
          validity_period: 3600
          user_attributes:
            - given_name
            - family_name
            - email
            - groups
        id_token:
          validity_period: 3600
          user_attributes:
            - given_name
            - family_name
            - email
            - groups
      scope_claims:
        email:
          - email
        profile:
          - username
          - given_name
          - family_name
        group:
          - groups

