packages:
  - frontend
  - frontend/apps/*
  - frontend/packages/*
  - docs
  - sdks/**
  - samples/apps/*

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  core-js: false
  core-js-pure: false
  # JUSTIFICATION: The `esbuild` package is not directly and might be coming from a transitive dependency. Not required to be built as part of the workspace.
  esbuild: false
  nx: true
  protobufjs: false
  # JUSTIFICATION: The `sharp` package is a native module that requires platform-specific binaries. It is not suitable for inclusion in the workspace as it may cause issues during installation and usage across different environments.
  sharp: true
  unrs-resolver: false
  vue-demi: false

catalog:
  '@hookform/resolvers': 5.2.2
  '@monaco-editor/react': 4.7.0
  '@tanstack/react-query': 5.90.5
  '@tanstack/react-query-devtools': 5.90.2
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/react': 16.3.0
  '@testing-library/user-event': 14.6.1
  '@types/lodash-es': 4.17.12
  '@types/node': 24.7.2
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@vitejs/plugin-basic-ssl': 2.1.0
  '@vitejs/plugin-react': 5.0.4
  '@vitest/browser-playwright': 4.1.3
  '@vitest/coverage-istanbul': 4.1.3
  '@wso2/oxygen-ui': 0.10.1
  '@wso2/oxygen-ui-icons-react': 0.10.1
  babel-plugin-react-compiler: 19.1.0-rc.3
  clsx: 2.1.1
  dayjs: 1.11.18
  dompurify: 3.3.3
  eslint: 9.39.4
  globals: 16.4.0
  i18next: 25.6.0
  jsdom: 27.0.1
  lodash-es: 4.18.1
  lucide-react: 0.545.0
  playwright: 1.58.1
  prettier: 3.6.2
  react: 19.2.3
  react-dom: 19.2.3
  react-hook-form: 7.65.0
  react-i18next: 16.0.1
  react-router: 7.12.0
  rimraf: 6.1.3
  rolldown: 1.0.0-beta.45
  rollup-plugin-visualizer: 6.0.5
  tslib: 2.8.1
  typescript: 5.9.3
  typescript-eslint: 8.57.2
  vite: npm:rolldown-vite@7.1.14
  vite-plugin-svgr: 5.2.0
  vitest: 4.1.3
  zod: 4.3.6

  # SDKS
  buffer: 6.0.3
  base64url: 3.0.1
  jose: 5.2.0
  core-js: 3.42.0
  crypto-browserify: 3.12.1
  fast-sha256: 1.3.0
  process: 0.11.10
  randombytes: 2.1.0
  stream-browserify: 3.0.0
  '@emotion/css': 11.13.5
  '@floating-ui/react': 0.27.12
  cross-fetch: 4.1.0
  memory-cache: 0.2.0
  secure-random-bytes: 5.0.1
  uuid: 11.1.0

overrides:
  openapi-to-postmanv2>ajv: 8.18.0
  ajv-draft-04>ajv: 8.18.0
  ajv-formats>ajv: 8.18.0
  flatted: 3.4.2
  picomatch: 4.0.4
  vite: 'catalog:'
  defu: 6.1.5
  axios: 1.15.2
  dompurify: 3.4.0
  follow-redirects: 1.16.0
  unhead: 2.1.13
  minimatch@>=5.0.0 <5.1.8: '>=5.1.8'
  minimatch@<3.1.4: '>=3.1.4'
  # ESLint plugin packages still require CJS-style minimatch resolution from the 3.x line.
  eslint-plugin-react>minimatch: '3.1.5'
  eslint-plugin-jsx-a11y>minimatch: '3.1.5'
  serialize-javascript: '>=7.0.5'
  webpack: '5.105.0'
  yaml: 2.8.3
  path-to-regexp: 0.1.13
  svgo: 3.3.3
  brace-expansion@>=4.0.0 <5.0.5: 5.0.5
  lodash: 4.18.1
  protobufjs: 7.5.6
  js-yaml@>=4.0.0 <4.1.1: 4.1.1
  # TODO: Remove once `nuxt` bumps `devalue` to 5.8.1 or later.
  devalue: 5.8.1

packageExtensions:
  '@hookform/resolvers':
    peerDependencies:
      zod: '*'

strictPeerDependencies: false
autoInstallPeers: true
enablePrePostScripts: true
