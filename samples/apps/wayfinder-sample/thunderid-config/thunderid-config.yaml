name: Wayfinder Agent
description: Controls access to the Wayfinder Concierge agent
identifier: wayfinder-agent
ou_handle: default
delimiter: ":"
resources:
  - name: Agent
    handle: agent
    actions:
      - name: Access
        handle: access
        description: Grants access to the Wayfinder Concierge agent

---
# resource_type: resource_server
id: wayfinder-booking-rs
name: Wayfinder Booking
description: Protects the Wayfinder booking domain — same scopes guard the REST API on /api/* and the MCP tools on /mcp.
# URL-shaped identifier per RFC 8707 (resource indicators), matching what the
# Wayfinder MCP server advertises in /.well-known/oauth-protected-resource.
# MCP Inspector reads that metadata and passes the value back as resource=...
# on /token; Thunder rejects with invalid_target unless this identifier matches.
identifier: http://localhost:8787/mcp
ou_handle: default
delimiter: ":"
resources:
  - name: Booking
    handle: booking
    actions:
      - name: Read
        handle: read
      - name: Create
        handle: create
      - name: Cancel
        handle: cancel
      - name: Recommend
        handle: recommend
        description: Grants access to surface flight recommendations
      - name: Upgrade
        handle: upgrade
        description: Allows requesting and processing flight cabin upgrades
  - name: Upgrade
    handle: upgrade
    actions:
      - name: Read
        handle: read
        description: Allows the upgrade scheduler agent to list pending upgrade requests via M2M
      - name: Search
        handle: search
        description: Allows the upgrade scheduler agent to search available Business class flights for a route
      - name: Process
        handle: process
        description: Allows the upgrade scheduler agent to execute a pending upgrade via CIBA user token

