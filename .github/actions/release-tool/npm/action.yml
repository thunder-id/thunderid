name: 'Release ThunderID Tool'
description: 'Bumps the version, builds, tests, and publishes a ThunderID tool package to npm'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: 'lts/*'
  pnpm-version:
    description: 'pnpm version to use'
    required: false
    default: 'latest'
  tool:
    description: 'Tool directory name under tools/ (e.g. npx)'
    required: true
  bump-type:
    description: 'Semver bump type: major, minor, or patch'
    required: true
  git-user-name:
    description: 'Git committer name'
    required: false
    default: 'thunderid-automation-bot'
  git-user-email:
    description: 'Git committer email'
    required: false
    default: 'thunderid-bot@wso2.com'
  tag-convention:
    description: 'Git tag format. Use {tool} and {version} as placeholders (e.g. "{tool}/v{version}")'
    required: false
    default: 'tool/{tool}/v{version}'

runs:
  using: composite
  steps:
    - name: 📦 Set up pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      with:
        run_install: false
        # TODO: Explicitly use the `latest` version once the action supports it without issues. For now, we specify the version to avoid breaking changes.
        # version: ${{ inputs.pnpm-version }}

    - name: ⚙️ Set up Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
      with:
        node-version: ${{ inputs.node-version }}
        registry-url: 'https://registry.npmjs.org'
        cache: 'pnpm'

    - name: 📦 Install Dependencies
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: 🏷️ Bump Version
      id: bump
      shell: bash
      run: |
        cd tools/${{ inputs.tool }}
        pnpm version ${{ inputs.bump-type }} --no-git-tag-version
        VERSION=$(node -p "require('./package.json').version")
        PKG_NAME=$(node -p "require('./package.json').name")
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "pkg-name=${PKG_NAME}" >> $GITHUB_OUTPUT
        echo "✅ Bumped ${PKG_NAME} to ${VERSION}"

    - name: 🔨 Build
      shell: bash
      run: pnpm --filter "./tools/${{ inputs.tool }}" build

    - name: 📤 Commit and Tag Release
      shell: bash
      run: |
        git config --local user.name "${{ inputs.git-user-name }}"
        git config --local user.email "${{ inputs.git-user-email }}"
        git add tools/${{ inputs.tool }}/package.json
        git diff --cached --quiet || git commit -m "[Release] ${{ steps.bump.outputs.pkg-name }}@${{ steps.bump.outputs.version }}"
        MAX_RETRIES=5
        for i in $(seq 1 $MAX_RETRIES); do
          git pull --rebase origin ${{ github.ref_name }}
          if git push origin HEAD:${{ github.ref_name }}; then
            break
          fi
          if [ "$i" -eq "$MAX_RETRIES" ]; then
            echo "❌ Push failed after $MAX_RETRIES attempts"
            exit 1
          fi
          echo "⚠️ Push rejected (remote moved), retrying in $((i * 3))s (attempt $((i + 1))/$MAX_RETRIES)..."
          sleep $((i * 3))
        done
        TAG=$(echo "${{ inputs.tag-convention }}" | sed 's/{tool}/${{ inputs.tool }}/g; s/{version}/${{ steps.bump.outputs.version }}/g')
        git tag "$TAG"
        git push origin "$TAG"

    - name: 📦 Publish to npm
      shell: bash
      run: |
        cd tools/${{ inputs.tool }}
        pnpm publish --no-git-checks --access public --provenance
