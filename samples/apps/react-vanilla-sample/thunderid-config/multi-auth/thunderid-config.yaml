        required: true
      - type: PASSWORD_INPUT
        id: input_password
        ref: password
        label: "{{ t(signup:forms.credentials.fields.password.label) }}"
        placeholder: "{{ t(signup:forms.credentials.fields.password.placeholder) }}"
        required: true
      - type: ACTION
        id: credentials_auth
        label: "{{ t(signup:forms.credentials.actions.submit.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
    - type: DIVIDER
      id: divider_001
      label: Or
      variant: HORIZONTAL
    - type: BLOCK
      id: block_google
      components:
      - type: ACTION
        id: google_auth
        label: Continue with Google
        image: assets/images/icons/google.svg
        variant: OUTLINED
        eventType: TRIGGER
    - type: BLOCK
      id: block_github
      components:
      - type: ACTION
        id: github_auth
        label: Continue with GitHub
        image: assets/images/icons/github.svg
        variant: OUTLINED
        eventType: TRIGGER
  prompts:
  - inputs:
    - ref: input_username
      identifier: username
      type: TEXT_INPUT
      required: true
    - ref: input_password
      identifier: password
      type: PASSWORD_INPUT
      required: true
    action:
      ref: credentials_auth
      nextNode: credentials_auth
  - action:
      ref: google_auth
      nextNode: google_auth
  - action:
      ref: github_auth
      nextNode: github_auth
- id: credentials_auth
  type: TASK_EXECUTION
  executor:
    name: CredentialsAuthExecutor
  onSuccess: send_sms
- id: google_auth
  type: TASK_EXECUTION
  properties:
    idpId: "019e201d-5634-7533-a971-538b66914721"
  executor:
    name: GoogleOIDCAuthExecutor
    inputs:
    - ref: google_code
      identifier: code
      type: TEXT_INPUT
      required: true
  onSuccess: send_sms
- id: github_auth
  type: TASK_EXECUTION
  properties:
    idpId: "019e3a5e-2ff3-7bfb-ae19-27aada871b80"
  executor:
    name: GithubOAuthExecutor
    inputs:
    - ref: github_code
      identifier: code
      type: TEXT_INPUT
      required: true
  onSuccess: send_sms
- id: send_sms
  type: TASK_EXECUTION
  executor:
    name: OTPExecutor
    mode: generate
  onSuccess: sms_send
- id: sms_send
  type: TASK_EXECUTION
  properties:
    senderId: "{{.SAMPLE_APP_SMS_SENDER_ID}}"
  executor:
    name: SMSExecutor
  onSuccess: prompt_otp
- id: prompt_otp
  type: PROMPT
  meta:
    components:
    - align: center
      type: TEXT
      id: otp_heading
      label: "{{ t(signup:forms.otp.title) }}"
      variant: HEADING_1
    - align: center
      type: TEXT
      id: otp_description
      label: "{{ t(signup:forms.otp.description) }}"
      variant: BODY_1
    - type: BLOCK
      id: block_otp
      components:
      - type: OTP_INPUT
        id: otp_input
        ref: otp
        required: true
      - type: ACTION
        id: verify_sms
        label: "{{ t(signup:forms.otp.actions.submit.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
  prompts:
  - inputs:
    - ref: otp_input
      identifier: otp
      type: OTP_INPUT
      required: true
    action:
      ref: verify_sms
      nextNode: verify_sms
- id: verify_sms
  type: TASK_EXECUTION
  executor:
    name: OTPExecutor
    mode: verify
    inputs:
    - ref: otp_input
      identifier: otp
      type: OTP_INPUT
      required: true
  onSuccess: provisioning
- id: provisioning
  type: TASK_EXECUTION
  executor:
    name: ProvisioningExecutor
  onSuccess: auth_assert
  onIncomplete: prompt_schema_attrs
- id: prompt_schema_attrs
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image_schema
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
      id: heading_schema_attrs
      label: "{{ t(signup:forms.user_info.title) }}"
      variant: HEADING_1
    - type: BLOCK
      id: block_dynamic_user_inputs
      components:
      - type: DYNAMIC_INPUT_PLACEHOLDER
        id: dynamic_inputs
      - type: ACTION
        id: action_schema_attrs
        label: "{{ t(signup:forms.user_info.actions.continue.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
  prompts:
  - inputs: []
    action:
      ref: action_schema_attrs
      nextNode: provisioning
- id: auth_assert
  type: TASK_EXECUTION
  executor:
    name: AuthAssertExecutor
  onSuccess: end
- id: end
  type: END

