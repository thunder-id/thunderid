resource_type: flow
id: 58bb4b15-700c-4114-a744-f55650990259
name: Sample Vanilla Multi Auth Dual Step Registration with SMS
handle: sample-vanilla-multi-auth-dual-step-sms
flowType: REGISTRATION
nodes:
- id: start
  type: START
  onSuccess: user_type_resolver
- id: user_type_resolver
  type: TASK_EXECUTION
  executor:
    name: UserTypeResolver
  onSuccess: choose_auth
  onIncomplete: prompt_usertype
- id: prompt_usertype
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
      id: heading_usertype
      label: "{{ t(signup:forms.user_type.title) }}"
      variant: HEADING_1
    - type: BLOCK
      id: block_usertype
      components:
      - type: SELECT
        id: usertype_input
        ref: userType
        label: "{{ t(signup:forms.user_type.fields.user_type.label) }}"
        placeholder: "{{ t(signup:forms.user_type.fields.user_type.placeholder) }}"
        required: true
        options: []
      - type: ACTION
        id: action_usertype
        label: "{{ t(signup:forms.user_type.actions.continue.label) }}"
        variant: PRIMARY
        eventType: SUBMIT
  prompts:
  - inputs:
    - ref: usertype_input
      identifier: userType
      type: SELECT
      required: true
    action:
      ref: action_usertype
      nextNode: user_type_resolver
- id: choose_auth
  type: PROMPT
  meta:
    components:
    - alt: "{{ t(signup:images.app_logo.alt) }}"
      category: DISPLAY
      height: '60'
      id: image_logo
      src: "{{ meta(application.logoUrl) }}"
      type: IMAGE
      width: ''
    - align: center
      type: TEXT
