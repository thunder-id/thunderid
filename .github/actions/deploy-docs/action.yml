name: '📚 Deploy Documentation to GitHub Pages'
description: 'Deploy documentation to GitHub Pages'
author: 'WSO2'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: 'lts/*'
  docs-artifact-name:
    description: 'Name of the artifact containing built docs (optional if docs need to be built)'
    required: false
    default: ''
  build-docs:
    description: 'Whether to build the docs from source'
    required: false
    default: 'false'
  github-token:
    description: 'GitHub token for deployment'
    required: true
  commit-message:
    description: 'Commit message for the deployment'
    required: false
    default: '📚 Deploy documentation'
  site-url:
    description: 'Override the site URL used during the Docusaurus build (e.g. https://owner.github.io)'
    required: false
    default: ''
  site-base-url:
    description: 'Override the base URL used during the Docusaurus build (e.g. /repo-name/)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: ⚙️ Set up Node.js
      if: inputs.build-docs == 'true'
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: 📦 Install pnpm
      if: inputs.build-docs == 'true'
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
      with:
        run_install: false

    - name: 🛠️ Build Documentation
      if: inputs.build-docs == 'true'
      shell: bash
      run: |
        make build_docs
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        DOCUSAURUS_URL: ${{ inputs.site-url }}
        DOCUSAURUS_BASE_URL: ${{ inputs.site-base-url }}

    - name: 📥 Download Docs Artifact
      if: inputs.docs-artifact-name != ''
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: ${{ inputs.docs-artifact-name }}
        path: docs/build

    - name: 📋 Verify Build Output
      shell: bash
      run: |
        if [ ! -d "docs/build" ]; then
          echo "❌ Error: docs/build directory not found"
          exit 1
        fi
        echo "✅ Documentation build directory found"
        echo "📂 Contents:"
        ls -la docs/build

    - name: � Upload artifact
      uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
      with:
        path: ./docs/build

    - name: 🔥 Deploy to GitHub Pages
      id: deploy-gh-pages
      uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
