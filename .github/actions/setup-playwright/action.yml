name: Setup Playwright Browsers
description: Caches and installs Playwright Chromium browser for the workspace.

inputs:
  working-directory:
    description: Directory to run playwright install from. Use the package directory to ensure the correct playwright version is resolved (e.g. tests/e2e).
    required: false
    default: '.'
  browsers:
    description: Space-separated list of browsers to install (e.g. "chromium firefox webkit"). Defaults to all browsers defined in the playwright config.
    required: false
    default: ''
  scope:
    description: Cache scope label to distinguish cache entries (e.g. "packages" or "e2e").
    required: false
    default: 'root'

runs:
  using: composite
  steps:
    - name: 🗃️ Cache Playwright Browsers
      id: playwright-cache
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ inputs.scope }}-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          playwright-${{ runner.os }}-${{ inputs.scope }}-
          playwright-${{ runner.os }}-

    - name: 🎭 Install Playwright Browsers
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
          pnpm exec playwright install-deps ${{ inputs.browsers }}
          pnpm exec playwright install ${{ inputs.browsers }}
        else
          pnpm exec playwright install --with-deps ${{ inputs.browsers }}
        fi

