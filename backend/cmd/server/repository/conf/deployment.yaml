server:
  hostname: "localhost"
  port: 8090

tls:
  min_version: "1.3"
  cert_file: "repository/resources/security/server.cert"
  key_file: "repository/resources/security/server.key"

database:
  config:
    type: "sqlite"
    sqlite:
      path: "repository/database/configdb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  runtime:
    type: "sqlite"
    sqlite:
      path: "repository/database/runtimedb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  user:
    type: "sqlite"
    sqlite:
      path: "repository/database/userdb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

crypto:
  encryption:
    key: "file://repository/resources/security/crypto.key"
  password_hashing:
    algorithm: "PBKDF2"
  keys:
    - id: "default-key"
      cert_file: "repository/resources/security/signing.cert"
      key_file: "repository/resources/security/signing.key"

jwt:
    preferred_key_id: "default-key"

cors:
  allowed_origins:
    - "https://localhost:3000" # This is for test samples, remove it for production
    - "http://localhost:5173" # This is for wayfinder test sample app, remove it for production
    - "http://localhost:6274" # This is for wayfinder test sample app, remove it for production
    # - regex: '^https://[a-z0-9-]+\.staging\.example\.com(:[0-9]+)?$'

passkey:
  allowed_origins:
    - "https://localhost:8090"

consent:
  enabled: true
  base_url: "http://localhost:9090/api/v1"

# This is a sample email client configuration. Update it with real SMTP server details for production use.
email:
  smtp:
    host: "127.0.0.1"
    port: 2525
    username: "dev"
    password: "dev"
    from_address: "noreply@thunderid.dev"
    enable_start_tls: false
    enable_authentication: true
