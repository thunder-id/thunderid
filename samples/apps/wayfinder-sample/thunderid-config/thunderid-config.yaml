# resource_type: agent
id: wayfinder-concierge
name: WAYFINDER-CONCIERGE
description: Wayfinder Concierge AI agent for the Wayfinder Travel sample
ou_handle: default
type: default
auth_flow_handle: wayfinder-agent-auth-flow
inbound_auth_config:
  - type: oauth2
    config:
      client_id: "{{.AGENT_CLIENT_ID}}"
      client_secret: "{{.AGENT_CLIENT_SECRET}}"
      redirect_uris:
        - http://localhost:5173/agent-callback
      grant_types:
        - client_credentials
        - authorization_code
      response_types:
        - code
      token_endpoint_auth_method: client_secret_basic
      pkce_required: false
      public_client: false
      token:
        access_token:
          validity_period: 3600
          user_attributes:
            - email

---
# resource_type: agent
# CIBA-only client used by the upgrade scheduler to initiate backchannel
# authentication for users who have a pending upgrade request.
# Uses default-ciba-email-flow so Thunder sends an email notification to the
# user's registered address. Kept separate from wayfinder-concierge because
# auth_flow_handle is shared between authorization_code and CIBA — they need
# different flows (interactive vs backchannel notification).
id: wayfinder-upgrade-agent
name: WAYFINDER-UPGRADE-AGENT
description: Upgrade scheduler agent — initiates CIBA for users with pending flight upgrade requests
ou_handle: default
type: default
auth_flow_handle: wayfinder-ciba-email-flow
allowed_user_types:
  - Customer
inbound_auth_config:
  - type: oauth2
    config:
      client_id: "{{.UPGRADE_AGENT_CLIENT_ID}}"
      client_secret: "{{.UPGRADE_AGENT_CLIENT_SECRET}}"
      grant_types:
        - client_credentials
        - urn:openid:params:grant-type:ciba
      token_endpoint_auth_method: client_secret_basic
      public_client: false
      token:
        access_token:
          validity_period: 3600
          user_attributes:
            - given_name
            - family_name
            - email
            - username

---
# resource_type: application
# Public OAuth client used by external MCP clients (e.g. MCP Inspector)
# to call the Wayfinder MCP server on /mcp.
# Used by the MCP Authorization tryout to demonstrate Thunder-secured MCP
# access from clients that are not part of the Wayfinder product itself.
id: external-mcp-client
name: External MCP Client
description: Public OAuth client for external MCP clients connecting to the Wayfinder MCP server.
ou_handle: default
url: http://localhost:8787/mcp
# Reuse the Concierge's auth flow so the OAuth consent screen surfaces the
# requested booking:* scopes during the MCP Authorization tryout. Without
# this, Thunder falls back to the default sign-in-only flow and no consent
# step is shown.
auth_flow_handle: wayfinder-agent-auth-flow
allowed_user_types:
  - Customer
inbound_auth_config:
  - type: oauth2
    config:
      client_id: EXTERNAL-MCP-CLIENT
      redirect_uris:
        - http://localhost:6274/oauth/callback/debug
        - http://localhost:6274/oauth/callback
      grant_types:
        - authorization_code
        - refresh_token
      response_types:
        - code
      token_endpoint_auth_method: none
      pkce_required: true
      public_client: true
      token:
        access_token:
          validity_period: 3600

