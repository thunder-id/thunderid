    OAuthAppConfig:
      type: object
      properties:
        clientId:
          type: string
          description: The client ID for the OAuth application.
          example: myapp_client_id
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: A list of redirect URIs for the OAuth application.
          example:
            - https://myapp.example.com/callback
            - https://myapp.example.com/oauth/callback
        grantTypes:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - client_credentials
              - refresh_token
              - implicit
              - password
              - urn:ietf:params:oauth:grant-type:token-exchange
          description: A list of grant types supported by the OAuth application. Defaults
            to ["authorization_code"] if not specified.
          example:
            - authorization_code
            - refresh_token
        responseTypes:
          type: array
          items:
            type: string
            enum:
              - code
              - token
          description: A list of response types supported by the OAuth application.
            Defaults to ["code"] if not specified.
          example:
            - code
        tokenEndpointAuthMethod:
          type: string
          enum:
            - client_secret_basic
            - client_secret_post
            - private_key_jwt
            - none
          description: The token endpoint authentication method for the OAuth application.
            Defaults to "client_secret_basic" if not specified.
          example: client_secret_basic
        pkceRequired:
          type: boolean
          description: Whether PKCE (Proof Key for Code Exchange) is required for this
            application.
          example: false
          default: false
        publicClient:
          type: boolean
          description: Whether the application is a public client (Mobile apps, SPAs,
            etc.), which cannot store secrets securely.
          example: false
          default: false
        requirePushedAuthorizationRequests:
          type: boolean
          description: Whether Pushed Authorization Requests (PAR) per RFC 9126 are
            required for this application.
          example: false
          default: false
        scopes:
          type: array
          items:
            type: string
          description: List of scopes that the client can request.
          example:
            - openid
            - profile
            - email
        token:
          type: object
          properties:
            accessToken:
              $ref: "#/components/schemas/AccessTokenConfig"
            idToken:
              $ref: "#/components/schemas/IDTokenConfig"
        userInfo:
          $ref: "#/components/schemas/UserInfoConfig"
        scopeClaims:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Custom scope-to-claims mapping. Overrides default OIDC scope claims
            or defines custom scopes. Applies to both ID token and userinfo
            responses.
          example:
            profile:
              - name
              - family_name
              - given_name
              - picture
            employee:
              - emp_id
              - department
        acrValues:
          type: array
          items:
            type: string
          description: >
            ACR (Authentication Context Class Reference) values for the
            application.

            Defines the allowed set of ACR values for authorization requests.
            When acr_values is

            provided in an authorization request, only values present in this
            list are accepted;

            unrecognised values are silently ignored. If filtering removes all
            requested ACRs,

            the full list is used as a fallback. When acr_values is omitted from
            the request,

            this configured list is used as the effective ACR set.
          example:
            - urn:thunder:silver
            - urn:thunder:gold
