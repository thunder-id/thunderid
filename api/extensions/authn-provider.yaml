openapi: 3.0.0
info:
  title: Authentication Provider API
  version: 1.0.0
  description: API specification for the Authentication Provider interface.

security:
  - ApiKeyAuth: []
paths:
  /authenticate:
    post:
      summary: Authenticate a user
      operationId: authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /authenticator-metadata:
    post:
      summary: Get authenticator metadata
      operationId: getAuthenticatorMetadata
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticatorMetadataRequest'
      responses:
        '200':
          description: Authenticator metadata retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthenticatorMeta'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '404':
          description: Authenticator not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /attributes:
    post:
      summary: Get user attributes
      operationId: getAttributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAttributesRequest'
      responses:
        '200':
          description: Attributes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAttributesResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '401':
          description: Invalid token or unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: API-KEY
  schemas:
    AuthenticateRequest:
      type: object
      properties:
        authType:
          type: string
          description: The type of authentication being performed
        authnData:
          oneOf:
            - $ref: '#/components/schemas/CredentialsAuthnData'
            - $ref: '#/components/schemas/PasskeyAuthnData'
            - $ref: '#/components/schemas/OTPAuthnData'
            - $ref: '#/components/schemas/FederatedAuthnData'
          description: Authentication data. The structure depends on the authType.
        metadata:
          $ref: '#/components/schemas/AuthnMetadata'
      required:
        - authType
        - authnData

    CredentialsAuthnData:
      type: object
      description: Identifiers and credentials for credential-based authentication.
      properties:
        Identifiers:
          type: object
          additionalProperties: true
          description: Map of user identifiers
        Credentials:
          type: object
          additionalProperties: true
          description: Map of user credentials
      required:
        - Identifiers
        - Credentials

    PasskeyAuthnData:
      type: object
      description: Data required for passkey-based authentication.
      properties:
        CredentialID:
          type: string
        CredentialType:
          type: string
        ClientDataJSON:
          type: string
        AuthenticatorData:
          type: string
        Signature:
          type: string
        UserHandle:
          type: string
        SessionToken:
          type: string
      required:
        - CredentialID
        - ClientDataJSON
        - AuthenticatorData
        - Signature
        - SessionToken

    OTPAuthnData:
      type: object
      description: Data required for OTP-based authentication.
      properties:
        SessionToken:
          type: string
        OTP:
          type: string
      required:
        - SessionToken
        - OTP

    FederatedAuthnData:
      type: object
      description: Data required for federated (OAuth/OIDC) authentication.
      properties:
        IDPID:
          type: string
          description: Identity provider ID
        IDPType:
          type: string
          description: Identity provider type
        Code:
          type: string
          description: OAuth authorization code
      required:
        - IDPID
        - IDPType
        - Code

    GetAttributesRequest:
      type: object
      properties:
        token:
          type: string
          description: Authentication token
        requestedAttributes:
          $ref: '#/components/schemas/RequestedAttributes'
        metadata:
          $ref: '#/components/schemas/GetAttributesMetadata'
      required:
        - token

    AuthnMetadata:
      type: object
      properties:
        appMetadata:
          type: object
          additionalProperties: true
          description: Application metadata

    GetAttributesMetadata:
      type: object
      properties:
        appMetadata:
          type: object
          additionalProperties: true
          description: Application metadata
        locale:
          type: string
          description: User locale

    AuthnResult:
      type: object
      properties:
        entityId:
          type: string
        entityCategory:
          type: string
        entityType:
          type: string
        ouId:
          type: string
        userId:
          type: string
          deprecated: true
        userType:
          type: string
          deprecated: true
        token:
          type: string
        isAttributeValuesIncluded:
          type: boolean
        attributesResponse:
          $ref: '#/components/schemas/AttributesResponse'
        externalSub:
          type: string
        externalClaims:
          type: object
          additionalProperties: true
        isExistingUser:
          type: boolean
        isAmbiguousUser:
          type: boolean
        authType:
          type: string
      required:
        - entityId
        - ouId

    GetAttributesResult:
      type: object
      properties:
        entityId:
          type: string
        entityCategory:
          type: string
        entityType:
          type: string
        ouId:
          type: string
        userId:
          type: string
          deprecated: true
        userType:
          type: string
          deprecated: true
        attributeResponse:
          $ref: '#/components/schemas/AttributesResponse'
      required:
        - entityId
        - ouId

    AssuranceMetadataResponse:
      type: object
      properties:
        isVerified:
          type: boolean
          description: Whether the attribute is verified
        verificationId:
          type: string
          description: Key of the corresponding verification response in the verifications map

    VerificationResponse:
      type: object
      properties:
        trustFramework:
          type: string
          description: Trust framework used for verification
        time:
          type: string
          description: Time of verification
        verificationProcess:
          type: string
          description: Verification process used

    RequestedAttributes:
      type: object
      properties:
        attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeMetadataRequest'
          description: Map of attribute names to their request metadata
        verifications:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VerificationRequest'
          description: Map of verification IDs to verification requests

    AttributeMetadataRequest:
      type: object
      properties:
        genericMetadataRequest:
          $ref: '#/components/schemas/GenericMetadataRequest'
        assuranceMetadataRequest:
          $ref: '#/components/schemas/AssuranceMetadataRequest'

    GenericMetadataRequest:
      type: object
      properties:
        essential:
          type: boolean
          description: Whether this claim is essential
        value:
          type: string
          description: Specific value requested
        values:
          type: array
          items:
            type: string
          description: List of acceptable values

    GenericTimeMetadataRequest:
      allOf:
        - $ref: '#/components/schemas/GenericMetadataRequest'
        - type: object
          properties:
            maxAge:
              type: integer
              description: Maximum age in seconds

    AssuranceMetadataRequest:
      type: object
      properties:
        shouldVerify:
          type: boolean
          description: Whether verification is requested
        verificationId:
          type: string
          description: Key of the corresponding verification request in the verifications map

    VerificationRequest:
      type: object
      properties:
        trustFramework:
          $ref: '#/components/schemas/GenericMetadataRequest'
        verificationProcess:
          $ref: '#/components/schemas/GenericMetadataRequest'
        time:
          $ref: '#/components/schemas/GenericTimeMetadataRequest'

    AttributesResponse:
      type: object
      properties:
        attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeResponse'
          description: Map of attribute names to their values and metadata
        verifications:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VerificationResponse'
          description: Map of verification IDs to verification details

    AttributeResponse:
      type: object
      properties:
        value:
          description: The attribute value
        assuranceMetadataResponse:
          $ref: '#/components/schemas/AssuranceMetadataResponse'

    AuthenticatorMetadataRequest:
      type: object
      properties:
        authenticatorName:
          type: string
          description: The name of the authenticator to retrieve metadata for
      required:
        - authenticatorName

    AuthenticationFactor:
      type: string
      description: |
        Authentication factor type:
        - KNOWLEDGE: Something you know (e.g., password, PIN)
        - POSSESSION: Something you have (e.g., OTP device, SMS)
        - INHERENCE: Something you are (e.g., biometrics)
      enum:
        - KNOWLEDGE
        - POSSESSION
        - INHERENCE

    AuthenticatorMeta:
      type: object
      properties:
        name:
          type: string
          description: Unique identifier for the authenticator
        factors:
          type: array
          items:
            $ref: '#/components/schemas/AuthenticationFactor'
          description: Authentication factors this authenticator validates
        associatedIDP:
          type: string
          description: Optional identity provider type this authenticator is associated with
      required:
        - name
        - factors

    ErrorCode:
      type: string
      description: |
        Error codes returned by the authentication provider API:
        - AUP-0001: System Error
        - AUP-0002: Authentication Failed
        - AUP-0003: User Not Found
        - AUP-0004: Invalid Token
        - AUP-0005: Not Implemented
        - AUP-0006: Invalid Request
      enum:
        - AUP-0001
        - AUP-0002
        - AUP-0003
        - AUP-0004
        - AUP-0005
        - AUP-0006

    AuthnProviderError:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'
      required:
        - code
        - message

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
