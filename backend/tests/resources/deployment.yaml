server:
  hostname: localhost
  port: 8080

tls:
  cert_file: /path/to/cert.pem
  key_file: /path/to/key.pem

database:
  config:
    type: postgres
    postgres:
      hostname: localhost
      port: 5432
      name: configdb
      username: postgres
      password: postgres
      sslmode: disable

  runtime_transient:
    type: sqlite
    sqlite:
      path: "/data/runtime_transient.db"
      options: "cache=shared"

oauth:
  jwt:
    issuer: thunderid
    validity_period: 3600
  dcr:
    enabled: true
  logout:
    enabled: true
  token_revocation:
    enabled: true

flow:
  max_version_history: 3
  # executors: []  # optional; omit or leave empty to register all built-in executors.
  # When set, list executor names (e.g. CredentialsAuthExecutor) to register only that subset.
