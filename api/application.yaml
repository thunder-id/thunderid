                        - "https://myapp.example.com/oauth/callback"
                      grantTypes:
                        - "authorization_code"
                        - "refresh_token"
                      responseTypes:
                        - "code"
                      tokenEndpointAuthMethod: "client_secret_basic"
                      pkceRequired: false
                      publicClient: false
                      requirePushedAuthorizationRequests: false
                      dpopBoundAccessTokens: false
                      includeActClaim: false
                      scopes:
                        - "openid"
                        - "profile"
                        - "email"
                      token:
                        accessToken:
                          userConfig:
                            validityPeriod: 3600
                            attributes: ["email", "username"]
                        idToken:
                          validityPeriod: 1800
                          userAttributes: ["email", "email_verified", "name", "given_name", "family_name"]
                          responseType: "JWE"
                          encryptionAlg: "RSA-OAEP-256"
                          encryptionEnc: "A256GCM"
                        refreshToken:
                          validityPeriod: 86400
                      userInfo:
                        responseType: "JWS"
                        signingAlg: "RS256"
                        userAttributes: ["email", "name", "given_name", "family_name", "picture"]
                      scopeClaims:
                        profile: ["name", "family_name", "given_name", "picture"]
                        employee: ["emp_id", "department"]
                      acrValues: ["urn:thunder:silver", "urn:thunder:gold"]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-1002"
                message:
                  key: "error.applicationservice.invalid_application_id"
                  defaultValue: "Invalid application ID"
                description:
                  key: "error.applicationservice.invalid_application_id_description"
                  defaultValue: "The provided application ID is invalid or empty"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-1001"
                message:
                  key: "error.applicationservice.application_not_found"
                  defaultValue: "Application not found"
                description:
                  key: "error.applicationservice.application_not_found_description"
                  defaultValue: "The requested application could not be found"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-5001"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

    put:
      tags:
        - Applications
      summary: Update an application
      description: Update the details of an existing application.
      parameters:
        - in: path
          name: id
