name: Run Integration Tests
description: Runs integration tests against a specific database type (sqlite, postgres, or redis)
inputs:
  database-type:
    description: 'Database type to test against (sqlite, postgres, or redis)'
    required: true
  coverage-enabled:
    description: 'Whether to enable coverage collection'
    required: false
    default: false

runs:
  using: "composite"
  steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

    - name: ⚙️ Set up Go Environment
      uses: ./.github/actions/setup-go

    - name: 📥 Download Built Distribution
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
      with:
        name: product-distribution
        path: target/dist/

    - name: 📦 Install Dependencies
      shell: bash
      run: |
        cd backend
        go mod download
        cd ../tests/integration
        go mod download

    - name: 🗄️ Setup PostgreSQL Database
      if: inputs.database-type == 'postgres'
      shell: bash
      run: |
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d postgredb -c "CREATE DATABASE configdb;"
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d postgredb -c "CREATE DATABASE runtime_transient;"
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d postgredb -c "CREATE DATABASE entitydb;"
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d postgredb -c "CREATE DATABASE runtime_persistent;"
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d configdb < backend/dbscripts/configdb/postgres.sql
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d runtime_transient < backend/dbscripts/runtime-transient/postgres.sql
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d entitydb < backend/dbscripts/entitydb/postgres.sql
        PGPASSWORD=dbpassword psql -h localhost -p 5432 -U dbuser -d runtime_persistent < backend/dbscripts/runtime-persistent/postgres.sql

    - name: 📝 Configure Test Database
      shell: bash
      run: |
        chmod +x tests/integration/resources/scripts/setup-test-config.sh
        ./tests/integration/resources/scripts/setup-test-config.sh
      env:
        DB_TYPE: ${{ inputs.database-type }}

    - name: 🧪 Run Integration Tests
      shell: bash
      run: |
        echo "Running integration tests against ${{ inputs.database-type }} database..."
        
        # Set up coverage directory if coverage is enabled
        if [ "${{ inputs.coverage-enabled }}" = "true" ]; then
          export GOCOVERDIR="target/out/.test/integration"
          mkdir -p "$GOCOVERDIR"
          echo "Coverage collection enabled: GOCOVERDIR=$GOCOVERDIR"
        fi
        
        # Run integration tests with database type
        DB_TYPE=${{ inputs.database-type }} make test_integration
      env:
        DB_TYPE: ${{ inputs.database-type }}
        GOCOVERDIR: ${{ inputs.coverage-enabled == 'true' && 'target/out/.test/integration' || '' }}
