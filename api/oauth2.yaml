            - client_secret_post
            - private_key_jwt
            - none
        jwks_uri:
          type: string
        jwks:
          type: object
          additionalProperties: true
        scope:
          type: string
        contacts:
          type: array
          items:
            type: string
        tos_uri:
          type: string
        policy_uri:
          type: string
        require_pushed_authorization_requests:
          type: boolean
        userinfo_signed_response_alg:
          type: string
        userinfo_encrypted_response_alg:
          type: string
        userinfo_encrypted_response_enc:
          type: string
        id_token_encrypted_response_alg:
          type: string
        id_token_encrypted_response_enc:
          type: string
      description: Language-tagged fields (e.g. `client_name#fr`) are also accepted as top-level properties.

    DCRRegistrationResponse:
      type: object
      required:
        - client_id
        - client_secret_expires_at
      properties:
        client_id:
          type: string
        client_secret:
          type: string
        client_secret_expires_at:
          type: integer
          format: int64
          description: Unix timestamp when the secret expires, or 0 if it never expires.
        app_id:
          type: string
          description: Internal application ID.
        redirect_uris:
          type: array
          items:
            type: string
        grant_types:
          type: array
          items:
            type: string
        response_types:
          type: array
          items:
            type: string
        client_name:
          type: string
        client_uri:
          type: string
        logo_uri:
          type: string
        token_endpoint_auth_method:
          type: string
        jwks_uri:
          type: string
        jwks:
          type: object
          additionalProperties: true
        scope:
          type: string
        contacts:
          type: array
          items:
            type: string
        tos_uri:
          type: string
        policy_uri:
          type: string
        require_pushed_authorization_requests:
          type: boolean
        userinfo_signed_response_alg:
          type: string
        userinfo_encrypted_response_alg:
          type: string
        userinfo_encrypted_response_enc:
          type: string
        id_token_encrypted_response_alg:
          type: string
        id_token_encrypted_response_enc:
          type: string
      description: Language-tagged variants (e.g. `client_name#fr`) are included as top-level properties in the response.

    OAuthError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: OAuth 2.0 error code.
          example: invalid_request
        error_description:
          type: string
          description: Human-readable error description.
