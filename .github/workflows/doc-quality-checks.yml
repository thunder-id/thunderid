# Consolidated documentation quality checks.
# Add new doc quality jobs here rather than creating separate workflows.

name: 📋 Doc Quality Checks

on:
  pull_request:
    paths:
      - 'docs/**'
  merge_group:

jobs:
  # ── 1. Vale style linting ────────────────────────────────────────────────
  vale:
    name: Style (Vale)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: 🔍 Get changed markdown files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            BASE_REF="${{ github.event.merge_group.base_ref }}"
            BASE_REF="${BASE_REF#refs/heads/}"
          else
            BASE_REF="${{ github.base_ref }}"
          fi
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${BASE_REF}...HEAD -- '*.md' '*.mdx')
          if [ -z "$FILES" ]; then
            echo "No markdown files changed."
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            COMMA_FILES=$(echo "$FILES" | paste -sd ',' -)
            echo "files=$COMMA_FILES" >> "$GITHUB_OUTPUT"
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 🔍 Run Vale
        if: steps.changed-files.outputs.has_files == 'true'
        uses: errata-ai/vale-action@d89dee975228ae261d22c15adcd03578634d429c # v2.1.1
        with:
          files: ${{ steps.changed-files.outputs.files }}
          separator: ","
          reporter: github-pr-check
          filter_mode: added
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Orphaned pages check ──────────────────────────────────────────────
  orphaned-pages:
    name: Orphaned pages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔍 Check for orphaned pages
        run: node docs/scripts/check-orphaned-pages.mjs
