                      - name: "username"
                        value: "user@example.com"
                        isSecret: false
                      - name: "password"
                        value: "******"
                        isSecret: true
                      - name: "from_address"
                        value: "no-reply@example.com"
                        isSecret: false
                      - name: "enable_start_tls"
                        value: "true"
                        isSecret: false
