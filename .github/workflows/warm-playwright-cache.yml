# Populates Playwright browser caches on the default branch so that all PRs and
# merge-queue runs can reuse them via GitHub's default-branch cache inheritance.
# Caches created on a PR ref are scoped to that PR only; only entries created on
# main are readable by every other scope.

name: 💾 Prepare Dependency Cache

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  NODE_VERSION: "lts/*"

jobs:
  warm-frontend-playwright:
    name: 🎭 Cache Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: ⚙️ Set up Node.js and pnpm
        uses: ./.github/actions/setup-pnpm
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎭 Set up Playwright Browsers (packages)
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: frontend
          scope: packages

      - name: 🎭 Set up Playwright Browsers (e2e)
        uses: ./.github/actions/setup-playwright
        with:
          working-directory: tests/e2e
          scope: e2e
