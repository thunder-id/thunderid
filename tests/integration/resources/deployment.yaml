server:
  hostname: "localhost"
  port: 8095
  security:
    direct_auth_secret: "integration-direct-auth-secret"

tls:
  cert_file: "config/certs/server.cert"
  key_file: "config/certs/server.key"

database:
  config:
    type: "sqlite"
    sqlite:
      path: "database/configdb.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"
  runtime_transient:
    type: "sqlite"
    sqlite:
      path: "database/runtime_transient.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"
  entity:
    type: "sqlite"
    sqlite:
      path: "database/entitydb.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"
  runtime_persistent:
    type: "sqlite"
    sqlite:
      path: "database/runtime_persistent.db"
      options: "_journal_mode=WAL&_busy_timeout=60000&_pragma=foreign_keys(1)"

flow:
  max_version_history: 3

server_config:
  store: composite

passkey:
  allowed_origins:
    - "https://localhost:8095"
    - "http://localhost:8095"

oauth:
  allow_wildcard_redirect_uri: true
  auth_class:
    amrs:
      - PWD
      - OTP
      - BIO
    acr_amr:
      "urn:thunder:acr:password":
        - PWD
      "urn:thunder:acr:generated-code":
        - OTP
      "urn:thunder:acr:biometrics":
        - BIO
