services:
  # Initialize database from the image
  thunderid-db-init:
    image: ghcr.io/thunder-id/thunderid:latest
    command: sh -c "cp -r /opt/thunderid/database/* /data/"
    volumes:
      - thunderid-db:/data
    restart: "no"

  # Run setup once with the shared database
  thunderid-setup:
    image: ghcr.io/thunder-id/thunderid:latest
    command: ./setup.sh
    volumes:
      - thunderid-db:/opt/thunderid/database
      # Per-deployment TLS/JWT-signing/AES key material generated by setup.sh, shared with the server.
      - thunderid-certs:/opt/thunderid/config/certs
    depends_on:
      thunderid-db-init:
        condition: service_completed_successfully
    restart: "no"

  # Run ThunderID server with the shared database
  thunderid:
    image: ghcr.io/thunder-id/thunderid:latest
    depends_on:
      thunderid-setup:
        condition: service_completed_successfully
    ports:
      - "8090:8090"
    volumes:
      - thunderid-db:/opt/thunderid/database
      # Reads the key material generated by thunderid-setup into the shared certs volume.
      - thunderid-certs:/opt/thunderid/config/certs:ro

volumes:
  thunderid-db:
    driver: local
  thunderid-certs:
    driver: local
