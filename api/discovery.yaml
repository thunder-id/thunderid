openapi: 3.0.3

info:
  title: OAuth2 / OIDC Discovery API
  description: Well-known discovery endpoints for OAuth 2.0 Authorization Server Metadata (RFC 8414) and OpenID Connect Provider Metadata (OIDC Discovery 1.0).
  version: "1.0"
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: Discovery
    description: Server metadata discovery endpoints.

security: []

paths:
  /.well-known/oauth-authorization-server:
    get:
      summary: OAuth 2.0 Authorization Server Metadata
      description: |
        Returns metadata describing the authorization server's configuration per RFC 8414.
        This includes the supported endpoints, grant types, scopes, and signing algorithms.
      tags:
        - Discovery
      responses:
        "200":
          description: Authorization server metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2AuthorizationServerMetadata'
              example:
                issuer: "https://server.example.com"
                authorization_endpoint: "https://server.example.com/oauth2/authorize"
                token_endpoint: "https://server.example.com/oauth2/token"
                jwks_uri: "https://server.example.com/oauth2/jwks"
                introspection_endpoint: "https://server.example.com/oauth2/introspect"
                pushed_authorization_request_endpoint: "https://server.example.com/oauth2/par"
                registration_endpoint: "https://server.example.com/oauth2/dcr/register"
                scopes_supported:
                  - openid
                  - profile
                  - email
                response_types_supported:
                  - code
                grant_types_supported:
                  - authorization_code
                  - client_credentials
                  - refresh_token
                  - urn:ietf:params:oauth:grant-type:jwt-bearer
                token_endpoint_auth_methods_supported:
                  - client_secret_basic
                  - client_secret_post
                  - private_key_jwt
                code_challenge_methods_supported:
                  - S256
                authorization_response_iss_parameter_supported: true

  /.well-known/openid-configuration:
    get:
      summary: OpenID Connect Provider Metadata
      description: |
        Returns OpenID Provider metadata per OIDC Discovery 1.0. Extends the OAuth 2.0
        Authorization Server Metadata with OIDC-specific fields such as supported subject
        types, ID token signing algorithms, UserInfo endpoint, and supported claims.
      tags:
        - Discovery
      responses:
        "200":
          description: OIDC provider metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OIDCProviderMetadata'
              example:
                issuer: "https://server.example.com"
                authorization_endpoint: "https://server.example.com/oauth2/authorize"
                token_endpoint: "https://server.example.com/oauth2/token"
                userinfo_endpoint: "https://server.example.com/oauth2/userinfo"
                jwks_uri: "https://server.example.com/oauth2/jwks"
                introspection_endpoint: "https://server.example.com/oauth2/introspect"
                pushed_authorization_request_endpoint: "https://server.example.com/oauth2/par"
                registration_endpoint: "https://server.example.com/oauth2/dcr/register"
                scopes_supported:
                  - openid
                  - profile
                  - email
                response_types_supported:
                  - code
                grant_types_supported:
                  - authorization_code
                  - client_credentials
                  - refresh_token
                  - urn:ietf:params:oauth:grant-type:jwt-bearer
                token_endpoint_auth_methods_supported:
                  - client_secret_basic
                  - client_secret_post
                  - private_key_jwt
                subject_types_supported:
                  - public
                id_token_signing_alg_values_supported:
                  - RS256
                claims_supported:
                  - sub
                  - name
                  - email
                  - email_verified
                claims_parameter_supported: true
                authorization_response_iss_parameter_supported: true
        "500":
          description: Internal server error — metadata could not be generated.

components:
  schemas:
    OAuth2AuthorizationServerMetadata:
      type: object
      required:
        - issuer
        - authorization_endpoint
        - token_endpoint
        - jwks_uri
        - scopes_supported
        - response_types_supported
        - grant_types_supported
        - token_endpoint_auth_methods_supported
        - authorization_response_iss_parameter_supported
      properties:
        issuer:
          type: string
          description: The authorization server's issuer identifier URL.
        authorization_endpoint:
          type: string
          description: URL of the authorization endpoint.
        token_endpoint:
          type: string
          description: URL of the token endpoint.
        userinfo_endpoint:
          type: string
          description: URL of the UserInfo endpoint.
        jwks_uri:
          type: string
          description: URL of the JWKS endpoint.
        registration_endpoint:
          type: string
          description: URL of the Dynamic Client Registration endpoint.
        revocation_endpoint:
          type: string
          description: URL of the token revocation endpoint.
        introspection_endpoint:
          type: string
          description: URL of the token introspection endpoint.
        pushed_authorization_request_endpoint:
          type: string
          description: URL of the Pushed Authorization Request endpoint.
        require_pushed_authorization_requests:
          type: boolean
          description: If true, all authorization requests must use PAR.
        scopes_supported:
          type: array
          items:
            type: string
        response_types_supported:
          type: array
          items:
            type: string
        grant_types_supported:
          type: array
          items:
            type: string
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
        code_challenge_methods_supported:
          type: array
          items:
            type: string
        authorization_response_iss_parameter_supported:
          type: boolean
          description: Whether the `iss` parameter is included in authorization responses (RFC 9207).

    OIDCProviderMetadata:
      allOf:
        - $ref: '#/components/schemas/OAuth2AuthorizationServerMetadata'
        - type: object
          required:
            - subject_types_supported
            - id_token_signing_alg_values_supported
            - claims_supported
          properties:
            subject_types_supported:
              type: array
              items:
                type: string
                enum: [public, pairwise]
            id_token_signing_alg_values_supported:
              type: array
              items:
                type: string
            userinfo_signing_alg_values_supported:
              type: array
              items:
                type: string
            userinfo_encryption_alg_values_supported:
              type: array
              items:
                type: string
            userinfo_encryption_enc_values_supported:
              type: array
              items:
                type: string
            id_token_encryption_alg_values_supported:
              type: array
              items:
                type: string
            id_token_encryption_enc_values_supported:
              type: array
              items:
                type: string
            claims_supported:
              type: array
              items:
                type: string
            claims_parameter_supported:
              type: boolean
            end_session_endpoint:
              type: string
              description: URL of the end-session (logout) endpoint.
            acr_values_supported:
              type: array
              items:
                type: string
