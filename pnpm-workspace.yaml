packages:
  - frontend
  - frontend/apps/*
  - frontend/packages/*
  - docs
  - samples/apps/**
  - tools/*
  - tests/e2e

strictPeerDependencies: false
autoInstallPeers: true
enablePrePostScripts: true
verifyDepsBeforeRun: false

allowBuilds:
  '@parcel/watcher': false
  '@swc/core': false
  # JUSTIFICATION: Wayfinder uses better-sqlite3 as the Node 18/20 fallback for node:sqlite.
  better-sqlite3: true
  core-js: false
  core-js-pure: false
  # JUSTIFICATION: The `esbuild` package is not directly and might be coming from a transitive dependency. Not required to be built as part of the workspace.
  esbuild: false
  # JUSTIFICATION: The `sharp` package is a native module that requires platform-specific binaries. It is not suitable for inclusion in the workspace as it may cause issues during installation and usage across different environments.
  sharp: true
  unrs-resolver: false
  vue-demi: false

catalog:
  '@axe-core/playwright': 4.3.0
  '@docsearch/docusaurus-adapter': ^4.6.3
  '@codecov/vite-plugin': 2.0.1
  '@hookform/resolvers': 5.2.2
  '@monaco-editor/react': 4.7.0
  '@rolldown/plugin-babel': '0.2.3'
  '@tanstack/react-query': 5.90.5
  '@tanstack/react-query-devtools': 5.90.2
  '@testing-library/jest-dom': 6.9.1
  '@testing-library/react': 16.3.0
  '@testing-library/user-event': 14.6.1
  '@thunderid/react': 0.5.0
  '@thunderid/react-router': 0.4.0
  '@types/lodash-es': 4.17.12
  '@types/node': 24.7.2
  '@types/react': 19.2.14
  '@types/react-dom': 19.2.3
  '@playwright/test': 1.60.0
  '@vitejs/plugin-basic-ssl': 2.3.0
  '@vitejs/plugin-react': 6.0.2
  '@vitest/browser-playwright': 4.1.8
  '@vitest/coverage-istanbul': 4.1.8
  '@wso2/oxygen-ui': 0.11.0
  '@wso2/oxygen-ui-icons-react': 0.11.0
  babel-plugin-react-compiler: 19.1.0-rc.3
  clsx: 2.1.1
  dayjs: 1.11.18
  dompurify: 3.4.11
  eslint: 9.39.4
  globals: 16.4.0
  i18next: 25.6.0
  jsdom: 27.0.1
  lodash-es: 4.18.1
  lucide-react: 0.545.0
  playwright: 1.60.0
  prettier: 3.6.2
  react: 19.2.3
  react-dom: 19.2.3
  react-hook-form: 7.65.0
  react-i18next: 16.0.1
  react-router: 7.15.1
  rimraf: 6.1.3
  rolldown: 1.0.0-beta.45
  rollup-plugin-visualizer: 6.0.5
  tslib: 2.8.1
  turbo: 2.10.2
  typescript: 5.9.3
  typescript-eslint: 8.57.2
  vite: 8.0.16
  vite-plugin-svgr: 5.2.0
  vitest: 4.1.8
  zod: 4.3.6

overrides:
  # JUSTIFICATION: Fixes GHSA-w7jw-789q-3m8p by overriding to fix docusaurus version in docs workspace only.
  "@thunderid/docs>shell-quote": 1.8.4
  # JUSTIFICATION: The `ws` package is a transitive dependency of `docusaurus/core -> webpack-bundle-analyzer` and it requires a major version bump.
  ws: '>=8.21.0'
  # JUSTIFICATION: Packed through next@15.5.18. Could be resolved once next is updated to 16 versions.
  postcss: 8.5.10
  openapi-to-postmanv2>ajv: 8.18.0
  ajv-draft-04>ajv: 8.18.0
  ajv-formats>ajv: 8.18.0
  flatted: 3.4.2
  vite: 'catalog:'
  # JUSTIFICATION: Fixes GHSA-fx2h-pf6j-xcff — vite `server.fs.deny` bypass on Windows alternate paths.
  vite@>=8.0.0 <=8.0.15: '>=8.0.16'
  vue: 3.5.34
  defu: 6.1.5
  dompurify: '>=3.4.11'
  follow-redirects: 1.16.0
  unhead: 2.1.13
  minimatch@>=5.0.0 <5.1.8: '>=5.1.8'
  minimatch@<3.1.4: '>=3.1.4'
  # ESLint plugin packages still require CJS-style minimatch resolution from the 3.x line.
  eslint-plugin-react>minimatch: '3.1.5'
  eslint-plugin-jsx-a11y>minimatch: '3.1.5'
  serialize-javascript: '>=7.0.5'
  webpack: '5.105.0'
  yaml: 2.8.3
  path-to-regexp: 0.1.13
  svgo: 3.3.3
  brace-expansion@>=4.0.0 <5.0.5: 5.0.5
  lodash: 4.18.1
  js-yaml@>=4.0.0 <=4.1.1: 4.2.0
  # JUSTIFICATION: Fixes GHSA-h67p-54hq-rp68 — quadratic-complexity DoS in js-yaml merge key handling.
  js-yaml@<3.15.0: 3.15.0
  # JUSTIFICATION: Fixes GHSA-64mm-vxmg-q3vj — http-proxy-middleware router host+path substring match bypass.
  http-proxy-middleware: 2.0.10
  # TODO: Remove once `nuxt` bumps `devalue` to 5.8.1 or later.
  devalue: 5.8.1
  # JUSTIFICATION: Fixes CVE-2026-44705 (GHSA-ph9p-34f9-6g65) — Path Traversal via unsanitized prefix/postfix in tmp,
  # and GHSA-7c78-jf6q-g5cm — type-confusion bypass of _assertPath (vulnerable in <0.2.7).
  tmp: '>=0.2.7'
  # JUSTIFICATION: Transitive dep via js-beautify. Fixes CVE-2026-46625 (GHSA-qjx8-664m-686j) — prototype hijack in assign() allows cookie-attribute injection.
  js-cookie: 3.0.7
  # JUSTIFICATION: @langchain/langgraph requires uuid@^10.0.0 (not yet bumped upstream to v11). Fixes predictable RNG vulnerability in uuid < 11.1.1.
  uuid: 11.1.1
  # JUSTIFICATION: Fixes GHSA-r7qp-cfhv-p84w — node-tar applies PAX size override to intermediary GNU long-name/link headers causing tar parser interpretation differential (file smuggling).
  tar: '>=7.5.16'
  # JUSTIFICATION: Fixes GHSA-9cwx-2883-4wfx — launch-editor NTLMv2 hash disclosure via UNC path handling on Windows (transitive via vite and other tooling).
  launch-editor: '>=2.14.1'
  # JUSTIFICATION: Fixes GHSA-86vr-4h7v-f9x9 — @babel/core arbitrary file read via sourceMappingURL comment.
  # Bounded to <8 so it stays on the patched 7.x line: @docusaurus/core and @vitest/coverage-istanbul
  # require Babel 7 and break on the 8.x ESM export changes.
  '@babel/core': '>=7.29.6 <8'
  # JUSTIFICATION: Transitive dep via docusaurus. Fixes CVE-2026-48038 (GHSA-q7cg-457f-vx79) — uncaught RangeError DoS in joi on deeply nested input through recursive link() schemas.
  joi: '>=18.2.1'
  # JUSTIFICATION: Fixes GHSA-gv7w-rqvm-qjhr — esbuild Deno module downloads native binaries without integrity verification, enabling RCE via NPM_CONFIG_REGISTRY.
  esbuild: '>=0.28.1'
  # JUSTIFICATION: Fixes GHSA-vxpw-j846-p89q (high DoS), GHSA-p88m-4jfj-68fv (HTTP header injection),
  # GHSA-35p6-xmwp-9g52 and GHSA-g8m3-5g58-fq7m — transitive via @codecov/vite-plugin chain.
  undici: '>=6.27.0'

packageExtensions:
  '@hookform/resolvers':
    peerDependencies:
      zod: '*'

peerDependencyRules:
  allowedVersions:
    # JUSTIFICATION: @codecov/vite-plugin@2.0.1 declares a vite peer range of
    # 4.x || 5.x || 6.x, but this workspace pins vite to 8.0.16. Bundle analysis
    # was verified to run correctly against this build (the plugin collects stats
    # during the build and uploads via OIDC in CI), so Vite 8 is explicitly
    # allowed for this plugin's vite peer.
    '@codecov/vite-plugin>vite': '8'

auditConfig:
  ignoreCves: []

minimumReleaseAgeExclude:
  - '@thunderid/*'
