              kind: IdentityProvider
              ...
            size: 128
        envFile:
          fileName: .env
          content: |
            GOOGLE_CLIENT_ID=
            GOOGLE_CLIENT_SECRET=
          size: 40
        summary:
          totalFiles: 2
          totalSizeBytes: 168
          exportedAt: 2026-04-22T10:00:00Z
          resourceTypes:
            identity_provider: 1
    JSONExportResponse:
      type: object
      description: >
        JSON response returned by the export endpoints. The `resources` field
