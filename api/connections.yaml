openapi: 3.0.3

info:
  title: Connections API
  description: >-
    Configure the external services ThunderID connects to. This is a thin layer over the
    identity-provider and notification-sender services: each connection type has a strict,
    vendor-specific schema and is delegated to the underlying provider, so a configured
    connection is a real identity provider or message sender. Multiple instances per type
    are supported.
  version: "1.0"
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: Connections
    description: Discover available connection types and configure their instances.

security:
  - OAuth2: [system]

paths:
  /connections:
    get:
      tags: [Connections]
      summary: List configured connection instances
      description: >-
        Returns a paginated list of the configured connection instances across the
        identity-provider and notification-sender backed connection types, optionally
        filtered by functional category. Omit the category parameter to return all instances.
      parameters:
        - name: category
          in: query
          required: false
          description: Filter instances by functional category. Omit to return all instances.
          schema:
            type: string
            enum: [identity-provider, sms-provider]
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
      responses:
        "200":
          description: A page of the configured connection instances
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConnectionListResponse'
              example:
                totalResults: 3
                startIndex: 1
                count: 3
                connections:
                  - id: "a1b2c3d4-0000-0000-0000-000000000001"
                    name: "My Google"
                    type: "google"
                    categories: ["identity-provider"]
                  - id: "a1b2c3d4-0000-0000-0000-000000000002"
                    name: "Corp OIDC"
                    description: "Corporate login"
                    type: "oidc"
                    categories: ["identity-provider"]
                  - id: "a1b2c3d4-0000-0000-0000-000000000003"
                    name: "Twilio SMS"
                    type: "twilio"
                    categories: ["sms-provider"]
                links: []
        "400": { $ref: '#/components/responses/BadRequest' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }

  /connections/google:
    get:
      tags: [Connections]
      summary: List configured Google connections
      responses:
        "200": { $ref: '#/components/responses/InstanceList' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }
    post:
      tags: [Connections]
      summary: Create a Google connection
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GoogleConnectionCreateRequest' }
      responses:
        "201":
          description: Connection created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoogleConnectionResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "409": { $ref: '#/components/responses/Conflict' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }
  /connections/google/{id}:
    parameters:
      - { $ref: '#/components/parameters/ConnectionID' }
    get:
      tags: [Connections]
      summary: Get a Google connection
      responses:
        "200":
          description: Connection details (secrets masked)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoogleConnectionResponse' }
        "404": { $ref: '#/components/responses/NotFound' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }
    put:
      tags: [Connections]
      summary: Update a Google connection
      description: Omit clientSecret to keep the stored value.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GoogleConnectionUpdateRequest' }
      responses:
        "200":
          description: Connection updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GoogleConnectionResponse' }
        "400": { $ref: '#/components/responses/BadRequest' }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }
    delete:
      tags: [Connections]
      summary: Delete a Google connection
      responses:
        "204": { description: Connection deleted }
        "404": { $ref: '#/components/responses/NotFound' }
        "409": { $ref: '#/components/responses/Conflict' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }
  /connections/google/{id}/usages:
    parameters:
      - { $ref: '#/components/parameters/ConnectionID' }
    get:
      tags: [Connections]
      summary: Get Google connection usages
      description: |
        Returns the resources that reference this connection, aggregated across all resource
        types (for example, flows that use it). Informational only — it drives the pre-delete
        confirmation dialog in the UI and does not gate deletion on the server.

        Each usage entry includes a `behaviorOnDelete` field describing what happens to the
        referencing resource if the connection is deleted:
        - `fallback`: the reference is kept as-is.
        - `cascade`: the resource is permanently deleted along with the connection.
        - `restrict`: the resource blocks deletion of the connection.

        When usage data is unavailable (e.g. the server has not fully initialised),
        `totalResults` and `summary` are `null` rather than `0`/empty. Consumers must treat
        `null` as "unknown" and `0` as "confirmed empty".
      responses:
        "200": { $ref: '#/components/responses/ConnectionUsages' }
        "404": { $ref: '#/components/responses/NotFound' }
        "401": { $ref: '#/components/responses/Unauthorized' }
        "403": { $ref: '#/components/responses/Forbidden' }
        "500": { $ref: '#/components/responses/InternalServerError' }

