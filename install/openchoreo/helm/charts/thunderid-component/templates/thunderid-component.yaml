---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: {{ .Values.componentName }}
  annotations:
    openchoreo.dev/description: "ThunderID Identity Management Service"
    openchoreo.dev/display-name: "ThunderID"
spec:
  owner:
    projectName: {{ .Values.project.name }}
  componentType:
    kind: {{ if .Values.componentType.cluster }}ClusterComponentType{{ else }}ComponentType{{ end }}
    name: deployment/thunderid
  parameters:
    image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
    runtime:
      imagePullPolicy: "Always"
      gate:
        clientBase: {{ .Values.gate.clientBase | quote }}
      console:
        clientBase: {{ .Values.console.clientBase | quote }}
        clientId: {{ .Values.console.clientId | quote }}
        scopes: {{ .Values.console.scopes | quote }}
      dbType: {{ .Values.database.type | quote }}
      dbStorageSize: {{ .Values.database.storageSize | default "1Gi" | quote }}

---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: {{ .Values.componentName }}
spec:
  owner:
    componentName: {{ .Values.componentName }}
    projectName: {{ .Values.project.name }}
  container:
    image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
    env:
      - key: SERVER_PORT
        value: {{ .Values.thunderid.server.port | quote }}
      - key: JWT_VALIDITY
        value: {{ .Values.jwt.validity | quote }}
      - key: OAUTH_REFRESH_TOKEN_VALIDITY
        value: {{ .Values.oauth.refresh_token_validity | quote }}
      - key: CACHE_SIZE
        value: {{ .Values.cache.size | quote }}
      - key: CACHE_TTL
        value: {{ .Values.cache.ttl | quote }}
      - key: CONSENT_ENABLED
        value: {{ .Values.consent.enabled | quote }}
      - key: CONSENT_BASE_URL
        value: {{ .Values.consent.baseUrl | quote }}
      - key: GATE_CLIENT_BASE
        value: {{ .Values.gate.clientBase | quote }}
      - key: CONSOLE_CLIENT_BASE
        value: {{ .Values.console.clientBase | quote }}
      - key: CONSOLE_CLIENT_ID
        value: {{ .Values.console.clientId | quote }}
      - key: CONSOLE_SCOPES
        value: {{ .Values.console.scopes | quote }}
      - key: CORS_ALLOWED_ORIGINS
        value: {{ .Values.cors.allowed_origins | toJson | quote }}
      - key: GATE_CLIENT_PORT
        value: {{ .Values.gate.port | quote }}
      - key: GATE_CLIENT_SCHEME
        value: {{ .Values.gate.scheme | quote }}
      - key: DB_CONFIG_PATH
        value: {{ .Values.database.config.sqlite.path | default "database/configdb.db" | quote }}
      - key: DB_RUNTIME_PATH
        value: {{ .Values.database.runtime.sqlite.path | default "database/runtimedb.db" | quote }}
      - key: DB_USER_PATH
        value: {{ .Values.database.user.sqlite.path | default "database/userdb.db" | quote }}
      - key: CRYPTO_ENCRYPTION_KEY
        value: {{ .Values.crypto.encryption.key | quote }}
  endpoints:
    api:
      type: HTTP
      port: {{ .Values.thunder.server.port }}
      displayName: "ThunderID API"
      visibility:
        - external
