          type: integer
          description: "Number of elements in the returned page."
          example: 10
        applications:
          type: array
          items:
            $ref: '#/components/schemas/BasicApplicationResponse'

    AssertionConfig:
      type: object
      description: |
        Assertion configuration for application-level (root) assertions.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the token in seconds.
          example: 3600
        userAttributes:
          type: array
          items:
            type: string
          description: The user attributes to include in the token.
          example: ["email", "username"]

    AccessTokenConfig:
      type: object
      description: |
        Access token configuration for OAuth applications, split by token subject.
      properties:
        userConfig:
          allOf:
            - $ref: '#/components/schemas/AccessTokenSubConfig'
          description: Configuration applied when the access token's subject is an end user.
        clientConfig:
          allOf:
            - $ref: '#/components/schemas/AccessTokenSubConfig'
          description: >
            Configuration applied when the access token's subject is the OAuth client itself,
            issued only via the client_credentials grant.

    AccessTokenSubConfig:
      type: object
      description: |
        Validity period and attribute selection for one access token subject type.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the access token in seconds. If not specified, falls back to application-level or deployment default.
          example: 3600
        attributes:
          type: array
          items:
            type: string
          description: The attributes to include in the access token.
          example: ["email", "username"]

    IDTokenConfig:
      type: object
      description: |
        ID token configuration for OAuth applications.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the ID token in seconds. If not specified, falls back to application-level or deployment default.
          example: 3600
        userAttributes:
          type: array
          items:
            type: string
          description: The user attributes to include in the ID token. Only claims requested by scopes AND listed here will be included.
          example: ["email", "name", "given_name", "family_name"]
        responseType:
          type: string
          description: |
            The format of the ID token response.
            JWT returns a standard signed JWT (default).
            JWE returns an encrypted JWT — requires encryptionAlg, encryptionEnc, and a client certificate.
            NESTED_JWT returns a sign-then-encrypt JWT — requires encryptionAlg, encryptionEnc, and a client certificate.
          enum: ["JWT", "JWE", "NESTED_JWT"]
          example: "JWE"
        encryptionAlg:
          type: string
          description: JWE key-management algorithm for encrypted ID token responses (e.g. RSA-OAEP-256). Required when responseType is JWE or NESTED_JWT.
          enum: ["RSA-OAEP", "RSA-OAEP-256"]
          example: "RSA-OAEP-256"
        encryptionEnc:
          type: string
          description: JWE content-encryption algorithm (e.g. A256GCM). Required when responseType is JWE or NESTED_JWT.
          enum: ["A128CBC-HS256", "A256GCM"]
          example: "A256GCM"
    
    RefreshTokenConfig:
      type: object
      description: |
        Refresh token configuration for OAuth applications.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the refresh token in seconds. If not specified, falls back to application-level or deployment default.
          example: 86400

    IDJAGConfig:
      type: object
      description: |
        Identity Assertion Authorization Grant (ID-JAG) configuration for OAuth applications
        (draft-ietf-oauth-identity-assertion-authz-grant). Governs whether this application may
        exchange a self-issued ID token for an ID-JAG targeted at an external resource
        authorization server, via the token endpoint's token-exchange grant with
        requested_token_type=urn:ietf:params:oauth:token-type:id-jag.
      properties:
        enabled:
          type: boolean
          description: >-
            Enable ID-JAG issuance for this application. Requires a confidential client
            (tokenEndpointAuthMethod other than "none") and at least one entry in
            allowedAudiences.
          example: true
          default: false
        allowedAudiences:
          type: array
          items:
            type: string
          description: |
            Resource authorization server identifiers this application may request ID-JAGs for.
            The audience parameter on the token-exchange request must exactly match one of
            these values.
          example: ["https://api.partner.example.com"]
        validityPeriod:
          type: integer
          description: The validity period of an issued ID-JAG in seconds. Defaults to 300 if not specified.
          example: 300
          default: 300

    UserInfoConfig:
      type: object
      description: UserInfo endpoint configuration for the OAuth application
      properties:
        responseType:
          type: string
          description: |
            The format of the UserInfo response.
            JSON returns a plain JSON object.
            JWS returns a signed JWT — requires signingAlg.
            JWE returns an encrypted JWT — requires encryptionAlg, encryptionEnc, and a client certificate.
            NESTED_JWT returns a sign-then-encrypt JWT — requires signingAlg, encryptionAlg, encryptionEnc, and a client certificate.
          enum: ["JSON", "JWS", "JWE", "NESTED_JWT"]
          example: "JWS"
        userAttributes:
          type: array
          items:
            type: string
          description: |
            The user attributes to include in the userinfo response.
            If not specified, falls back to ID token user attributes.
          example: ["email", "name", "given_name", "family_name", "picture"]
        signingAlg:
          type: string
          description: |
            JWS algorithm used to sign the UserInfo response JWT.
            When set (without encryptionAlg), the response is a signed JWT (JWS).
            When set together with encryptionAlg, the response is a Nested JWT (sign-then-encrypt).
            Omit to return a plain JSON response.
          enum: ["RS256", "RS512", "PS256", "ES256", "ES384", "ES512", "EdDSA"]
          example: "RS256"
        encryptionAlg:
          type: string
          description: |
            JWE key-management algorithm used to encrypt the UserInfo response.
            Must be set together with encryptionEnc and a client certificate (JWKS).
            When set without signingAlg, the response is a JWE over the plain JSON payload.
            When set together with signingAlg, the response is a Nested JWT (sign-then-encrypt).
          enum: ["RSA-OAEP", "RSA-OAEP-256"]
          example: "RSA-OAEP-256"
        encryptionEnc:
          type: string
          description: |
            JWE content-encryption algorithm used to encrypt the UserInfo response payload.
            Required when encryptionAlg is set.
          enum: ["A128CBC-HS256", "A256GCM"]
          example: "A256GCM"

    Certificate:
      type: object
      properties:
        type:
          type: string
          description: The type of the certificate.
          enum:
            - "JWKS"
            - "JWKS_URI"
          example: "JWKS_URI"
        value:
          type: string
          description: The value of the certificate.
          example: "https://myapp.example.com/.well-known/jwks"

    Attestation:
      type: object
      description: >
        Platform attestation configuration used to verify the binary identity of a mobile client
        when it initiates a flow directly over HTTP. Configure exactly one platform.
      oneOf:
        - required: [android]
        - required: [apple]
      properties:
        android:
          $ref: '#/components/schemas/AndroidAttestation'
        apple:
          $ref: '#/components/schemas/AppleAttestation'

    AndroidAttestation:
      type: object
      description: Google Play Integrity attestation configuration for Android clients.
      properties:
        packageName:
          type: string
          description: Android application package name that must match the attested app.
          example: "com.example.myapp"
        certificateSha256Digests:
          type: array
          items:
            type: string
          description: >
            Allowed SHA-256 digests of the app signing certificate, in the URL-safe base64 form
            reported by the Play Integrity API. The attested app must match one of these.
          example: ["9VvjU4Gu7dg1234examplebase64digest"]
        serviceAccountCredentials:
          type: string
          writeOnly: true
          description: >
            Google Cloud service account credentials (JSON) used to call the Play Integrity API.
            Write-only: never returned in responses. Omit on update to preserve the stored value.

    AppleAttestation:
      type: object
      description: Apple App Attest attestation configuration for iOS clients.
      required: [teamId, bundleId]
      properties:
        teamId:
          type: string
          minLength: 1
          description: Apple Developer Team ID.
          example: "ABCDE12345"
        bundleId:
          type: string
          minLength: 1
          description: iOS application bundle identifier that must match the attested app.
          example: "com.example.myapp"

    InboundAuthConfig:
      type: object
      properties:
        type:
          type: string
          description: The type of inbound authentication.
          enum:
            - "oauth2"
          example: "oauth2"
        config:
          $ref: '#/components/schemas/OAuthAppConfig'

    InboundAuthConfigComplete:
      type: object
      properties:
        type:
          type: string
          description: The type of inbound authentication.
          enum:
            - "oauth2"
          example: "oauth2"
        config:
          $ref: '#/components/schemas/OAuthAppConfigComplete'

    OAuthAppConfig:
      type: object
      properties:
        clientId:
          type: string
          description: The client ID for the OAuth application.
          example: "myapp_client_id"
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: A list of redirect URIs for the OAuth application.
          example: ["https://myapp.example.com/callback", "https://myapp.example.com/oauth/callback"]
        grantTypes:
          type: array
          items:
            type: string
            enum: ["authorization_code", "client_credentials", "refresh_token", "implicit", "password", "urn:ietf:params:oauth:grant-type:token-exchange", "urn:ietf:params:oauth:grant-type:jwt-bearer"]
          description: >-
            A list of grant types supported by the OAuth application. Defaults to
            ["authorization_code"] if not specified. The
            urn:ietf:params:oauth:grant-type:jwt-bearer grant, used to present an ID-JAG assertion
            issued by a trusted external IdP (draft-ietf-oauth-identity-assertion-authz-grant),
            requires a confidential client (tokenEndpointAuthMethod other than "none").
          example: ["authorization_code", "refresh_token"]
        responseTypes:
          type: array
          items:
            type: string
            enum: ["code", "token"]
          description: A list of response types supported by the OAuth application. Defaults to ["code"] if not specified.
          example: ["code"]
        tokenEndpointAuthMethod:
          type: string
          enum: ["client_secret_basic", "client_secret_post", "private_key_jwt", "none"]
          description: The token endpoint authentication method for the OAuth application. Defaults to "client_secret_basic" if not specified.
          example: "client_secret_basic"
        pkceRequired:
          type: boolean
          description: Whether PKCE (Proof Key for Code Exchange) is required for this application.
          example: false
          default: false
        publicClient:
          type: boolean
          description: Whether the application is a public client (Mobile apps, SPAs, etc.), which cannot store secrets securely.
          example: false
          default: false
        requirePushedAuthorizationRequests:
          type: boolean
          description: Whether Pushed Authorization Requests (PAR) per RFC 9126 are required for this application.
          example: false
          default: false
        dpopBoundAccessTokens:
          type: boolean
          description: Whether DPoP-bound access tokens (RFC 9449) are required for this application.
          example: false
          default: false
        includeActClaim:
          type: boolean
          description: >-
            When true, access tokens issued through this client's authorization_code flow include
            an implicit on-behalf-of `act` claim identifying the application.
          example: false
          default: false
        scopes:
          type: array
          items:
            type: string
          description: List of scopes that the client can request.
          example: ["openid", "profile", "email"]
        token:
          type: object
          properties:
            accessToken:
              $ref: '#/components/schemas/AccessTokenConfig'
            idToken:
              $ref: '#/components/schemas/IDTokenConfig'
            refreshToken:
              $ref: '#/components/schemas/RefreshTokenConfig'
            idJag:
              $ref: '#/components/schemas/IDJAGConfig'
        userInfo:
          $ref: '#/components/schemas/UserInfoConfig'
        scopeClaims:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Custom scope-to-claims mapping. Overrides default OIDC scope claims or defines custom scopes. Applies to both ID token and userinfo responses.
          example:
            profile: ["name", "family_name", "given_name", "picture"]
            employee: ["emp_id", "department"]
        certificate:
          $ref: '#/components/schemas/Certificate'
        acrValues:
          type: array
          items:
            type: string
          description: |
            ACR (Authentication Context Class Reference) values for the application.
            Defines the allowed set of ACR values for authorization requests. When acr_values is
            provided in an authorization request, only values present in this list are accepted;
            unrecognised values are silently ignored. If filtering removes all requested ACRs,
            the full list is used as a fallback. When acr_values is omitted from the request,
            this configured list is used as the effective ACR set.
          example: ["urn:thunder:silver", "urn:thunder:gold"]

    OAuthAppConfigComplete:
      type: object
      properties:
        clientId:
          type: string
          description: The client ID for the OAuth application.
          example: "myapp_client_id"
        clientSecret:
          type: string
          description: The client secret for the OAuth application. Omitted for public clients.
          example: "myapp_client_secret"
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: A list of redirect URIs for the OAuth application.
          example: ["https://myapp.example.com/callback", "https://myapp.example.com/oauth/callback"]
        grantTypes:
          type: array
          items:
            type: string
            enum: ["authorization_code", "client_credentials", "refresh_token", "implicit", "password", "urn:ietf:params:oauth:grant-type:token-exchange", "urn:ietf:params:oauth:grant-type:jwt-bearer"]
          description: >-
            A list of grant types supported by the OAuth application. Defaults to
            ["authorization_code"] if not specified. The
            urn:ietf:params:oauth:grant-type:jwt-bearer grant, used to present an ID-JAG assertion
            issued by a trusted external IdP (draft-ietf-oauth-identity-assertion-authz-grant),
            requires a confidential client (tokenEndpointAuthMethod other than "none").
          example: ["authorization_code", "refresh_token"]
        responseTypes:
          type: array
          items:
            type: string
            enum: ["code", "token"]
          description: A list of response types supported by the OAuth application. Defaults to ["code"] if not specified.
          example: ["code"]
        tokenEndpointAuthMethod:
          type: string
          enum: ["client_secret_basic", "client_secret_post", "private_key_jwt", "none"]
          description: The token endpoint authentication method for the OAuth application. Defaults to "client_secret_basic" if not specified.
          example: "client_secret_basic"
        pkceRequired:
          type: boolean
          description: Whether PKCE (Proof Key for Code Exchange) is required for this application.
          example: false
          default: false
        publicClient:
          type: boolean
          description: Whether the application is a public client (Mobile apps, SPAs, etc.), which cannot store secrets securely.
          example: false
          default: false
        requirePushedAuthorizationRequests:
          type: boolean
          description: Whether Pushed Authorization Requests (PAR) per RFC 9126 are required for this application.
          example: false
          default: false
        dpopBoundAccessTokens:
          type: boolean
          description: Whether DPoP-bound access tokens (RFC 9449) are required for this application.
          example: false
          default: false
        includeActClaim:
          type: boolean
          description: >-
            When true, access tokens issued through this client's authorization_code flow include
            an implicit on-behalf-of `act` claim identifying the application.
          example: false
          default: false
        scopes:
          type: array
          items:
            type: string
          description: List of scopes that the client can request.
          example: ["openid", "profile", "email"]
        token:
          type: object
          properties:
            accessToken:
              $ref: '#/components/schemas/AccessTokenConfig'
            idToken:
              $ref: '#/components/schemas/IDTokenConfig'
            refreshToken:
              $ref: '#/components/schemas/RefreshTokenConfig'
            idJag:
              $ref: '#/components/schemas/IDJAGConfig'
        userInfo:
          $ref: '#/components/schemas/UserInfoConfig'
        scopeClaims:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Custom scope-to-claims mapping. Overrides default OIDC scope claims or defines custom scopes. Applies to both ID token and userinfo responses.
          example:
            profile: ["name", "family_name", "given_name", "picture"]
            employee: ["emp_id", "department"]
        certificate:
          $ref: '#/components/schemas/Certificate'
        acrValues:
          type: array
          items:
            type: string
          description: |
            ACR (Authentication Context Class Reference) values for the application.
            Defines the allowed set of ACR values for authorization requests. When acr_values is
            provided in an authorization request, only values present in this list are accepted;
            unrecognised values are silently ignored. If filtering removes all requested ACRs,
            the full list is used as a fallback. When acr_values is omitted from the request,
            this configured list is used as the effective ACR set.
          example: ["urn:thunder:silver", "urn:thunder:gold"]

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "Error code. Codes follow the APP-XXXX convention."
          example: "APP-1001"
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
