server:
  hostname: "0.0.0.0"
  port: {{ .Values.configuration.server.port }}
  http_only: {{ .Values.configuration.server.httpOnly }}
  public_url: {{ .Values.configuration.server.publicUrl | quote }}
  {{- if .Values.configuration.server.security }}
  security:
    {{- if .Values.configuration.server.security.jwksCacheTtl }}
    jwks_cache_ttl: {{ .Values.configuration.server.security.jwksCacheTtl }}
    {{- end }}
    {{- if .Values.configuration.server.security.trustedIssuer }}
    trusted_issuer:
      issuer: {{ .Values.configuration.server.security.trustedIssuer.issuer | quote }}
      jwks_url: {{ .Values.configuration.server.security.trustedIssuer.jwksUrl | quote }}
      audience: {{ .Values.configuration.server.security.trustedIssuer.audience | quote }}
      {{- if .Values.configuration.server.security.trustedIssuer.requiredClaims }}
      required_claims:
        {{- range .Values.configuration.server.security.trustedIssuer.requiredClaims }}
        - claim: {{ .claim | quote }}
          value: {{ .value | quote }}
        {{- end }}
      {{- end }}
    {{- end }}
    {{- if .Values.configuration.server.security.directAuthSecret }}
    direct_auth_secret: {{ .Values.configuration.server.security.directAuthSecret | quote }}
    {{- end }}
  {{- end }}

gate_client:
  # hostname/port/scheme default to the server's public URL. Required only when Gate is hosted separately.
  {{- if .Values.configuration.gateClient.hostname }}
  hostname: {{ .Values.configuration.gateClient.hostname | quote }}
  {{- end }}
  {{- if .Values.configuration.gateClient.port }}
  port: {{ .Values.configuration.gateClient.port }}
  {{- end }}
  {{- if .Values.configuration.gateClient.scheme }}
  scheme: {{ .Values.configuration.gateClient.scheme | quote }}
  {{- end }}
  {{- if .Values.configuration.gateClient.path }}
  path: {{ .Values.configuration.gateClient.path | quote }}
  {{- end }}
  {{- if .Values.configuration.gateClient.loginPath }}
  login_path: {{ .Values.configuration.gateClient.loginPath | quote }}
  {{- end }}
  {{- if .Values.configuration.gateClient.errorPath }}
  error_path: {{ .Values.configuration.gateClient.errorPath | quote }}
  {{- end }}

tls:
  min_version: {{ .Values.configuration.tls.minVersion | quote }}
  cert_file: {{ .Values.configuration.tls.certFile | quote }}
  key_file: {{ .Values.configuration.tls.keyFile | quote }}

crypto:
  encryption:
    key: {{ .Values.configuration.crypto.encryption.key | quote }}
  password_hashing:
    algorithm: {{ .Values.configuration.crypto.passwordHashing.algorithm | quote }}
    pbkdf2:
      salt_size: {{ .Values.configuration.crypto.passwordHashing.pbkdf2.salt_size }}
      iterations: {{ .Values.configuration.crypto.passwordHashing.pbkdf2.iterations }}
      key_size: {{ .Values.configuration.crypto.passwordHashing.pbkdf2.key_size }}
    argon2id:
      salt_size: {{ .Values.configuration.crypto.passwordHashing.argon2id.salt_size }}
      iterations: {{ .Values.configuration.crypto.passwordHashing.argon2id.iterations }}
      key_size: {{ .Values.configuration.crypto.passwordHashing.argon2id.key_size }}
      memory: {{ .Values.configuration.crypto.passwordHashing.argon2id.memory }}
      parallelism: {{ .Values.configuration.crypto.passwordHashing.argon2id.parallelism }}
    sha256:
      salt_size: {{ .Values.configuration.crypto.passwordHashing.sha256.salt_size }}
  keys:
  {{- range .Values.configuration.crypto.keys }}
    - id: {{ .id | quote }}
      cert_file: {{ .certFile | quote }}
      key_file: {{ .keyFile | quote }}
  {{- end }}

database:
  config:
    type: {{ .Values.configuration.database.config.type | quote }}
    {{- if eq .Values.configuration.database.config.type "sqlite" }}
    sqlite:
      path: {{ .Values.configuration.database.config.sqlite.path | quote }}
      options: {{ .Values.configuration.database.config.sqlite.options | quote }}
      max_open_conns: {{ .Values.configuration.database.config.sqlite.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.config.sqlite.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.config.sqlite.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.config.sqlite.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.config.sqlite.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.config.sqlite.max_retry_backoff_ms }}
    {{- else }}
    postgres:
      hostname: {{ .Values.configuration.database.config.postgres.hostname | quote }}
      port: {{ .Values.configuration.database.config.postgres.port }}
      name: {{ .Values.configuration.database.config.postgres.name | quote }}
      username: {{ .Values.configuration.database.config.postgres.username | quote }}
      password: {{ "{{.DB_CONFIG_PASSWORD}}" | quote }}
      sslmode: {{ .Values.configuration.database.config.postgres.sslmode | quote }}
      max_open_conns: {{ .Values.configuration.database.config.postgres.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.config.postgres.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.config.postgres.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.config.postgres.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.config.postgres.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.config.postgres.max_retry_backoff_ms }}
    {{- end }}
  runtime:
    type: {{ .Values.configuration.database.runtime.type | quote }}
    {{- if eq .Values.configuration.database.runtime.type "sqlite" }}
    sqlite:
      path: {{ .Values.configuration.database.runtime.sqlite.path | quote }}
      options: {{ .Values.configuration.database.runtime.sqlite.options | quote }}
      max_open_conns: {{ .Values.configuration.database.runtime.sqlite.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.runtime.sqlite.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.runtime.sqlite.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.runtime.sqlite.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.runtime.sqlite.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.runtime.sqlite.max_retry_backoff_ms }}
    {{- else if eq .Values.configuration.database.runtime.type "redis" }}
    redis:
      address: {{ .Values.configuration.database.runtime.redis.address | quote }}
      username: {{ .Values.configuration.database.runtime.redis.username | quote }}
      password: {{ "{{.DB_RUNTIME_REDIS_PASSWORD}}" | quote }}
      db: {{ .Values.configuration.database.runtime.redis.db }}
      key_prefix: {{ .Values.configuration.database.runtime.redis.key_prefix | quote }}
    {{- else }}
    postgres:
      hostname: {{ .Values.configuration.database.runtime.postgres.hostname | quote }}
      port: {{ .Values.configuration.database.runtime.postgres.port }}
      name: {{ .Values.configuration.database.runtime.postgres.name | quote }}
      username: {{ .Values.configuration.database.runtime.postgres.username | quote }}
      password: {{ "{{.DB_RUNTIME_PASSWORD}}" | quote }}
      sslmode: {{ .Values.configuration.database.runtime.postgres.sslmode | quote }}
      max_open_conns: {{ .Values.configuration.database.runtime.postgres.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.runtime.postgres.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.runtime.postgres.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.runtime.postgres.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.runtime.postgres.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.runtime.postgres.max_retry_backoff_ms }}
    {{- end }}
  user:
    type: {{ .Values.configuration.database.user.type | quote }}
    {{- if eq .Values.configuration.database.user.type "sqlite" }}
    sqlite:
      path: {{ .Values.configuration.database.user.sqlite.path | quote }}
      options: {{ .Values.configuration.database.user.sqlite.options | quote }}
      max_open_conns: {{ .Values.configuration.database.user.sqlite.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.user.sqlite.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.user.sqlite.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.user.sqlite.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.user.sqlite.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.user.sqlite.max_retry_backoff_ms }}
    {{- else }}
    postgres:
      hostname: {{ .Values.configuration.database.user.postgres.hostname | quote }}
      port: {{ .Values.configuration.database.user.postgres.port }}
      name: {{ .Values.configuration.database.user.postgres.name | quote }}
      username: {{ .Values.configuration.database.user.postgres.username | quote }}
      password: {{ "{{.DB_USER_PASSWORD}}" | quote }}
      sslmode: {{ .Values.configuration.database.user.postgres.sslmode | quote }}
      max_open_conns: {{ .Values.configuration.database.user.postgres.max_open_conns }}
      max_idle_conns: {{ .Values.configuration.database.user.postgres.max_idle_conns }}
      conn_max_lifetime: {{ .Values.configuration.database.user.postgres.conn_max_lifetime }}
      max_retries: {{ .Values.configuration.database.user.postgres.max_retries }}
      min_retry_backoff_ms: {{ .Values.configuration.database.user.postgres.min_retry_backoff_ms }}
      max_retry_backoff_ms: {{ .Values.configuration.database.user.postgres.max_retry_backoff_ms }}
    {{- end }}

cache:
  disabled: {{ .Values.configuration.cache.disabled }}
  type: {{ .Values.configuration.cache.type | quote }}
  size: {{ .Values.configuration.cache.size }}
  ttl: {{ .Values.configuration.cache.ttl }}
  eviction_policy: {{ .Values.configuration.cache.evictionPolicy | quote }}
  cleanup_interval: {{ .Values.configuration.cache.cleanupInterval }}
  {{- if eq .Values.configuration.cache.type "redis" }}
  redis:
    address: {{ .Values.configuration.cache.redis.address | quote }}
    username: {{ .Values.configuration.cache.redis.username | quote }}
    password: {{ "{{.CACHE_REDIS_PASSWORD}}" | quote }}
    db: {{ .Values.configuration.cache.redis.db }}
    key_prefix: {{ .Values.configuration.cache.redis.keyPrefix | quote }}
  {{- end }}

jwt:
  issuer: {{ .Values.configuration.jwt.issuer | quote }}
  validity_period: {{ .Values.configuration.jwt.validityPeriod }}
  audience: {{ .Values.configuration.jwt.audience | quote }}
  preferred_key_id: {{ .Values.configuration.jwt.preferredKeyId | quote }}

oauth:
  refresh_token:
    renew_on_grant: {{ .Values.configuration.oauth.refreshToken.renewOnGrant }}
    revoke_previous_on_renew: {{ .Values.configuration.oauth.refreshToken.revokePreviousOnRenew }}
    validity_period: {{ .Values.configuration.oauth.refreshToken.validityPeriod }}
  authorization_code:
    validity_period: {{ .Values.configuration.oauth.authorizationCode.validityPeriod }}
  dcr:
    insecure: {{ .Values.configuration.oauth.dcr.insecure }}

flow:
  default_auth_flow_handle: {{ .Values.configuration.flow.defaultAuthFlowHandle | quote }}
  max_version_history: {{ .Values.configuration.flow.maxVersionHistory }}
  auto_infer_registration: {{ .Values.configuration.flow.autoInferRegistration }}
{{- if .Values.configuration.flow.executors }}
  executors:
  {{- range .Values.configuration.flow.executors }}
    - {{ . | quote }}
  {{- end }}
{{- end }}
{{- if .Values.configuration.flow.interceptors }}
  interceptors:
  {{- range .Values.configuration.flow.interceptors }}
    - {{ . | quote }}
  {{- end }}
{{- end }}

passkey:
  allowed_origins:
  {{- range .Values.configuration.passkey.allowedOrigins }}
    - {{ . | quote }}
  {{- end }}

consent:
  enabled: {{ .Values.configuration.consent.enabled }}
  base_url: {{ .Values.configuration.consent.baseUrl | quote }}
  timeout: {{ .Values.configuration.consent.timeout }}
  max_retries: {{ .Values.configuration.consent.maxRetries }}

openid4vp:
  client_id: {{ .Values.configuration.openid4vp.clientId | quote }}
  signing_key_id: {{ .Values.configuration.openid4vp.signingKeyId | quote }}
  ephemeral_key_id: {{ .Values.configuration.openid4vp.ephemeralKeyId | quote }}
  response_enc_values:
  {{- range .Values.configuration.openid4vp.responseEncValues }}
    - {{ . | quote }}
  {{- end }}
  request_validity_seconds: {{ .Values.configuration.openid4vp.requestValiditySeconds }}
  state_ttl_seconds: {{ .Values.configuration.openid4vp.stateTtlSeconds }}
  leeway_seconds: {{ .Values.configuration.openid4vp.leewaySeconds }}
  key_binding_max_age_seconds: {{ .Values.configuration.openid4vp.keyBindingMaxAgeSeconds }}
  result_token_validity_seconds: {{ .Values.configuration.openid4vp.resultTokenValiditySeconds }}
  enforce_key_binding: {{ .Values.configuration.openid4vp.enforceKeyBinding }}
  registration_cert_file: {{ .Values.configuration.openid4vp.registrationCertFile | quote }}
  trusted_anchors:
  {{- range .Values.configuration.openid4vp.trustedAnchors }}
    - name: {{ .name | quote }}
      cert_file: {{ .certFile | quote }}
  {{- end }}

openid4vci:
  signing_key_id: {{ .Values.configuration.openid4vci.signingKeyId | quote }}
  nonce_ttl_seconds: {{ .Values.configuration.openid4vci.nonceTtlSeconds }}
  proof_max_age_seconds: {{ .Values.configuration.openid4vci.proofMaxAgeSeconds }}
  credential_validity_seconds: {{ .Values.configuration.openid4vci.credentialValiditySeconds | int64 }}
  batch_size: {{ .Values.configuration.openid4vci.batchSize }}
  enforce_scope: {{ .Values.configuration.openid4vci.enforceScope }}

declarative_resources:
  enabled: {{ .Values.declarativeResources.enabled }}
