apiVersion: v2
name: thunderid
description: |
  Umbrella Helm chart for the ThunderID Identity Provider on OpenChoreo.

  Sub-charts:
    thunderid-oc-componenttype  — Registers the ComponentType (or ClusterComponentType) once
                               per cluster/namespace. Platform admins install this.
    thunderid-component         — Deploys the Component, Workload, Release, and platform
                               resources for a ThunderID instance. Teams install this.

  Install both together (default):
    helm install thunderid .

  Install only the ComponentType:
    helm install thunderid-type charts/thunderid-oc-componenttype

  Install only the Component (assumes ComponentType already exists):
    helm install thunderid-app charts/thunderid-component -f my-values.yaml
type: application
version: 0.39.0
appVersion: "0.39.0"
dependencies:
  - name: thunderid-oc-componenttype
    version: "0.39.0"
    repository: "file://charts/thunderid-oc-componenttype"
    condition: thunderid-oc-componenttype.enabled
  - name: thunderid-component
    version: "0.39.0"
    repository: "file://charts/thunderid-component"
    condition: thunderid-component.enabled
