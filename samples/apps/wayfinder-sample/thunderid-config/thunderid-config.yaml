# resource_type: flow
id: 0193b0a1-1001-7000-8000-000000000006
name: Default Wayfinder CIBA Email Notification Flow
handle: wayfinder-ciba-email-flow
flowType: AUTHENTICATION
nodes:
  - id: start
    type: START
    onSuccess: identify_user
  - id: identify_user
    type: TASK_EXECUTION
    properties:
      loginHintAttribute: email
    executor:
      name: IdentifyingExecutor
      inputs:
        - identifier: login_hint
          type: TEXT_INPUT
          required: true
    onSuccess: generate_invite
  - id: generate_invite
    type: TASK_EXECUTION
    executor:
      name: InviteExecutor
      mode: generate
    onSuccess: send_notification_email
  - id: send_notification_email
    type: TASK_EXECUTION
    properties:
      emailTemplate: CIBA_NOTIFICATION
    executor:
      name: EmailExecutor
      mode: send
      inputs:
        - identifier: email
          type: EMAIL_INPUT
          required: true
    onSuccess: notification_sent_status
  - id: notification_sent_status
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: notification_icon
          label: "✉️"
          variant: HEADING_1
        - align: center
          type: TEXT
          id: notification_heading
          label: Authentication Request Sent
          variant: HEADING_1
        - align: center
          type: TEXT
          id: notification_message
          label: A notification has been sent. Follow the link in the notification to continue.
          variant: HEADING_6
    message: Authentication notification sent
    next: verify_invite
  - id: verify_invite
    type: TASK_EXECUTION
    executor:
      name: InviteExecutor
      mode: verify
      inputs:
        - identifier: inviteToken
          type: HIDDEN
          required: true
    onSuccess: prompt_credentials
  - id: prompt_credentials
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: credentials_heading
          label: Confirm Your Identity
          variant: HEADING_1
        - align: center
          type: TEXT
          id: credentials_message
          label: Enter your password to approve the authentication request.
          variant: HEADING_6
        - type: BLOCK
          id: block_credentials
          components:
            - id: input_password
              ref: password
              type: PASSWORD_INPUT
              label: Password
              required: true
              placeholder: Enter your password
            - type: ACTION
              id: action_approve
              label: Approve
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: input_password
            identifier: password
            type: PASSWORD_INPUT
            required: true
        action:
          ref: action_approve
          nextNode: basic_auth
  - id: basic_auth
    type: TASK_EXECUTION
    executor:
      name: BasicAuthExecutor
    onSuccess: authorization_check
    onIncomplete: prompt_credentials
  - id: authorization_check
    type: TASK_EXECUTION
    executor:
      name: AuthorizationExecutor
    onSuccess: consent_check
  - id: consent_check
    type: TASK_EXECUTION
    executor:
      name: ConsentExecutor
    onSuccess: auth_assert
    onIncomplete: prompt_consent
  - id: prompt_consent
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: consent_heading
          label: "{{ meta(application.name) }} is requesting authorization"
          variant: HEADING_1
        - align: center
          type: TEXT
          id: consent_message
          label: Review the permissions being requested and confirm your authorization.
          variant: HEADING_6
        - type: BLOCK
          id: consent_block
          components:
            - id: consent_input
              ref: consent_decisions
              type: CONSENT
              required: true
            - type: ACTION
              id: consent_action_deny
              label: Deny
              variant: SECONDARY
              eventType: SUBMIT
            - type: ACTION
              id: consent_action_allow
              label: Approve
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: consent_input
            identifier: consent_decisions
            type: CONSENT
            required: true
