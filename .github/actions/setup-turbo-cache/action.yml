name: Setup Turbo Cache
description: Restores and saves the Turborepo task output cache backed by GitHub Actions cache.

runs:
  using: composite
  steps:
    - name: 🗂️ Cache Turbo
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
      with:
        path: .turbo
        key: turbo-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          turbo-${{ runner.os }}-
