                        isSecret: false
                      - name: "http_headers"
                        value: "******"
                        isSecret: true
                      - name: "supported_channels"
                        value: "email"
                        isSecret: false
        "400":
          description: 'Bad Request: The request is invalid or malformed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "MNS-1006"
