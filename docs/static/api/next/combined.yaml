                  example: example.com
                name:
                  type: string
                  description: Human-readable Relying Party name
                  example: Example Corp
              required:
                - id
                - name
            user:
              type: object
              description: User information for the credential
              properties:
                id:
                  type: string
                  description: Base64url-encoded user handle
                  example: NTUwZTg0MDAtZTI5Yi00MWQ0LWE3MTYtNDQ2NjU1NDQwMDAw
                name:
                  type: string
                  description: User's username or email
                  example: gordon@example.com
                displayName:
                  type: string
                  description: User's display name
                  example: Gordon Freeman
              required:
                - id
                - name
                - displayName
            pubKeyCredParams:
              type: array
              description: Supported public key algorithms
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Type of credential
                    example: public-key
                  alg:
                    type: integer
                    description: COSE algorithm identifier
                    example: -7
              example:
                - type: public-key
                  alg: -7
                - type: public-key
                  alg: -257
            timeout:
              type: integer
              description: Time in milliseconds that the user has to respond to the prompt
              example: 60000
            excludeCredentials:
              type: array
              description: Credentials to exclude from registration
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Type of the credential
                    example: public-key
                  id:
                    type: string
                    description: Base64url-encoded credential ID
                    example: AdC-ff_z-Z1gY2s6e_2A-g
                  transports:
                    type: array
                    description: Hints about where the credential might be stored
                    items:
                      type: string
                      enum:
                        - usb
                        - nfc
                        - ble
                        - internal
                        - hybrid
            authenticatorSelection:
              type: object
              description: Criteria for authenticator selection
              properties:
                authenticatorAttachment:
                  type: string
                  enum:
                    - platform
                    - cross-platform
                  example: platform
                requireResidentKey:
                  type: boolean
                  example: false
                residentKey:
                  type: string
                  enum:
                    - discouraged
                    - preferred
                    - required
                  example: preferred
                userVerification:
                  type: string
                  enum:
                    - required
                    - preferred
                    - discouraged
                  example: preferred
            attestation:
              type: string
              description: Attestation conveyance preference
              enum:
                - none
                - indirect
                - direct
                - enterprise
              example: none
          required:
            - challenge
            - rp
            - user
            - pubKeyCredParams
          example:
            challenge: Z29yZG9uQGV4YW1wbGUuY29tMjAyMS0wMy0xMlQxMjo0NTowMFo
            rp:
              id: example.com
              name: Example Corp
            user:
              id: NTUwZTg0MDAtZTI5Yi00MWQ0LWE3MTYtNDQ2NjU1NDQwMDAw
              name: gordon@example.com
              displayName: Gordon Freeman
            pubKeyCredParams:
              - type: public-key
                alg: -7
              - type: public-key
                alg: -257
            timeout: 60000
            authenticatorSelection:
              authenticatorAttachment: platform
              requireResidentKey: false
              residentKey: preferred
              userVerification: preferred
            attestation: none
        sessionToken:
          type: string
          description: JWT token for the WebAuthn registration session
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      required:
        - publicKeyCredentialCreationOptions
        - sessionToken
    PasskeyRegistrationFinishRequest:
      type: object
      properties:
        publicKeyCredential:
          type: object
          description: PublicKeyCredential as per Passkey standard
          properties:
            id:
              type: string
              description: Base64url-encoded credential ID
              example: AdC-ff_z-Z1gY2s6e_2A-g
            rawId:
              type: string
              description: Base64url-encoded raw credential ID
              example: AdC-ff_z-Z1gY2s6e_2A-g
            type:
              type: string
              description: Type of the credential
              example: public-key
            response:
              type: object
              description: AuthenticatorAttestationResponse
              properties:
                clientDataJSON:
                  type: string
                  description: Base64url-encoded client data JSON
                  example: eyJjaGFsbGVuZ2UiOiJaMm95Wm05eVpHOXVRR1Y0WVcxd2JHVXVZMjl0TWpBeU1TMHdNeTB4TWxSeE1qbzBOVG93TUZvIiwidHlwZSI6IndlYmF1dGhuLmNyZWF0ZSIsIm9yaWdpbiI6Imh0dHBzOi8vZXhhbXBsZS5jb20ifQ
                attestationObject:
                  type: string
                  description: Base64url-encoded attestation object
                  example: o2NmbXRkbm9uZWdhdHRTdG10oGhhdXRoRGF0YVkBZ0mWDeWIDoxodDQXD2R2YFuP5K65ooYyx5lc87qDHZdjRQAAAAA
                transports:
                  type: array
                  description: Available transports for this credential
                  items:
                    type: string
                    enum:
                      - usb
                      - nfc
                      - ble
                      - internal
                      - hybrid
                  example:
                    - internal
                    - hybrid
              required:
                - clientDataJSON
                - attestationObject
            authenticatorAttachment:
              type: string
              description: Authenticator attachment modality
              enum:
                - platform
                - cross-platform
              example: platform
          required:
            - id
            - rawId
            - type
            - response
          example:
            id: AdC-ff_z-Z1gY2s6e_2A-g
            rawId: AdC-ff_z-Z1gY2s6e_2A-g
            type: public-key
            response:
              clientDataJSON: eyJjaGFsbGVuZ2UiOiJaMm95Wm05eVpHOXVRR1Y0WVcxd2JHVXVZMjl0TWpBeU1TMHdNeTB4TWxSeE1qbzBOVG93TUZvIiwidHlwZSI6IndlYmF1dGhuLmNyZWF0ZSIsIm9yaWdpbiI6Imh0dHBzOi8vZXhhbXBsZS5jb20ifQ
              attestationObject: o2NmbXRkbm9uZWdhdHRTdG10oGhhdXRoRGF0YVkBZ0mWDeWIDoxodDQXD2R2YFuP5K65ooYyx5lc87qDHZdjRQAAAAA
              transports:
                - internal
                - hybrid
            authenticatorAttachment: platform
        sessionToken:
          type: string
          description: JWT token for the Passkey registration session
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        credentialName:
          type: string
          description: User-friendly name for the credential
          example: My iPhone
      required:
        - publicKeyCredential
        - sessionToken
    PasskeyRegistrationFinishResponse:
      type: object
      properties:
        credentialId:
          type: string
          description: The unique identifier of the registered credential
          example: AdC-ff_z-Z1gY2s6e_2A-g
        credentialName:
          type: string
          description: User-friendly name for the credential
          example: My iPhone
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the credential was created
          example: 2024-01-15T10:30:00Z
      required:
        - credentialId
    ResourceServer:
      type: object
      required:
        - id
        - name
        - handle
        - ouId
        - delimiter
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the resource server
        name:
          type: string
          description: Name of the resource server
        description:
          type: string
          nullable: true
          description: Optional description of the resource server
        handle:
          type: string
          description: Immutable handle that prefixes all permission strings derived from
            this resource server. Must be unique.
        identifier:
          type: string
          nullable: true
          description: Optional identifier for this resource server. Must be unique in the
            system if provided. When set to an absolute URI, the resource server
            is used in RFC 8707 resource indicator flows and the identifier is
            used as the access token audience claim value.
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to
        delimiter:
          type: string
          description: Character used to separate permission hierarchy levels (immutable
            after creation)
        isReadOnly:
          type: boolean
          description: Whether the resource server is read-only (system-managed)
    CreateResourceServerRequest:
      type: object
      required:
        - name
        - ouId
      properties:
        name:
          type: string
          description: Name of the resource server
        description:
          type: string
          description: Optional description of the resource server
        handle:
          type: string
          description: Immutable handle that prefixes all permission strings derived from
            this resource server. Must be unique. Use lowercase with hyphens
            (e.g., "booking-api").
        identifier:
          type: string
          description: Optional identifier for this resource server. Must be unique in the
            system if provided. When set to an absolute URI, the resource server
            is used in RFC 8707 resource indicator flows and clients can use
            this value in the resource parameter to request audience-restricted
            access tokens.
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to
        delimiter:
          type: string
          description: Optional delimiter character for permission hierarchy (defaults to
            ":", immutable after creation)
    UpdateResourceServerRequest:
      type: object
      required:
        - name
        - ouId
      properties:
        name:
          type: string
          description: Name of the resource server
        description:
          type: string
          description: Optional description of the resource server
        identifier:
          type: string
          description: Optional identifier for this resource server. Must be unique in the
            system if provided. When set to an absolute URI, the resource server
            is used in RFC 8707 resource indicator flows.
        ouId:
          type: string
          format: uuid
          description: ID of the organization unit this resource server belongs to
    Resource:
