# resource_type: flow
id: 0193b0a1-1001-7000-8000-000000000002
name: Wayfinder Password Recovery Flow
handle: wayfinder-recovery-flow
flowType: RECOVERY
nodes:
  - id: start
    type: START
    onSuccess: prompt_username
  - id: prompt_username
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: text_header_username
          label: Reset your password
          variant: HEADING_1
        - type: TEXT
          id: text_subtitle_username
          label: Enter your username and we'll email you a recovery link.
          variant: HEADING_6
        - type: BLOCK
          id: block_username
          components:
            - id: input_username
              ref: username
              type: TEXT_INPUT
              label: Username
              required: true
              placeholder: Your username
            - type: ACTION
              id: action_submit_username
              label: Send recovery link
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: input_username
            identifier: username
            type: TEXT_INPUT
            required: true
        action:
          ref: action_submit_username
          nextNode: identify_user
  - id: identify_user
    type: TASK_EXECUTION
    executor:
      name: IdentifyingExecutor
      mode: identify
      inputs:
        - ref: input_username
          identifier: username
          type: TEXT_INPUT
          required: true
    onSuccess: generate_recovery_token
    onFailure: email_sent_status
  - id: generate_recovery_token
    type: TASK_EXECUTION
    executor:
      name: InviteExecutor
      mode: generate
    onSuccess: send_recovery_email
  - id: send_recovery_email
    type: TASK_EXECUTION
    properties:
      emailTemplate: PASSWORD_RECOVERY
    executor:
      name: EmailExecutor
      mode: send
    onSuccess: email_sent_status
    onFailure: email_sent_status
  - id: email_sent_status
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: email_sent_icon
          label: "✉️"
          variant: HEADING_1
        - align: center
          type: TEXT
          id: email_sent_heading
          label: Check your email
          variant: HEADING_1
        - align: center
          type: TEXT
          id: email_sent_message
          label: If an account matches, we've sent a recovery link.
          variant: HEADING_6
    message: Check Your Email
    next: verify_recovery_token
  - id: verify_recovery_token
    type: TASK_EXECUTION
    executor:
      name: InviteExecutor
      mode: verify
      inputs:
        - ref: input_recovery_token
          identifier: inviteToken
          type: HIDDEN
          required: true
    onSuccess: prompt_new_password
  - id: prompt_new_password
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: text_header_password
          label: Set a new password
          variant: HEADING_1
        - type: BLOCK
          id: block_password
          components:
            - id: input_new_password
              ref: password
              type: PASSWORD_INPUT
              label: New password
              required: true
              placeholder: New password
            - type: ACTION
              id: action_submit_password
              label: Update password
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: input_new_password
            identifier: password
            type: PASSWORD_INPUT
            required: true
        action:
          ref: action_submit_password
          nextNode: set_credential
  - id: set_credential
    type: TASK_EXECUTION
    executor:
      name: CredentialSetter
    onSuccess: recovery_complete
  - id: recovery_complete
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: recovery_complete_icon
          label: "✅"
          variant: HEADING_1
        - align: center
          type: TEXT
          id: recovery_complete_heading
          label: Password updated
          variant: HEADING_1
        - align: center
          type: TEXT
          id: recovery_complete_message
          label: Return to Wayfinder and sign in with your new password.
          variant: HEADING_6
    message: Password Reset Successful
    next: end
  - id: end
    type: END

