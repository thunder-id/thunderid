components:
  schemas:
    Agent:
      type: object
      required:
        - id
      description: Summary representation used in list responses.
      properties:
        id:
          type: string
          format: uuid
          example: 9a475e1e-b0cb-4b29-8df5-2e5b24fb0ed3
        ouId:
          type: string
          format: uuid
          example: 456e8400-e29b-41d4-a716-446655440001
        ouHandle:
          type: string
          readOnly: true
          description: Human-readable handle path of the organization unit. Populated only
            when `include=display` is used.
          example: platform/automations
        type:
          type: string
          description: The agent type (matches a registered schema type).
          example: service-agent
        name:
          type: string
          description: Display name of the agent. Stored as a system attribute.
          example: Calendar Agent
        description:
          type: string
          description: Brief description of the agent. Stored as a system attribute.
          example: Agent exposing calendar tools
        clientId:
          type: string
          description: OAuth client ID. Present only when the agent has an OAuth profile.
          example: calendar_agent_client
        owner:
          type: string
          format: uuid
          description: >
            ID of the entity that owns this agent. Defaults to the authenticated
            principal at

            creation time. Can be transferred by an administrator.
          example: e1b6ba6c-deb2-4d24-87b0-bbf79fa4487c
        attributes:
          type: object
          additionalProperties: true
          description: >
            Key-value attributes stored on the entity. Validated against the
            schema

            registered for the agent's `type`: required fields, regex patterns,
            types, and

            uniqueness constraints are enforced. Fields marked as credentials in
            the schema

            are extracted and stored as hashed credentials, not returned in read
            responses.
          example:
            llmModel: claude-3-5-sonnet
            environment: production
    AgentListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: Total number of agents matching the query.
          example: 25
        startIndex:
          type: integer
          description: Index of the first element in this page (offset + 1).
          example: 1
        count:
          type: integer
          description: Number of agents in this page.
          example: 10
        agents:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        links:
          type: array
          items:
            $ref: "#/components/schemas/Link"
    CreateAgentRequest:
      type: object
      required:
        - ouId
        - type
        - name
      description: >
        Request to create an agent. What gets persisted depends on which fields
        are provided:

        - Always: entity row (`id`, `ouId`, `type`, `name`, `description`,
        `attributes`, `owner`).

        - When any inbound auth field is set: inbound client row (`authFlowId`
        defaults to the
          system default when omitted).
        - When `inboundAuthConfig` is set: OAuth profile row.
      properties:
        ouId:
          type: string
          format: uuid
          description: The organization unit ID where the agent will be created.
          example: 456e8400-e29b-41d4-a716-446655440001
        type:
          type: string
          description: The agent type. Must match a registered schema type in the OU.
          example: service-agent
        name:
          type: string
          description: Display name of the agent. Must be unique across all agents.
          example: Calendar Agent
        description:
          type: string
          description: Optional description of the agent.
          example: Agent exposing calendar tools
        owner:
          type: string
          format: uuid
          description: >
            Optional ID of the entity that should own this agent. Defaults to
            the authenticated

            principal creating the agent.
          example: e1b6ba6c-deb2-4d24-87b0-bbf79fa4487c
        attributes:
          type: object
          additionalProperties: true
          description: >
            Key-value attributes for the agent. Validated against the schema
            registered

            for the given `type`: required fields, regex patterns, and
            uniqueness constraints

            are enforced. Fields marked as credentials in the schema are
            extracted and stored

            as hashed credentials, not returned in read responses.
          example:
            llmModel: claude-3-5-sonnet
            environment: production
        authFlowId:
          type: string
          description: >
            Auth flow to use when users authenticate against this agent. When
            omitted and

            other inbound auth fields are present, the system default auth flow
            is used.
          example: edc013d0-e893-4dc0-990c-3e1d203e005b
        registrationFlowId:
          type: string
          description: Registration flow for this agent.
          example: f1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        isRegistrationFlowEnabled:
          type: boolean
          default: false
          description: Whether self-service registration is enabled for this agent.
          example: false
        themeId:
          type: string
          format: uuid
          description: Theme configuration for this agent's sign-in pages.
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        layoutId:
          type: string
          format: uuid
          description: Layout configuration for this agent's sign-in pages.
          example: b2c3d4e5-f6a7-8901-bcde-f01234567891
        assertion:
          $ref: "#/components/schemas/AssertionConfig"
        loginConsent:
          $ref: "#/components/schemas/LoginConsentConfig"
        allowedUserTypes:
          type: array
          items:
            type: string
          description: User types allowed to authenticate against this agent.
          example:
            - employee
            - contractor
        certificate:
          $ref: "#/components/schemas/Certificate"
        inboundAuthConfig:
          type: array
          items:
            $ref: "#/components/schemas/InboundAuthConfigComplete"
          description: >
            OAuth/OIDC configuration for the agent. Providing this also creates
            an inbound

            client row (inbound auth profile fields are not required to be
            explicitly set).
    UpdateAgentRequest:
      type: object
      required:
        - name
        - type
      description: >
        Full replacement update for an agent. `name` and `type` are required.
        Other fields

        follow the same creation rules as `CreateAgentRequest`. Omitting an
        inbound auth or

        OAuth field removes the corresponding profile.

        If `ouId` is provided and different from the current value, the agent is
        moved to the

        new organization unit (must exist).
      properties:
        ouId:
          type: string
          format: uuid
          description: New organization unit ID. Validated against existing OUs when
            changed.
          example: 456e8400-e29b-41d4-a716-446655440001
        type:
          type: string
          example: service-agent
        name:
          type: string
          example: Calendar Agent
        description:
          type: string
          example: Agent exposing calendar tools
        owner:
          type: string
          format: uuid
          description: Admins can transfer ownership by setting this to a different entity
            ID.
          example: e1b6ba6c-deb2-4d24-87b0-bbf79fa4487c
        attributes:
          type: object
          additionalProperties: true
          example:
            llmModel: claude-3-5-sonnet
            environment: production
        authFlowId:
          type: string
          example: edc013d0-e893-4dc0-990c-3e1d203e005b
        registrationFlowId:
          type: string
          example: f1c2d3e4-f5a6-7b8c-9d0e-1f2a3b4c5d6e
        isRegistrationFlowEnabled:
          type: boolean
          example: false
        themeId:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        layoutId:
          type: string
          format: uuid
          example: b2c3d4e5-f6a7-8901-bcde-f01234567891
        assertion:
          $ref: "#/components/schemas/AssertionConfig"
        loginConsent:
          $ref: "#/components/schemas/LoginConsentConfig"
        allowedUserTypes:
          type: array
          items:
            type: string
          example:
            - employee
            - contractor
        certificate:
          $ref: "#/components/schemas/Certificate"
        inboundAuthConfig:
          type: array
          items:
            $ref: "#/components/schemas/InboundAuthConfigComplete"
    AgentCompleteResponse:
      type: object
      description: >
        Returned on create (`POST`) and update (`PUT`) operations. Includes
