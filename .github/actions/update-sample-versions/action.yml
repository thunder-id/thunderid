name: 'Update Sample Apps Version'
description: 'Updates version for all sample applications'
author: 'WSO2'

inputs:
  version:
    description: 'Version to set (can include or exclude v prefix)'
    required: true

runs:
  using: composite
  steps:
    - name: 📝 Update Sample Apps Version
      shell: bash
      run: |
        SAMPLE_VERSION="${{ inputs.version }}"

        # Remove 'v' prefix if present
        if [[ "$SAMPLE_VERSION" == v* ]]; then
          SAMPLE_VERSION="${SAMPLE_VERSION#v}"
        fi

        echo "📝 Setting sample apps version to $SAMPLE_VERSION"

        for sample in react-vanilla-sample react-sdk-sample react-api-based-sample wayfinder-sample; do
          echo "Updating $sample..."
          cd "$GITHUB_WORKSPACE/samples/apps/$sample"
          pnpm version "$SAMPLE_VERSION" --no-git-tag-version --no-git-checks --allow-same-version
        done

        echo "Updating react-vanilla-sample/server..."
        cd "$GITHUB_WORKSPACE/samples/apps/react-vanilla-sample/server"
        npm version "$SAMPLE_VERSION" --no-git-tag-version --allow-same-version

        cd "$GITHUB_WORKSPACE"
        echo "✅ Updated all sample apps to version $SAMPLE_VERSION"
