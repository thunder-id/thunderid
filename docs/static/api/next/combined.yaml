          description: Maps resource types to custom folder paths.
          example:
            application: apps
            flow: auth-flows
        fileNamingPattern:
          type: string
          description: >
            Pattern for naming exported files. Supports `${name}`, `${id}`, and
            `${type}` placeholders.
          example: ${name}_${id}
    PaginationOptions:
      type: object
      description: Pagination settings for bulk exports.
      properties:
        page:
          type: integer
          minimum: 1
          description: Page number (1-based).
          example: 1
        limit:
          type: integer
          minimum: 1
          description: Maximum number of resources per page.
          example: 50
    ExportResponse:
      type: object
      x-internal: true
      description: >
        Legacy internal export model with individual files and summary. Public
        JSON endpoints return `JSONExportResponse`.
      required:
        - files
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/ExportFile"
          description: List of exported resource files.
        envFile:
          allOf:
            - $ref: "#/components/schemas/EnvironmentFile"
