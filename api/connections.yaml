components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:8090/oauth2/authorize
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs
        clientCredentials:
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs

  parameters:
    ConnectionID:
      in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

    limitQueryParam:
      in: query
      name: limit
      required: false
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30

    offsetQueryParam:
      in: query
      name: offset
      required: false
      description: Number of records to skip for pagination.
      schema:
        type: integer
        minimum: 0
        default: 0

  responses:
    InstanceList:
      description: Configured connection instances
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ConnectionInstanceSummary'
    ConnectionUsages:
      description: Resources that reference this connection
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ConnectionUsagesResponse' }
          example:
            totalResults: 1
            count: 1
            summary:
              flow: 1
            usages:
              - resourceType: flow
                id: "f1b2c3d4-0000-0000-0000-000000000001"
                displayName: "Login Flow"
                behaviorOnDelete: restrict
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Connection not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: A connection with the same name already exists
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Insufficient permissions to perform this operation
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    InternalServerError:
      description: Internal server error

  schemas:
    ConnectionListResponse:
      type: object
      required: [totalResults, startIndex, count, connections, links]
      properties:
        totalResults:
          type: integer
          description: Number of instances that match the listing operation.
          example: 3
        startIndex:
          type: integer
          description: Index of the first element of the page, which is equal to offset + 1.
          example: 1
        count:
          type: integer
          description: Number of elements in the returned page.
          example: 3
        connections:
          type: array
          items: { $ref: '#/components/schemas/ConnectionInstance' }
        links:
          type: array
          items: { $ref: '#/components/schemas/Link' }

    Link:
      type: object
      properties:
        href: { type: string, example: "/connections?offset=30&limit=30" }
        rel: { type: string, example: "next" }

    ConnectionInstance:
      type: object
      required: [id, name, type, categories]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "My Google" }
        description: { type: string }
        type:
          type: string
          description: >-
            Lowercase vendor identifier. `custom` denotes a custom SMS gateway sender.
          enum: [google, github, oidc, oauth, twilio, vonage, custom]
          example: "google"
        categories:
          type: array
          minItems: 1
          items:
            type: string
            enum: [identity-provider, sms-provider]
          example: ["identity-provider"]

    ConnectionInstanceSummary:
      type: object
      required: [id, name]
      properties:
        id: { type: string, format: uuid }
        name: { type: string, example: "My Google" }
        description: { type: string }

    ConnectionUsage:
      type: object
      description: A single resource that references the connection.
      required:
        - resourceType
        - id
        - displayName
        - behaviorOnDelete
      properties:
        resourceType:
          type: string
          description: Type of the referencing resource.
          enum: [flow]
          example: flow
        id:
          type: string
          format: uuid
          description: Identifier of the referencing resource.
          example: "f1b2c3d4-0000-0000-0000-000000000001"
        displayName:
          type: string
          description: Human-readable name of the referencing resource.
          example: "Login Flow"
        behaviorOnDelete:
          type: string
          description: |
            What happens to this resource when the connection is deleted.
            - `fallback`: the reference is kept as-is.
            - `cascade`: the resource is permanently deleted.
            - `restrict`: the resource blocks deletion of the connection.
          enum: [fallback, cascade, restrict]
          example: restrict

    ConnectionUsagesSummary:
      type: object
      nullable: true
      description: |
        Per-resource-type count of usages, keyed by resource type
        (e.g. `flow`). Null when the counts could not be determined.
      additionalProperties:
        type: integer
      example:
        flow: 1

    ConnectionUsagesResponse:
      type: object
      description: |
        Resources that reference a connection, aggregated across all resource types.
        Drives pre-delete confirmation dialogs; informational only.
      properties:
        totalResults:
          type: integer
          nullable: true
          description: |
            Total number of resources that reference the connection.
            Null when usage data is unavailable; 0 means confirmed empty.
          example: 1
        count:
          type: integer
          description: Number of results returned.
          example: 1
        summary:
          $ref: '#/components/schemas/ConnectionUsagesSummary'
        usages:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionUsage'

    GoogleConnectionUpdateRequest:
      type: object
      required: [name, clientId, redirectUri]
      properties:
        name: { type: string, example: "My Google" }
        description: { type: string }
        clientId: { type: string }
        clientSecret: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        redirectUri: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }
    GoogleConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/GoogleConnectionUpdateRequest'
        - type: object
          required: [clientSecret]
    GoogleConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "google" }
        clientId: { type: string }
        clientSecret: { type: string, description: "Masked as \"******\".", example: "******" }
        redirectUri: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }

    GitHubConnectionUpdateRequest:
      type: object
      required: [name, clientId, redirectUri]
      properties:
        name: { type: string, example: "My GitHub" }
        description: { type: string }
        clientId: { type: string }
        clientSecret: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        redirectUri: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }
    GitHubConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/GitHubConnectionUpdateRequest'
        - type: object
          required: [clientSecret]
    GitHubConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "github" }
        clientId: { type: string }
        clientSecret: { type: string, example: "******" }
        redirectUri: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }

    OIDCConnectionUpdateRequest:
      type: object
      required: [name, clientId, redirectUri, authorizationEndpoint, tokenEndpoint]
      properties:
        name: { type: string }
        description: { type: string }
        clientId: { type: string }
        clientSecret: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        redirectUri: { type: string }
        authorizationEndpoint: { type: string }
        tokenEndpoint: { type: string }
        userInfoEndpoint: { type: string }
        jwksEndpoint: { type: string }
        logoutEndpoint: { type: string }
        issuer: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        tokenExchangeEnabled: { type: boolean }
        idJagEnabled: { type: boolean, description: "Enable ID-JAG issuance for this identity provider (draft-ietf-oauth-identity-assertion-authz-grant), so that self-issued ID tokens naming it as issuer can be trusted for the jwt-bearer grant. Requires issuer and jwksEndpoint to be set." }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }
    OIDCConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/OIDCConnectionUpdateRequest'
        - type: object
          required: [clientSecret]
    OIDCConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "oidc" }
        clientId: { type: string }
        clientSecret: { type: string, example: "******" }
        redirectUri: { type: string }
        authorizationEndpoint: { type: string }
        tokenEndpoint: { type: string }
        userInfoEndpoint: { type: string }
        jwksEndpoint: { type: string }
        logoutEndpoint: { type: string }
        issuer: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        tokenExchangeEnabled: { type: boolean }
        idJagEnabled: { type: boolean, description: "Enable ID-JAG issuance for this identity provider (draft-ietf-oauth-identity-assertion-authz-grant), so that self-issued ID tokens naming it as issuer can be trusted for the jwt-bearer grant. Requires issuer and jwksEndpoint to be set." }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }

    OAuthConnectionUpdateRequest:
      type: object
      description: |
        Generic OAuth 2.0 connection (no OpenID Connect discovery, no id_token). The user
        profile is always fetched from userInfoEndpoint, so it is required here — unlike OIDC.
      required: [name, clientId, redirectUri, authorizationEndpoint, tokenEndpoint, userInfoEndpoint]
      properties:
        name: { type: string }
        description: { type: string }
        clientId: { type: string }
        clientSecret: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        redirectUri: { type: string }
        authorizationEndpoint: { type: string }
        tokenEndpoint: { type: string }
        userInfoEndpoint: { type: string }
        logoutEndpoint: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }
    OAuthConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/OAuthConnectionUpdateRequest'
        - type: object
          required: [clientSecret]
    OAuthConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "oauth" }
        clientId: { type: string }
        clientSecret: { type: string, example: "******" }
        redirectUri: { type: string }
        authorizationEndpoint: { type: string }
        tokenEndpoint: { type: string }
        userInfoEndpoint: { type: string }
        logoutEndpoint: { type: string }
        scopes: { type: array, items: { type: string } }
        prompt: { type: string }
        attributeConfiguration: { $ref: '#/components/schemas/AttributeConfiguration' }

    TwilioConnectionUpdateRequest:
      type: object
      required: [name, accountSid, senderId]
      properties:
        name: { type: string, example: "My Twilio" }
        description: { type: string }
        accountSid: { type: string, description: "Twilio Account SID (AC followed by 32 hex characters).", example: "ACxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" }
        authToken: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        senderId: { type: string, description: "Sender phone number or alphanumeric sender ID.", example: "+15005550006" }
    TwilioConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/TwilioConnectionUpdateRequest'
        - type: object
          required: [authToken]
    TwilioConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "twilio" }
        accountSid: { type: string }
        authToken: { type: string, description: "Masked as \"******\".", example: "******" }
        senderId: { type: string }

    VonageConnectionUpdateRequest:
      type: object
      required: [name, apiKey, senderId]
      properties:
        name: { type: string, example: "My Vonage" }
        description: { type: string }
        apiKey: { type: string, description: "Vonage API key." }
        apiSecret: { type: string, description: "Write-only. Omit to keep the stored value on update." }
        senderId: { type: string, description: "Sender phone number or alphanumeric sender ID.", example: "ThunderID" }
    VonageConnectionCreateRequest:
      allOf:
        - $ref: '#/components/schemas/VonageConnectionUpdateRequest'
        - type: object
          required: [apiSecret]
    VonageConnectionResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        type: { type: string, example: "vonage" }
        apiKey: { type: string }
        apiSecret: { type: string, description: "Masked as \"******\".", example: "******" }
        senderId: { type: string }

    AttributeConfiguration:
      type: object
      description: External-to-local attribute mapping configuration for the connection.
      required:
        - userTypeResolution
      properties:
        userTypeResolution:
          $ref: '#/components/schemas/UserTypeResolution'
        userTypeAttributeMappings:
          type: array
          description: Per-user-type attribute mapping profiles.
          items:
            $ref: '#/components/schemas/UserTypeAttributeMapping'
        accountLinking:
          $ref: '#/components/schemas/AccountLinking'

    AccountLinking:
      type: object
      description: >
        Configures how an incoming federated identity is resolved to an existing local user when the
        subject identifier does not resolve one. All configured attributes that have a value are
        combined into a single lookup filter.
      properties:
        attributes:
          type: array
          description: External attribute names used together to resolve the local user.
          items:
            type: string
          example:
            - "email"

    UserTypeResolution:
      type: object
      description: Resolves which local user type an incoming federated identity maps to.
      required:
        - default
      properties:
        default:
          type: string
          description: >
            Fallback local user type, used when claim-driven resolution is not configured or the
            external attribute's value does not match a mapping.
          example: "Person"
        externalAttribute:
          type: string
          description: External claim whose value selects the local user type.
          example: "user_type"
        valueMapping:
          type: object
          description: Maps an external attribute value to a local user type.
          additionalProperties:
            type: string
          example:
            staff: "Employee"

    UserTypeAttributeMapping:
      type: object
      required:
        - userType
      description: Attribute mapping profile for a single local user type.
      properties:
        userType:
          type: string
          description: Local user type this profile applies to.
          example: "Person"
        attributes:
          type: array
          description: External-to-local attribute mappings for this user type.
          items:
            $ref: '#/components/schemas/AttributeMapping'

    AttributeMapping:
      type: object
      required:
        - externalAttribute
        - localAttribute
      description: Maps a single external IDP attribute to a local user attribute.
      properties:
        externalAttribute:
          type: string
          description: >
            External claim name emitted by the IDP. May be a dot-notation path into a nested
            claim (e.g. "address.email"). A literal name containing dots is matched first.
          example: "given_name"
        localAttribute:
          type: string
          description: Target local attribute name. Must exist in the user type's schema.
          example: "firstName"

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: "IDP-1001"
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'

    I18nMessage:
      type: object
      required: [key, defaultValue]
      properties:
        key: { type: string }
        defaultValue: { type: string }
