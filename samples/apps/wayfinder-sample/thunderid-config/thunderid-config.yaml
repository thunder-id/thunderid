          ref: consent_action_allow
          nextNode: consent_check
      - inputs:
          - ref: consent_input
            identifier: consent_decisions
            type: CONSENT
            required: true
        action:
          ref: consent_action_deny
          nextNode: consent_check
  - id: auth_assert
    type: TASK_EXECUTION
    properties:
      callbackType: "urn:openid:params:grant-type:ciba"
    executor:
      name: AuthAssertExecutor
    onSuccess: auth_success
  - id: auth_success
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: success_icon
          label: "✅"
          variant: HEADING_1
        - align: center
          type: TEXT
          id: success_heading
          label: Authentication Successful
          variant: HEADING_1
        - align: center
          type: TEXT
          id: success_message
          label: You have successfully authenticated. You may close this window.
          variant: HEADING_6
    message: Authentication successful
    next: end
  - id: end
    type: END


