{{- $configuration := default dict .Values.configuration -}}
{{- $database := default dict $configuration.database -}}
{{- $config := default dict $database.config -}}
{{- $runtimeTransient := default dict $database.runtime_transient -}}
{{- $entity := default dict $database.entity -}}
{{- $configPostgres := default dict $config.postgres -}}
{{- $runtimeTransientPostgres := default dict $runtimeTransient.postgres -}}
{{- $runtimeTransientRedis := default dict $runtimeTransient.redis -}}
{{- $entityPostgres := default dict $entity.postgres -}}
{{- $runtimePersistent := default dict $database.runtime_persistent -}}
{{- $runtimePersistentPostgres := default dict $runtimePersistent.postgres -}}
{{- $cache := default dict $configuration.cache -}}
{{- $redis := default dict $cache.redis -}}

{{- $configPassword := "" }}
{{- $runtimeTransientPassword := "" }}
{{- $runtimeTransientRedisPassword := "" }}
{{- $entityPassword := "" }}
{{- $runtimePersistentPassword := "" }}
{{- $redisPassword := "" }}

{{- if and $configPostgres.password (not (default dict $configPostgres.passwordRef).key) }}
  {{- $configPassword = $configPostgres.password }}
{{- end }}
{{- if and $runtimeTransientPostgres.password (not (default dict $runtimeTransientPostgres.passwordRef).key) }}
  {{- $runtimeTransientPassword = $runtimeTransientPostgres.password }}
{{- end }}
{{- if and $runtimeTransientRedis.password (not (default dict $runtimeTransientRedis.passwordRef).key) }}
  {{- $runtimeTransientRedisPassword = $runtimeTransientRedis.password }}
{{- end }}
{{- if and $entityPostgres.password (not (default dict $entityPostgres.passwordRef).key) }}
  {{- $entityPassword = $entityPostgres.password }}
{{- end }}
{{- if and $runtimePersistentPostgres.password (not (default dict $runtimePersistentPostgres.passwordRef).key) }}
  {{- $runtimePersistentPassword = $runtimePersistentPostgres.password }}
{{- end }}
{{- if and (eq $cache.type "redis") $redis.password (not (default dict $redis.passwordRef).key) }}
  {{- $redisPassword = $redis.password }}
{{- end }}

{{- $createSecret := or $configPassword $runtimeTransientPassword $runtimeTransientRedisPassword $entityPassword $runtimePersistentPassword $redisPassword}}

{{- if $createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-db-credentials" (include "thunderid.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderid.labels" . | nindent 4 }}
    app.kubernetes.io/component: database-credentials
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    # Use a lower weight than other pre-install/pre-upgrade hooks (e.g., -5 or default 0)
    # so this secret is created before dependent resources that consume these credentials.
    "helm.sh/hook-weight": "-6"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
data:
  {{- if $configPassword }}
  config-db-password: {{ $configPassword | b64enc | quote }}
  {{- end }}
  {{- if $runtimeTransientPassword }}
  runtime-transient-db-password: {{ $runtimeTransientPassword | b64enc | quote }}
  {{- end }}
  {{- if $runtimeTransientRedisPassword }}
  runtime-transient-redis-password: {{ $runtimeTransientRedisPassword | b64enc | quote }}
  {{- end }}
  {{- if $entityPassword }}
  entity-db-password: {{ $entityPassword | b64enc | quote }}
  {{- end }}
  {{- if $runtimePersistentPassword }}
  runtime-persistent-db-password: {{ $runtimePersistentPassword | b64enc | quote }}
  {{- end }}
  {{- if $redisPassword }}
  cache-redis-password: {{ $redisPassword | b64enc | quote }}
  {{- end }}
{{- end }}
