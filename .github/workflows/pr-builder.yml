# This workflow will build the project on pull requests with tests
# Uses:
#   OS: ubuntu-latest
#   Go: go 1.x

name: 👷🛠️ PR Builder

on:
  pull_request:
    types: [opened, synchronize, reopened]
  merge_group:
  workflow_dispatch:

# Avoid running multiple PR builders for the same PR on subsequent pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  GOFLAGS: "-mod=readonly"
  PRODUCT_NAME: "ThunderID"
  PRODUCT_NAME_LOWER: "thunderid"
  NODE_VERSION: "lts/*"

jobs:
  detect-changes:
    name: 🔍 Detect Changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      docs: ${{ steps.filter.outputs.docs }}
      sdks: ${{ steps.filter.outputs.sdks }}
      tools: ${{ steps.filter.outputs.tools }}
      e2e: ${{ steps.filter.outputs.e2e }}
      powershell: ${{ steps.filter.outputs.powershell }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔍 Filter Paths
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3
        id: filter
        with:
          base: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          ref: ${{ github.event_name == 'merge_group' && github.sha || github.event.pull_request.head.sha }}
          filters: |
            backend:
              - 'backend/**'
              - 'api/**'
              - 'tests/integration/**'
              - 'go.mod'
              - 'go.sum'
              - 'Makefile'
              - 'build.sh'
              - 'setup.sh'
              - 'start.sh'
              - '.github/workflows/validate/backend.yml'
              - '.github/workflows/pr-builder.yml'
            frontend:
              - 'frontend/**'
              - 'samples/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'nx.json'
              - '.github/workflows/validate/frontend.yml'
              - '.github/workflows/pr-builder.yml'
            docs:
              - 'docs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/validate/docs.yml'
              - '.github/workflows/pr-builder.yml'
            sdks:
              - 'sdks/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/validate/sdks.yml'
              - '.github/workflows/pr-builder.yml'
            tools:
              - 'tools/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/validate/tools.yml'
              - '.github/workflows/pr-builder.yml'
            e2e:
              - 'tests/e2e/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/validate/e2e.yml'
              - '.github/workflows/pr-builder.yml'
            powershell:
              - '**.ps1'
              - '.github/workflows/windows-powershell-validation.yml'
              - '.github/workflows/pr-builder.yml'

  dependency-review:
    name: 🔎 Dependency Review
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'merge_group' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔎 Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0-only,GPL-3.0-or-later,AGPL-3.0-only,AGPL-3.0-or-later
          comment-summary-in-pr: always
          base-ref: ${{ github.event_name == 'merge_group' && github.event.merge_group.base_sha || github.event.pull_request.base.sha }}
          head-ref: ${{ github.event_name == 'merge_group' && github.sha || github.event.pull_request.head.sha }}

  validate-backend:
    name: ⚙️ Backend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' }}
    uses: ./.github/workflows/validate/backend.yml

  validate-frontend:
    name: 🎨 Frontend
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    uses: ./.github/workflows/validate/frontend.yml

  validate-docs:
    name: 📚 Documentation
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.docs == 'true' }}
    uses: ./.github/workflows/validate/docs.yml

  validate-sdks:
    name: 📦 SDKs
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.sdks == 'true' }}
    uses: ./.github/workflows/validate/sdks.yml

  validate-tools:
    name: 🔧 Tools
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.tools == 'true' }}
    uses: ./.github/workflows/validate/tools.yml

  validate-e2e:
    name: 🎭 E2E
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.backend == 'true' || needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.e2e == 'true' }}
    uses: ./.github/workflows/validate/e2e.yml
    secrets: inherit

  validate-windows:
    name: 🪟 Windows PowerShell
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.powershell == 'true' }}
    uses: ./.github/workflows/windows-powershell-validation.yml
