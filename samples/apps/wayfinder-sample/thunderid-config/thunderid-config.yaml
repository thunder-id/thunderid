# resource_type: flow
id: 0193b0a1-1001-7000-8000-000000000001
name: Wayfinder Registration Flow
handle: wayfinder-registration-flow
flowType: REGISTRATION
nodes:
  - id: start
    type: START
    onSuccess: user_type_resolver
  - id: user_type_resolver
    type: TASK_EXECUTION
    executor:
      name: UserTypeResolver
    onSuccess: prompt_credentials
    onIncomplete: prompt_usertype
  - id: prompt_usertype
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: heading_usertype
          label: Choose your account type
          variant: HEADING_1
        - type: BLOCK
          id: block_usertype
          components:
            - type: SELECT
              id: usertype_input
              ref: userType
              label: Account type
              placeholder: Select an account type
              required: true
              options: []
            - type: ACTION
              id: action_usertype
              label: Continue
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: usertype_input
            identifier: userType
            type: SELECT
            required: true
        action:
          ref: action_usertype
          nextNode: user_type_resolver
  - id: prompt_credentials
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: heading_credentials
          label: Create your account
          variant: HEADING_1
        - type: BLOCK
          id: block_credentials
          components:
            - type: TEXT_INPUT
              id: input_username
              ref: username
              label: Username
              placeholder: Pick a username
              required: true
            - type: PASSWORD_INPUT
              id: input_password
              ref: password
              label: Password
              placeholder: Choose a password
              required: true
            - type: ACTION
              id: action_credentials
              label: Continue
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs:
          - ref: input_username
            identifier: username
            type: TEXT_INPUT
            required: true
          - ref: input_password
            identifier: password
            type: PASSWORD_INPUT
            required: true
        action:
          ref: action_credentials
          nextNode: basic_auth
  - id: basic_auth
    type: TASK_EXECUTION
    executor:
      name: BasicAuthExecutor
    onSuccess: provisioning
  - id: provisioning
    type: TASK_EXECUTION
    properties:
      assignRole: wayfinder-traveler-role
      includeOptional: true
    executor:
      name: ProvisioningExecutor
      inputs:
        - ref: input_username
          identifier: username
          type: TEXT_INPUT
          required: true
        - ref: input_password
          identifier: password
          type: PASSWORD_INPUT
          required: true
    onSuccess: auth_assert
    onIncomplete: prompt_schema_attrs
  - id: prompt_schema_attrs
    type: PROMPT
    meta:
      components:
        - align: center
          type: TEXT
          id: heading_schema_attrs
          label: Tell us about you
          variant: HEADING_1
        - type: BLOCK
          id: block_dynamic_user_inputs
          components:
            - type: DYNAMIC_INPUT_PLACEHOLDER
              id: dynamic_inputs
            - type: ACTION
              id: action_schema_attrs
              label: Continue
              variant: PRIMARY
              eventType: SUBMIT
    prompts:
      - inputs: []
        action:
          ref: action_schema_attrs
          nextNode: provisioning
  - id: auth_assert
    type: TASK_EXECUTION
    executor:
      name: AuthAssertExecutor
    onSuccess: end
  - id: end
    type: END

