## Umbrella chart values — overrides sub-chart defaults.
## Each top-level key must match the sub-chart name exactly.
##
## Install both sub-charts together (default):
##   helm install thunderid .
##
## Install only the ComponentType (platform admin, once per cluster):
##   helm install thunderid-type charts/thunderid-oc-componenttype
##
## Install only the Component (team, assumes ComponentType already exists):
##   helm install thunderid-app charts/thunderid-component -f my-values.yaml

# ─── Sub-chart toggles ────────────────────────────────────────────────────────
# Set enabled: false to skip a sub-chart when it is already installed separately.

thunderid-oc-componenttype:
  enabled: true
  # cluster: true  → creates a ClusterComponentType (cluster-scoped, shared across all projects).
  # cluster: false → creates a namespaced ComponentType in the Helm release namespace.
  # When changing this, also update thunderid-component.componentType.cluster below to match.
  componentType:
    cluster: true

thunderid-component:
  enabled: true

  # ── Core ────────────────────────────────────────────────────────────────────
  componentName: thunderid            # Base name for Component, Workload, Release, and data plane resources
  pipelineName: identity-platform-pipeline  # Must match an existing DeploymentPipeline or set pipeline.create: true

  image:
    repository: ghcr.io/thunder-id/thunderid  # ThunderID container image repository
    tag: "latest"                          # Use a specific version tag in production

  thunderid:
    server:
      port: 8090  # Port ThunderID listens on inside the container

  # ── Database ─────────────────────────────────────────────────────────────────
  database:
    # Database engine.
    #   sqlite   — default; no external DB needed, data stored on a PVC.
    #   postgres — requires an accessible PostgreSQL instance; fill in the fields below.
    type: sqlite

    # ── SQLite (used when type: sqlite) ──────────────────────────────────────
    # Paths are relative to the ThunderID working directory inside the container.
    storageSize: "1Gi"  # PVC size for SQLite database files
    config:
      sqlite:
        path: "repository/database/configdb.db"
    runtime:
      sqlite:
        path: "repository/database/runtimedb.db"
    user:
      sqlite:
        path: "repository/database/userdb.db"

    # ── PostgreSQL (used when type: postgres) — uncomment and fill in ─────────
    # config:
    #   postgres:
    #     hostname: <DB_HOST>
    #     port: 5432              # Rendered as an integer in the ConfigMap — do not quote
    #     name: configdb
    #     username: <DB_USERNAME>
    #     password: <DB_PASSWORD>
    #     sslmode: disable        # Use verify-full in production
    # runtime:
    #   postgres:
    #     hostname: <DB_HOST>
    #     port: 5432
    #     name: runtimedb
    #     username: <DB_USERNAME>
    #     password: <DB_PASSWORD>
    #     sslmode: disable
    # user:
    #   postgres:
    #     hostname: <DB_HOST>
    #     port: 5432
    #     name: userdb
    #     username: <DB_USERNAME>
    #     password: <DB_PASSWORD>
    #     sslmode: disable

  # ── Application config ───────────────────────────────────────────────────────
  jwt:
    validity: 3600           # JWT token validity in seconds (default: 1 hour)

  oauth:
    refresh_token_validity: 86400  # Refresh token validity in seconds (default: 24 hours)

  crypto:
    encryption:
      # WARNING: Replace with a 32-byte (64 hex character) key in production.
      key: "file://repository/resources/security/crypto.key"

  cache:
    type: "memory"
    size: 10000   # Maximum number of cache entries
    ttl: 3600     # Cache entry TTL in seconds

  cors:
    allowed_origins:
      - "https://gate.your-domain.com"
      - "https://localhost:3000"

  # ── Gate and Console ─────────────────────────────────────────────────────────
  gate:
    hostname: <GATE_HOSTNAME>   # Hostname used in the development ReleaseBinding environmentConfigs
    port: 19080
    scheme: http
    clientBase: "/gate"         # Gate frontend base path (frozen as a parameter at release time)

  console:
    clientBase: "/console"
    clientId: "CONSOLE"
    scopes: '["openid", "profile", "email", "system"]'

  serverPublicUrl: "<SERVER_PUBLIC_URL>"  # ThunderID's externally accessible URL

  consent:
    enabled: false
    baseUrl: "http://localhost:9090/api/v1"

  # ── OpenChoreo platform ──────────────────────────────────────────────────────
  dataPlane:
    name: default             # Name of the ClusterDataPlane to bind all environments to

  replicas: 1                 # Pod replicas for the development environment

  # Must match thunderid-oc-componenttype.componentType.cluster above.
  # true  → Component references ClusterComponentType
  # false → Component references namespaced ComponentType
  componentType:
    cluster: false

  # ── Resource requests and limits ─────────────────────────────────────────────
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # ── On-demand platform resources ─────────────────────────────────────────────
  # Set any flag to false when the resource is pre-created or managed externally
  # (e.g. by GitOps, a platform team, or a shared installation).

  namespace:
    create: true   # false → skip Namespace creation; namespace must already exist

  project:
    create: true   # false → reuse an existing OpenChoreo Project
    name: identity-platform
    description: "Identity platform powered by ThunderID"
    displayName: "Identity Platform"

  pipeline:
    create: true   # false → reuse an existing DeploymentPipeline (pipelineName must match)

  environments:
    development:
      create: true
      description: "Development environment for identity platform"
      displayName: "Development"
    staging:
      create: true
      description: "Staging environment for identity platform"
      displayName: "Staging"
    production:
      create: true
      description: "Production environment for identity platform"
      displayName: "Production"

  releaseBinding:
    # false → skip creating the development ReleaseBinding.
    # Use when you want to deploy via the OC UI or promote manually from another environment.
    create: true

  # ── Ingress / Gateway ─────────────────────────────────────────────────────────
  # Used to construct the HTTPRoute hostname in the development ReleaseBinding.
  # Hostname format: <environmentName>-<componentName>-<componentNamespace>.<domain>
  ingress:
    domain: "openchoreoapis.localhost"
    port: 19080
    scheme: "http"
