          type: string
          example: Service Agents
        ouId:
          type: string
          format: uuid
          example: 456e8400-e29b-41d4-a716-446655440001
    AgentGroupListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          example: 2
        startIndex:
          type: integer
          example: 1
        count:
          type: integer
          example: 2
