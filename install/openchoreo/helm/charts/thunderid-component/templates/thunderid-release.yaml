# ComponentRelease and ReleaseBinding are post-install/post-upgrade hooks so they are
# applied after all other chart resources (including the ComponentType) are ready.
# before-hook-creation deletion policy ensures idempotent upgrades.

---
apiVersion: openchoreo.dev/v1alpha1
kind: ComponentRelease
metadata:
  name: {{ .Values.componentName }}-v1
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  owner:
    componentName: {{ .Values.componentName }}
    projectName: {{ .Values.project.name }}
  componentType:
    kind: {{ if .Values.componentType.cluster }}ClusterComponentType{{ else }}ComponentType{{ end }}
    name: deployment/thunderid
    spec:
      {{- if .Values.componentType.cluster }}
      {{- $ct := lookup "openchoreo.dev/v1alpha1" "ClusterComponentType" "" "thunderid" }}
      {{- if not $ct }}{{ fail "ClusterComponentType 'thunderid' not found. Install the thunderid-oc-componenttype chart first." }}{{ end }}
      {{- $ct.spec | toYaml | nindent 6 }}
      {{- else }}
      {{- $ct := lookup "openchoreo.dev/v1alpha1" "ComponentType" .Release.Namespace "thunderid" }}
      {{- if not $ct }}{{ fail "ComponentType 'thunderid' not found. Install the thunderid-oc-componenttype chart first." }}{{ end }}
      {{- $ct.spec | toYaml | nindent 6 }}
      {{- end }}
  workload:
    container:
      image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
      env:
        - key: SERVER_PORT
          value: {{ .Values.thunderid.server.port | quote }}
        - key: JWT_VALIDITY
          value: {{ .Values.jwt.validity | quote }}
        - key: OAUTH_REFRESH_TOKEN_VALIDITY
          value: {{ .Values.oauth.refresh_token_validity | quote }}
        - key: CACHE_SIZE
          value: {{ .Values.cache.size | quote }}
        - key: CACHE_TTL
          value: {{ .Values.cache.ttl | quote }}
        - key: GATE_CLIENT_BASE
          value: {{ .Values.gate.clientBase | quote }}
        - key: CONSOLE_CLIENT_BASE
          value: {{ .Values.console.clientBase | quote }}
        - key: CONSOLE_CLIENT_ID
          value: {{ .Values.console.clientId | quote }}
        - key: CONSOLE_SCOPES
          value: {{ .Values.console.scopes | quote }}
        - key: GATE_CLIENT_PORT
          value: {{ .Values.gate.port | quote }}
        - key: GATE_CLIENT_SCHEME
          value: {{ .Values.gate.scheme | quote }}
        - key: DB_CONFIG_PATH
          value: {{ .Values.database.config.path | default "database/configdb.db" | quote }}
        - key: DB_RUNTIME_TRANSIENT_PATH
          value: {{ .Values.database.runtime_transient.path | default "database/runtime_transient.db" | quote }}
        - key: DB_ENTITY_PATH
          value: {{ .Values.database.entity.path | default "database/entitydb.db" | quote }}
        - key: DB_RUNTIME_PERSISTENT_PATH
          value: {{ .Values.database.runtime_persistent.path | default "database/runtime_persistent.db" | quote }}
        - key: CRYPTO_ENCRYPTION_KEY
          value: {{ .Values.crypto.encryption.key | quote }}
    endpoints:
      api:
        displayName: ThunderID API
        port: 8090
        type: HTTP
        visibility:
        - external
  componentProfile:
    parameters:
      image: {{ printf "%s:%s" .Values.image.repository .Values.image.tag | quote }}
      runtime:
        imagePullPolicy: "Always"
        gate:
          clientBase: {{ .Values.gate.clientBase | quote }}
        console:
          clientBase: {{ .Values.console.clientBase | quote }}
          clientId: {{ .Values.console.clientId | quote }}
          scopes: {{ .Values.console.scopes | quote }}
        dbType: {{ .Values.database.type | quote }}
        dbStorageSize: {{ .Values.database.storageSize | default "1Gi" | quote }}

{{- if .Values.releaseBinding.create }}
---
apiVersion: openchoreo.dev/v1alpha1
kind: ReleaseBinding
metadata:
  name: {{ .Values.componentName }}-v1-dev
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  owner:
    componentName: {{ .Values.componentName }}
    projectName: {{ .Values.project.name }}
  environment: development
  releaseName: {{ .Values.componentName }}-v1
  state: Active
  componentTypeEnvironmentConfigs:
    replicas: {{ .Values.replicas }}
    endpointVisibility: {{ .Values.endpointVisibility | default "external" | quote }}
    # Infra resource configuration
    serverPublicUrl: {{ .Values.serverPublicUrl | quote }}
    gateClientHostname: {{ .Values.gate.hostname | quote }}
    resourceRequestsCpu: {{ .Values.resources.requests.cpu | quote }}
    resourceRequestsMemory: {{ .Values.resources.requests.memory | quote }}
    resourceLimitsCpu: {{ .Values.resources.limits.cpu | quote }}
    resourceLimitsMemory: {{ .Values.resources.limits.memory | quote }}
{{- end }}
