services:
  # Initialize database from the image
  thunderid-db-init:
    image: ghcr.io/thunder-id/thunderid:latest
    command: sh -c "cp -r /opt/thunderid/repository/database/* /data/ && (cp -r /opt/thunderid/consent/repository/database/* /consent-data/ 2>/dev/null || true)"
    volumes:
      - thunderid-db:/data
      - consent-db:/consent-data
    restart: "no"

  # Run setup once with the shared database
  thunderid-setup:
    image: ghcr.io/thunder-id/thunderid:latest
    command: ./setup.sh
    volumes:
      - thunderid-db:/opt/thunderid/repository/database
      - consent-db:/opt/thunderid/consent/repository/database
    depends_on:
      thunderid-db-init:
        condition: service_completed_successfully
    restart: "no"

  # Run ThunderID server with the shared database
  thunderid:
    image: ghcr.io/thunder-id/thunderid:latest
    depends_on:
      thunderid-setup:
        condition: service_completed_successfully
    ports:
      - "8090:8090"
    volumes:
      - thunderid-db:/opt/thunderid/repository/database
      - consent-db:/opt/thunderid/consent/repository/database

volumes:
  thunderid-db:
    driver: local
  consent-db:
    driver: local
