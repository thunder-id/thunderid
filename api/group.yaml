openapi: 3.0.3
info:
  title: Group Management API
  version: "1.0"
  description: Create and manage groups for organizing users. Groups can be assigned roles and permissions and are used as the primary unit for access control delegation.
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://{host}:{port}
    variables:
      host:
        default: "localhost"
      port:
        default: "8090"

tags:
  - name: Groups
    description: CRUD operations for groups, member assignment, and role assignment.
  - name: groups-by-path
    description: Create and list groups within an organization unit identified by its handle path.

security:
  - OAuth2: [system]

paths:
  /groups:
    get:
      tags:
        - Groups
      summary: List groups
      parameters:
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
        - $ref: '#/components/parameters/includeGroupQueryParam'
      responses:
        "200":
          description: List of groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
              example:
                totalResults: 5
                startIndex: 1
                count: 2
                groups:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: "Sports"
                    description: "Sports group"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                  - id: "257e528f-eb24-48b6-884d-20460e190957"
                    name: "Managers"
                    description: "Manager group"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                links:
                  - href: "groups?offset=2&limit=2"
                    rel: "next"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-limit:
                  summary: Invalid limit parameter
                  value:
                    code: "GRP-1011"
                    message:
                      key: "error.groupservice.invalid_limit_parameter"
                      defaultValue: "Invalid limit parameter"
                    description:
                      key: "error.groupservice.invalid_limit_parameter_description"
                      defaultValue: "The limit parameter must be a positive integer"
                invalid-offset:
                  summary: Invalid offset parameter
                  value:
                    code: "GRP-1012"
                    message:
                      key: "error.groupservice.invalid_offset_parameter"
                      defaultValue: "Invalid offset parameter"
                    description:
                      key: "error.groupservice.invalid_offset_parameter_description"
                      defaultValue: "The offset parameter must be a non-negative integer"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

    post:
      tags:
        - Groups
      summary: Create a new group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
            example:
              name: "Sports"
              description: "Sports group"
              ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
              members:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "user"
                  id: "9f1e47d3-0347-4464-9f02-e0bfae02e896"
                - type: "group"
                  id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Sports"
                description: "Sports group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-member-type:
                  summary: Invalid member type
                  value:
                    code: "GRP-1014"
                    message:
                      key: "error.groupservice.invalid_member_type"
                      defaultValue: "Invalid member type"
                    description:
                      key: "error.groupservice.invalid_member_type_description"
                      defaultValue: "The member type must be 'user', 'group', or 'app'"
                invalid-member-id:
                  summary: Invalid user or app member ID
                  value:
                    code: "GRP-1007"
                    message:
                      key: "error.groupservice.invalid_member_id"
                      defaultValue: "Invalid member ID"
                    description:
                      key: "error.groupservice.invalid_member_id_description"
                      defaultValue: "One or more user or app member IDs in the request do not exist or do not match the claimed type"
                invalid-group-member-id:
                  summary: Invalid group member ID
                  value:
                    code: "GRP-1008"
                    message:
                      key: "error.groupservice.invalid_group_member_id"
                      defaultValue: "Invalid group member ID"
                    description:
                      key: "error.groupservice.invalid_group_member_id_description"
                      defaultValue: "One or more group member IDs in the request do not exist"
                ou-not-found:
                  summary: Organization unit not found
                  value:
                    code: "GRP-1005"
                    message:
                      key: "error.groupservice.invalid_ou_id"
                      defaultValue: "Invalid OU ID"
                    description:
                      key: "error.groupservice.invalid_ou_id_description"
                      defaultValue: "Organization unit does not exists"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1004"
                message:
                  key: "error.groupservice.group_name_conflict"
                  defaultValue: "Group name conflict"
                description:
                  key: "error.groupservice.group_name_conflict_description"
                  defaultValue: "A group with the same name exists under the same parent"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

  /groups/{id}:
    get:
      tags:
        - Groups
      summary: Get a group by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/includeGroupQueryParam'
      responses:
        "200":
          description: Group details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Sports"
                description: "Sports group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1002"
                message:
                  key: "error.groupservice.missing_group_id"
                  defaultValue: "Invalid request format"
                description:
                  key: "error.groupservice.missing_group_id_description"
                  defaultValue: "Group ID is required"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

    put:
      tags:
        - Groups
      summary: Update a group by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
            example:
              name: "Activities"
              description: "Activities group"
              ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
      responses:
        "200":
          description: Group updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Activities"
                description: "Activities group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing-group-id:
                  summary: Missing group ID
                  value:
                    code: "GRP-1002"
                    message:
                      key: "error.groupservice.missing_group_id"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.missing_group_id_description"
                      defaultValue: "Group ID is required"
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                ou-not-found:
                  summary: Organization unit not found
                  value:
                    code: "GRP-1005"
                    message:
                      key: "error.groupservice.invalid_ou_id"
                      defaultValue: "Invalid OU ID"
                    description:
                      key: "error.groupservice.invalid_ou_id_description"
                      defaultValue: "Organization unit does not exists"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1004"
                message:
                  key: "error.groupservice.group_name_conflict"
                  defaultValue: "Group name conflict"
                description:
                  key: "error.groupservice.group_name_conflict_description"
                  defaultValue: "A group with the same name exists under the same parent"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

    delete:
      tags:
        - Groups
      summary: Delete a group by id
      description: |
        Deletes a group using its ID. Its role assignments and its memberships in other groups are
        automatically removed by cascade. The delete is fail-closed and retriable: if dependency
        cleanup fails, the group is left intact and the operation can be retried.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Group deleted
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing-group-id:
                  summary: Missing group ID
                  value:
                    code: "GRP-1002"
                    message:
                      key: "error.groupservice.missing_group_id"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.missing_group_id_description"
                      defaultValue: "Group ID is required"
                cannot-delete-group:
                  summary: Cannot delete group
                  value:
                    code: "GRP-1006"
                    message:
                      key: "error.groupservice.cannot_delete_group"
                      defaultValue: "Cannot delete group"
                    description:
                      key: "error.groupservice.cannot_delete_group_description"
                      defaultValue: "Cannot delete group with child groups"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

  /groups/{id}/members:
    get:
      tags:
        - Groups
      summary: List members in group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
        - $ref: '#/components/parameters/includeQueryParam'
      responses:
        "200":
          description: List of members in the group
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberListResponse'
              example:
                totalResults: 5
                startIndex: 1
                count: 2
                members:
                  - type: "user"
                    id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                  - type: "group"
                    id: "8c2f8e9e-8f2a-4f5b-9c3d-4e5f6a7b8c9d"
                links:
                  - href: "groups/3fa85f64-5717-4562-b3fc-2c963f66afa6/members?offset=2&limit=2"
                    rel: "next"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-limit:
                  summary: Invalid limit parameter
                  value:
                    code: "GRP-1011"
                    message:
                      key: "error.groupservice.invalid_limit_parameter"
                      defaultValue: "Invalid limit parameter"
                    description:
                      key: "error.groupservice.invalid_limit_parameter_description"
                      defaultValue: "The limit parameter must be a positive integer"
                invalid-offset:
                  summary: Invalid offset parameter
                  value:
                    code: "GRP-1012"
                    message:
                      key: "error.groupservice.invalid_offset_parameter"
                      defaultValue: "Invalid offset parameter"
                    description:
                      key: "error.groupservice.invalid_offset_parameter_description"
                      defaultValue: "The offset parameter must be a non-negative integer"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

  /groups/{id}/members/add:
    post:
      tags:
        - Groups
      summary: Add members to a group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembersRequest'
            example:
              members:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "user"
                  id: "9f1e47d3-0347-4464-9f02-e0bfae02e896"
      responses:
        "200":
          description: Members added successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Engineering"
                description: "Engineering group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                empty-members:
                  summary: Empty members list
                  value:
                    code: "GRP-1013"
                    message:
                      key: "error.groupservice.empty_members_list"
                      defaultValue: "Empty members list"
                    description:
                      key: "error.groupservice.empty_members_list_description"
                      defaultValue: "The members list cannot be empty"
                invalid-member-type:
                  summary: Invalid member type
                  value:
                    code: "GRP-1014"
                    message:
                      key: "error.groupservice.invalid_member_type"
                      defaultValue: "Invalid member type"
                    description:
                      key: "error.groupservice.invalid_member_type_description"
                      defaultValue: "The member type must be 'user', 'group', or 'app'"
                invalid-member-id:
                  summary: Invalid user or app member ID
                  value:
                    code: "GRP-1007"
                    message:
                      key: "error.groupservice.invalid_member_id"
                      defaultValue: "Invalid member ID"
                    description:
                      key: "error.groupservice.invalid_member_id_description"
                      defaultValue: "One or more user or app member IDs in the request do not exist or do not match the claimed type"
                invalid-group-member-id:
                  summary: Invalid group member ID
                  value:
                    code: "GRP-1008"
                    message:
                      key: "error.groupservice.invalid_group_member_id"
                      defaultValue: "Invalid group member ID"
                    description:
                      key: "error.groupservice.invalid_group_member_id_description"
                      defaultValue: "One or more group member IDs in the request do not exist"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

  /groups/{id}/members/remove:
    post:
      tags:
        - Groups
      summary: Remove members from a group
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MembersRequest'
            example:
              members:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
      responses:
        "200":
          description: Members removed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Engineering"
                description: "Engineering group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                empty-members:
                  summary: Empty members list
                  value:
                    code: "GRP-1013"
                    message:
                      key: "error.groupservice.empty_members_list"
                      defaultValue: "Empty members list"
                    description:
                      key: "error.groupservice.empty_members_list_description"
                      defaultValue: "The members list cannot be empty"
                invalid-member-type:
                  summary: Invalid member type
                  value:
                    code: "GRP-1014"
                    message:
                      key: "error.groupservice.invalid_member_type"
                      defaultValue: "Invalid member type"
                    description:
                      key: "error.groupservice.invalid_member_type_description"
                      defaultValue: "The member type must be 'user', 'group', or 'app'"
                invalid-member-id:
                  summary: Invalid user or app member ID
                  value:
                    code: "GRP-1007"
                    message:
                      key: "error.groupservice.invalid_member_id"
                      defaultValue: "Invalid member ID"
                    description:
                      key: "error.groupservice.invalid_member_id_description"
                      defaultValue: "One or more user or app member IDs in the request do not exist or do not match the claimed type"
                invalid-group-member-id:
                  summary: Invalid group member ID
                  value:
                    code: "GRP-1008"
                    message:
                      key: "error.groupservice.invalid_group_member_id"
                      defaultValue: "Invalid group member ID"
                    description:
                      key: "error.groupservice.invalid_group_member_id_description"
                      defaultValue: "One or more group member IDs in the request do not exist"
        "404":
          description: Group not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

  /groups/tree/{path}:
    get:
      tags:
        - groups-by-path
      summary: List groups in organization unit specified by handle path
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
          style: simple
          explode: false
          description: |
            Hierarchical path of organization unit handles separated by forward slashes.
            Examples:
            - `engineering` - Lists groups in the "engineering" OU
            - `engineering/frontend` - Lists groups in "engineering/frontend"
          example: "engineering/frontend"
        - $ref: '#/components/parameters/limitQueryParam'
        - $ref: '#/components/parameters/offsetQueryParam'
        - $ref: '#/components/parameters/includeGroupQueryParam'
      responses:
        "200":
          description: List of groups in the organization unit
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupListResponse'
              example:
                totalResults: 5
                startIndex: 1
                count: 2
                groups:
                  - id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                    name: "Sports"
                    description: "Sports group"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                  - id: "257e528f-eb24-48b6-884d-20460e190957"
                    name: "Managers"
                    description: "Manager group"
                    ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
                links:
                  - href: "groups/tree/engineering/frontend?offset=2&limit=2"
                    rel: "next"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-path:
                  summary: Invalid path structure
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-limit:
                  summary: Invalid limit parameter
                  value:
                    code: "GRP-1011"
                    message:
                      key: "error.groupservice.invalid_limit_parameter"
                      defaultValue: "Invalid limit parameter"
                    description:
                      key: "error.groupservice.invalid_limit_parameter_description"
                      defaultValue: "The limit parameter must be a positive integer"
                invalid-offset:
                  summary: Invalid offset parameter
                  value:
                    code: "GRP-1012"
                    message:
                      key: "error.groupservice.invalid_offset_parameter"
                      defaultValue: "Invalid offset parameter"
                    description:
                      key: "error.groupservice.invalid_offset_parameter_description"
                      defaultValue: "The offset parameter must be a non-negative integer"
        "404":
          description: Organization unit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

    post:
      tags:
        - groups-by-path
      summary: Create a new group under the organization unit specified by the handle path
      parameters:
        - in: path
          name: path
          required: true
          schema:
            type: string
          style: simple
          explode: false
          description: |
            Hierarchical path of organization unit handles separated by forward slashes.
            The new group will be created under the organization unit specified by this path.
            Examples:
            - `engineering` - Creates a new group under the "engineering" OU
            - `engineering/frontend` - Creates a new group under "engineering/frontend"
          example: "engineering/frontend"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupByPathRequest'
            example:
              name: "Sports"
              description: "Sports group"
              members:
                - type: "user"
                  id: "7a4b1f8e-5c69-4b60-9232-2b0aaf65ef3c"
                - type: "user"
                  id: "9f1e47d3-0347-4464-9f02-e0bfae02e896"
                - type: "group"
                  id: "6b1e7b8d-7e19-41eb-8fa2-c0ee5bb67a94"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Group'
              example:
                id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
                name: "Sports"
                description: "Sports group"
                ouId: "a839f4bd-39dc-4eaa-b5cc-210d8ecaee87"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalid-request-format:
                  summary: Invalid request format
                  value:
                    code: "GRP-1001"
                    message:
                      key: "error.groupservice.invalid_request_format"
                      defaultValue: "Invalid request format"
                    description:
                      key: "error.groupservice.invalid_request_format_description"
                      defaultValue: "The request body is malformed or contains invalid data"
                invalid-member-type:
                  summary: Invalid member type
                  value:
                    code: "GRP-1014"
                    message:
                      key: "error.groupservice.invalid_member_type"
                      defaultValue: "Invalid member type"
                    description:
                      key: "error.groupservice.invalid_member_type_description"
                      defaultValue: "The member type must be 'user', 'group', or 'app'"
                invalid-member-id:
                  summary: Invalid member ID
                  value:
                    code: "GRP-1007"
                    message:
                      key: "error.groupservice.invalid_member_id"
                      defaultValue: "Invalid member ID"
                    description:
                      key: "error.groupservice.invalid_member_id_description"
                      defaultValue: "One or more member IDs in the request do not exist"
                invalid-group-member-id:
                  summary: Invalid group member ID
                  value:
                    code: "GRP-1008"
                    message:
                      key: "error.groupservice.invalid_group_member_id"
                      defaultValue: "Invalid group member ID"
                    description:
                      key: "error.groupservice.invalid_group_member_id_description"
                      defaultValue: "One or more group member IDs in the request do not exist"
        "404":
          description: Organization unit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1003"
                message:
                  key: "error.groupservice.group_not_found"
                  defaultValue: "Group not found"
                description:
                  key: "error.groupservice.group_not_found_description"
                  defaultValue: "The group with the specified id does not exist"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "GRP-1004"
                message:
                  key: "error.groupservice.group_name_conflict"
                  defaultValue: "Group name conflict"
                description:
                  key: "error.groupservice.group_name_conflict_description"
                  defaultValue: "A group with the same name exists under the same parent"
        "500":
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              example: "Internal server error"

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:8090/oauth2/authorize
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs
        clientCredentials:
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs

  parameters:
    limitQueryParam:
      in: query
      name: limit
      required: false
      description: |
        Maximum number of records to return. Must be between 1 and 100 inclusive.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 30
    offsetQueryParam:
      in: query
      name: offset
      required: false
      description: |
        Number of records to skip for pagination. Must be a non-negative integer.
      schema:
        type: integer
        minimum: 0
        default: 0
    includeQueryParam:
      in: query
      name: include
      required: false
      schema:
        type: string
        enum:
          - display
      description: |
        Optional parameter to include additional information.
        - `display` - Include display names for members. For users, the display value is resolved from the schema-configured display attribute (`systemAttributes.display`). Falls back to the user ID if no display attribute is configured, the configured attribute path does not exist in the user's data, or the attribute value is empty. For groups, the group name is used.
    includeGroupQueryParam:
      in: query
      name: include
      required: false
      schema:
        type: string
        enum:
          - display
      description: |
        Optional parameter to include additional display information.
        - `display` - Include `ouHandle`, the human-readable handle of the organization unit, alongside the `ouId`.

  schemas:
    Member:
      type: object
      required: [id, type]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - user
            - group
            - app
            - agent
        display:
          type: string
          readOnly: true
          description: "Display name of the member (only included when include=display query parameter is used). For users, resolved from the schema-configured display attribute (`systemAttributes.display`); falls back to the user ID if the attribute is not configured, the path does not exist, or the value is empty. For groups, the group name is used."

    Group:
      type: object
      required: [id, name, ouId]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        ouId:
          type: string
          format: uuid
        ouHandle:
          type: string
          readOnly: true
          description: "Human-readable handle of the organization unit (only included when include=display query parameter is used)."
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    CreateGroupRequest:
      type: object
      required: [name, ouId]
      properties:
        name:
          type: string
        description:
          type: string
        ouId:
          type: string
          format: uuid
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'

    UpdateGroupRequest:
      type: object
      required: [name, ouId]
      properties:
        name:
          type: string
        description:
          type: string
        ouId:
          type: string
          format: uuid

    GroupListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: "Number of results that match the listing operation."
          example: 8
        startIndex:
          type: integer
          description: "Index of the first element of the page, which will be equal to offset + 1."
          example: 1
        count:
          type: integer
          description: "Number of elements in the returned page."
          example: 5
        groups:
          type: array
          items:
            $ref: '#/components/schemas/Group'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    MemberListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: "Number of results that match the listing operation."
          example: 20
        startIndex:
          type: integer
          description: "Index of the first element of the page, which will be equal to offset + 1."
          example: 1
        count:
          type: integer
          description: "Number of elements in the returned page."
          example: 10
        members:
          type: array
          items:
            $ref: '#/components/schemas/Member'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'

    CreateGroupByPathRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: "The display name of the group"
          example: "Sports Team"
        description:
          type: string
          description: "Optional description of the group"
          example: "Group for sports activities and events"
        members:
          type: array
          description: "Optional list of initial members (users and groups)"
          items:
            $ref: '#/components/schemas/Member'

    Link:
      type: object
      properties:
        href:
          type: string
          example: "groups?offset=20&limit=10"
        rel:
          type: string
          example: "next"

    MembersRequest:
      type: object
      required: [members]
      properties:
        members:
          type: array
          description: "List of members to add or remove"
          minItems: 1
          items:
            $ref: '#/components/schemas/Member'

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: "Error code. Codes follow the GRP-XXXX convention."
          example: "GRP-1001"
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
