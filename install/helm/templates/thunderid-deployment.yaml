{{- $usingSqlite := or (eq .Values.configuration.database.config.type "sqlite") (eq .Values.configuration.database.runtime_transient.type "sqlite") (eq .Values.configuration.database.entity.type "sqlite") (eq .Values.configuration.database.runtime_persistent.type "sqlite") }}
{{- if and .Values.declarativeResources.enabled .Values.declarativeResources.configMap.name .Values.declarativeResources.secret.name }}
{{- fail "Invalid declarativeResources configuration: set only one source, declarativeResources.configMap.name or declarativeResources.secret.name." }}
{{- end }}
{{- if and .Values.declarativeResources.enabled (not .Values.declarativeResources.configMap.name) (not .Values.declarativeResources.secret.name) }}
{{- fail "Invalid declarativeResources configuration: set declarativeResources.configMap.name or declarativeResources.secret.name when declarativeResources.enabled=true." }}
{{- end }}
{{- if and .Values.declarativeResources.enabled .Values.declarativeResources.singleFile.keys (or .Values.declarativeResources.configMap.items .Values.declarativeResources.secret.items) }}
{{- fail "Invalid declarativeResources configuration: declarativeResources.singleFile.keys is mutually exclusive with configMap.items / secret.items." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "thunderid.fullname" . }}-deployment
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "thunderid.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicaCount }}
  strategy:
    rollingUpdate:
      maxSurge: {{ .Values.deployment.strategy.rollingUpdate.maxSurge }}
      maxUnavailable: {{ .Values.deployment.strategy.rollingUpdate.maxUnavailable }}
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "thunderid.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thunderid.selectorLabels" . | nindent 8 }}
      annotations:
        checksum.deployment.yaml: {{ include (print $.Template.BasePath "/config-map.yaml") . | sha256sum }}
        {{- if include "thunderid.shouldIncludeSecretChecksum" . }}
        checksum.secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "thunderid.serviceAccountName" . }}
      securityContext:
        {{- if .Values.deployment.securityContext.enableRunAsUser }}
        runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
        {{- end }}
        {{- if .Values.deployment.securityContext.enableRunAsGroup }}
        runAsGroup: {{ .Values.deployment.securityContext.runAsGroup }}
        {{- end }}
        {{- if .Values.deployment.securityContext.enableFsGroup }}
        fsGroup: {{ .Values.deployment.securityContext.fsGroup }}
        {{- end }}
        {{- if .Values.deployment.securityContext.seccompProfile.enabled }}
        seccompProfile:
          type: {{ .Values.deployment.securityContext.seccompProfile.type }}
        {{- end }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - {{ include "thunderid.name" . }}
                    - key: app.kubernetes.io/instance
                      operator: In
                      values:
                        - {{ .Release.Name }}
                topologyKey: topology.kubernetes.io/zone
      {{- if .Values.deployment.image.imagePullSecret }}
      imagePullSecrets:
        - name: {{ .Values.deployment.image.imagePullSecret }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.deployment.terminationGracePeriodSeconds }}
      containers:
        - name: thunderid
          {{- if .Values.deployment.image.digest }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}@{{ .Values.deployment.image.digest }}
          {{- else }}
          image: {{ .Values.deployment.image.registry }}/{{ .Values.deployment.image.repository }}:{{ default "latest" .Values.deployment.image.tag }}
          {{- end }}
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          env:
            {{- include "thunderid.databasePasswordEnvVars" . | nindent 12 }}
            {{- include "thunderid.secretEnvVars" (dict "secretEnv" .Values.deployment.secretEnv) | nindent 12 }}
            {{- if .Values.deployment.env }}
            {{- toYaml .Values.deployment.env | nindent 12 }}
            {{- end }}
            {{- include "thunderid.cacheRedisPasswordEnvVars" . | nindent 12 }}
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - nc -z localhost {{ .Values.deployment.container.port }}
            initialDelaySeconds: {{ .Values.deployment.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.startupProbe.periodSeconds }}
            failureThreshold: {{ .Values.deployment.startupProbe.failureThreshold }}
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: {{ .Values.deployment.container.port }}
              scheme: {{ if .Values.configuration.server.httpOnly }}HTTP{{ else }}HTTPS{{ end }}
            periodSeconds: {{ .Values.deployment.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: {{ .Values.deployment.container.port }}
              scheme: {{ if .Values.configuration.server.httpOnly }}HTTP{{ else }}HTTPS{{ end }}
            initialDelaySeconds: {{ .Values.deployment.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.readinessProbe.periodSeconds }}
          resources:
            requests:
              memory: {{ .Values.deployment.resources.requests.memory }}
              cpu: {{ .Values.deployment.resources.requests.cpu }}
            limits:
              memory: {{ .Values.deployment.resources.limits.memory }}
              cpu: {{ .Values.deployment.resources.limits.cpu }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: {{ .Values.deployment.securityContext.readOnlyRootFilesystem }}
            runAsNonRoot: true
            {{- if .Values.deployment.securityContext.enableRunAsUser }}
            runAsUser: {{ .Values.deployment.securityContext.runAsUser }}
            {{- end }}
            capabilities:
              drop:
                - all
          ports:
            - containerPort: {{ .Values.deployment.container.port }}
              protocol: TCP
          volumeMounts:
            {{- if or .Values.persistence.enabled $usingSqlite }}
            - name: database-storage
              mountPath: /opt/thunderid/database
            {{- end }}
            {{- if .Values.setup.enabled }}
            # Reads the per-deployment key material generated by the setup job.
            - name: certs-storage
              mountPath: /opt/thunderid/config/certs
              readOnly: true
            # Reads the runtime secrets (e.g. the Direct Auth Secret) generated by the setup job.
            - name: secrets-storage
              mountPath: /opt/thunderid/config/secrets
              readOnly: true
            {{- end }}
            - name: deployment-yaml-volume
              mountPath: /opt/thunderid/deployment.yaml
              subPath: deployment.yaml
            - name: gate-config-volume
              mountPath: /opt/thunderid/apps/gate/config.js
              subPath: gate-config.js
            - name: console-config-volume
              mountPath: /opt/thunderid/apps/console/config.js
              subPath: console-config.js
            {{- if .Values.declarativeResources.enabled }}
            {{- if .Values.declarativeResources.singleFile.keys }}
{{ include "thunderid.singleFileVolumeMounts" (dict "keys" .Values.declarativeResources.singleFile.keys "mountPath" .Values.declarativeResources.mountPath "readOnly" .Values.declarativeResources.readOnly) | nindent 12 }}
            {{- else if and .Values.declarativeResources.configMap.name .Values.declarativeResources.configMap.items }}
{{ include "thunderid.declarativeResourceVolumeMounts" (dict "items" .Values.declarativeResources.configMap.items "field" "declarativeResources.configMap.items" "mountPath" .Values.declarativeResources.mountPath "readOnly" .Values.declarativeResources.readOnly) | nindent 12 }}
            {{- else if and .Values.declarativeResources.secret.name .Values.declarativeResources.secret.items }}
{{ include "thunderid.declarativeResourceVolumeMounts" (dict "items" .Values.declarativeResources.secret.items "field" "declarativeResources.secret.items" "mountPath" .Values.declarativeResources.mountPath "readOnly" .Values.declarativeResources.readOnly) | nindent 12 }}
            {{- else }}
            - name: declarative-resources
              mountPath: {{ .Values.declarativeResources.mountPath }}
              readOnly: {{ .Values.declarativeResources.readOnly }}
            {{- end }}
            {{- end }}
      volumes:
        {{- if .Values.setup.enabled }}
        - name: certs-storage
          persistentVolumeClaim:
            claimName: {{ include "thunderid.fullname" . }}-certs-pvc
        - name: secrets-storage
          persistentVolumeClaim:
            claimName: {{ include "thunderid.fullname" . }}-secrets-pvc
        {{- end }}
        {{- if or .Values.persistence.enabled $usingSqlite }}
        - name: database-storage
          persistentVolumeClaim:
            claimName: {{ include "thunderid.fullname" . }}-database-pvc
        {{- end }}
        - name: deployment-yaml-volume
          configMap:
            name: {{ include "thunderid.fullname" . }}-config-map
        - name: gate-config-volume
          configMap:
            name: {{ include "thunderid.fullname" . }}-config-map
        - name: console-config-volume
          configMap:
            name: {{ include "thunderid.fullname" . }}-config-map
        {{- if .Values.declarativeResources.enabled }}
        - name: declarative-resources
          {{- if .Values.declarativeResources.configMap.name }}
          configMap:
            name: {{ .Values.declarativeResources.configMap.name }}
            {{- if .Values.declarativeResources.configMap.items }}
            items:
{{ include "thunderid.declarativeResourceItems" (dict "items" .Values.declarativeResources.configMap.items "field" "declarativeResources.configMap.items") | nindent 14 }}
            {{- end }}
          {{- else }}
          secret:
            secretName: {{ .Values.declarativeResources.secret.name }}
            {{- if .Values.declarativeResources.secret.items }}
            items:
{{ include "thunderid.declarativeResourceItems" (dict "items" .Values.declarativeResources.secret.items "field" "declarativeResources.secret.items") | nindent 14 }}
            {{- end }}
          {{- end }}
        {{- end }}
