openapi: 3.0.0
info:
  title: Authentication Provider API
  version: 1.0.0
  description: API specification for the Authentication Provider interface.

security:
  - ApiKeyAuth: []
paths:
  /authenticate:
    post:
      summary: Authenticate a user
      operationId: authenticate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthenticateRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '401':
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /attributes:
    post:
      summary: Get user attributes
      operationId: getAttributes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAttributesRequest'
      responses:
        '200':
          description: Attributes retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttributesResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '401':
          description: Invalid token or unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /initiate-authentication:
    post:
      summary: Initiate authentication for a credential type
      description: >
        Begin an authentication ceremony (for example, issue a passkey challenge) for the given
        credential type. Only some credential types require this step. The response payload is
        provider-defined and is passed through to the caller as-is.
      operationId: initiateAuthentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateRequest'
      responses:
        '200':
          description: Initiation successful; a provider-defined payload is returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Provider-defined initiation data (for example, a WebAuthn challenge)
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /initiate-enrollment:
    post:
      summary: Initiate enrollment for a credential type
      description: >
        Begin a credential enrollment ceremony (for example, issue passkey creation options) for
        the given credential type. The response payload is provider-defined and is passed through
        to the caller as-is.
      operationId: initiateEnrollment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitiateRequest'
      responses:
        '200':
          description: Initiation successful; a provider-defined payload is returned
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                description: Provider-defined initiation data (for example, passkey creation options)
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

  /enroll:
    post:
      summary: Enroll a credential for a user
      description: >
        Complete a credential enrollment. Completing enrollment also authenticates the user, so
        the enrolled and authenticated user is returned.
      operationId: enroll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollRequest'
      responses:
        '200':
          description: Enrollment successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnResult'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '401':
          description: Enrollment failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthnProviderError'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: API-KEY
  schemas:
    AuthenticateRequest:
      type: object
      properties:
        identifiers:
          type: object
          additionalProperties: true
          description: Map of user identifiers
        credentials:
          type: object
          additionalProperties: true
          description: Map of user credentials
        metadata:
          $ref: '#/components/schemas/AuthnMetadata'
      required:
        - identifiers
        - credentials

    GetAttributesRequest:
      type: object
      properties:
        token:
          type: string
          description: Authentication token
        requestedAttributes:
          $ref: '#/components/schemas/RequestedAttributes'
        metadata:
          $ref: '#/components/schemas/GetAttributesMetadata'
      required:
        - token

    InitiateRequest:
      type: object
      properties:
        credentialType:
          type: string
          description: The credential type to initiate (for example, "passkey")
        initData:
          type: object
          additionalProperties: true
          description: Provider-defined initiation input for the credential type
        metadata:
          $ref: '#/components/schemas/AuthnMetadata'
      required:
        - credentialType

    EnrollRequest:
      type: object
      properties:
        identifiers:
          type: object
          additionalProperties: true
          description: Map of user identifiers
        credentials:
          type: object
          additionalProperties: true
          description: Map of credentials to enroll
        metadata:
          $ref: '#/components/schemas/AuthnMetadata'
      required:
        - credentials

    AuthnMetadata:
      type: object
      properties:
        appMetadata:
          type: object
          additionalProperties: true
          description: Application metadata

    GetAttributesMetadata:
      type: object
      properties:
        appMetadata:
          type: object
          additionalProperties: true
          description: Application metadata
        locale:
          type: string
          description: User locale

    AuthnResult:
      type: object
      description: >
        Result of a successful authentication or enrollment. For both the entity reference and the
        attributes, the provider returns either an opaque token to be resolved later or the resolved
        value inline: entityReferenceToken or entityReference, and attributeToken or attributes.
      properties:
        authenticatedClaims:
          type: object
          additionalProperties: true
          description: Claims produced by the authentication or enrollment mechanism
        entityReferenceToken:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Opaque, provider-defined token used to resolve the entity reference later.
            Null when entityReference is returned inline.
        entityReference:
          $ref: '#/components/schemas/EntityReference'
        attributeToken:
          type: object
          additionalProperties: true
          nullable: true
          description: >
            Opaque, provider-defined token used to resolve the user attributes later.
            Null when attributes are returned inline.
        attributes:
          $ref: '#/components/schemas/AttributesResponse'

    EntityReference:
      type: object
      properties:
        entityId:
          type: string
          description: Identifier of the referenced entity
        entityCategory:
          type: string
          description: Category of the referenced entity
        entityType:
          type: string
          description: Type of the referenced entity
        ouId:
          type: string
          description: Organization unit ID the entity belongs to

    AssuranceMetadataResponse:
      type: object
      properties:
        isVerified:
          type: boolean
          description: Whether the attribute is verified
        verificationId:
          type: string
          description: Key of the corresponding verification response in the verifications map

    VerificationResponse:
      type: object
      properties:
        trustFramework:
          type: string
          description: Trust framework used for verification
        time:
          type: string
          description: Time of verification
        verificationProcess:
          type: string
          description: Verification process used

    RequestedAttributes:
      type: object
      properties:
        attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeMetadataRequest'
          description: Map of attribute names to their request metadata
        verifications:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VerificationRequest'
          description: Map of verification IDs to verification requests

    AttributeMetadataRequest:
      type: object
      properties:
        genericMetadataRequest:
          $ref: '#/components/schemas/GenericMetadataRequest'
        assuranceMetadataRequest:
          $ref: '#/components/schemas/AssuranceMetadataRequest'

    GenericMetadataRequest:
      type: object
      properties:
        essential:
          type: boolean
          description: Whether this claim is essential
        value:
          type: string
          description: Specific value requested
        values:
          type: array
          items:
            type: string
          description: List of acceptable values

    GenericTimeMetadataRequest:
      allOf:
        - $ref: '#/components/schemas/GenericMetadataRequest'
        - type: object
          properties:
            maxAge:
              type: integer
              description: Maximum age in seconds

    AssuranceMetadataRequest:
      type: object
      properties:
        shouldVerify:
          type: boolean
          description: Whether verification is requested
        verificationId:
          type: string
          description: Key of the corresponding verification request in the verifications map

    VerificationRequest:
      type: object
      properties:
        trustFramework:
          $ref: '#/components/schemas/GenericMetadataRequest'
        verificationProcess:
          $ref: '#/components/schemas/GenericMetadataRequest'
        time:
          $ref: '#/components/schemas/GenericTimeMetadataRequest'

    AttributesResponse:
      type: object
      properties:
        attributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AttributeResponse'
          description: Map of attribute names to their values and metadata
        verifications:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/VerificationResponse'
          description: Map of verification IDs to verification details

    AttributeResponse:
      type: object
      properties:
        value:
          description: The attribute value
        assuranceMetadataResponse:
          $ref: '#/components/schemas/AssuranceMetadataResponse'

    ErrorCode:
      type: string
      description: |
        Error codes returned by the authentication provider API:
        - AUP-0001: System Error
        - AUP-0002: Authentication Failed
        - AUP-0003: User Not Found
        - AUP-0004: Invalid Token
        - AUP-0005: Not Implemented
        - AUP-0006: Invalid Request
        - AUP-0007: Ambiguous User
        - AUP-0008: Enrollment Failed
      enum:
        - AUP-0001
        - AUP-0002
        - AUP-0003
        - AUP-0004
        - AUP-0005
        - AUP-0006
        - AUP-0007
        - AUP-0008

    AuthnProviderError:
      type: object
      properties:
        code:
          $ref: '#/components/schemas/ErrorCode'
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'
      required:
        - code
        - message

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
