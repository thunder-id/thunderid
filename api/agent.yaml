              schema:
                name:
                  type: "string"
                  required: true
                  unique: true
                description:
                  type: "string"
                model:
                  type: "string"
                  required: true
                  enum: ["gpt-4", "gpt-4o", "claude-sonnet", "claude-opus"]
                isActive:
