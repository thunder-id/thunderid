codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

flags:
  backend-unit:
    carryforward: true
    paths:
      - backend/
  backend-integration-sqlite:
    carryforward: true
    paths:
      - backend/
  backend-integration-postgres:
    carryforward: true
    paths:
      - backend/
  backend-integration-redis:
    carryforward: true
    paths:
      - backend/
  frontend-apps-console-unit:
    carryforward: true
    paths:
      - frontend/apps/console/
  frontend-apps-gate-unit:
    carryforward: true
    paths:
      - frontend/apps/gate/

coverage:
  status:
    project:
      default:
        enabled: true
        target: 60%
        threshold: 1%
        informational: true
      backend-unit:
        flags:
          - backend-unit
        target: 60%
        threshold: 1%
        informational: true
      backend-integration:
        flags:
          - backend-integration-sqlite
          - backend-integration-postgres
        target: 60%
        threshold: 1%
        informational: true
      backend-combined:
        flags:
          - backend-unit
          - backend-integration-sqlite
          - backend-integration-postgres
          - backend-integration-redis
        target: auto
        threshold: 1%
        informational: false
      combined:
        flags:
          - backend-unit
          - backend-integration-sqlite
          - backend-integration-postgres
          - backend-integration-redis
          - frontend-apps-console-unit
          - frontend-apps-gate-unit
        target: auto
        threshold: 1%
        informational: true
      frontend-apps-console-unit:
        flags:
          - frontend-apps-console-unit
        target: 60%
        threshold: 1%
        informational: true
      frontend-apps-gate-unit:
        flags:
          - frontend-apps-gate-unit
        target: 60%
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        threshold: 1%
        informational: false

ignore:
  - "backend/tests/**"
  - "**/*_test.go"
  - "tests/**"
  - "samples/**"
  - "docs/**"
  - "api/**"
