StylesPath = .vale/styles
MinAlertLevel = suggestion

[formats]
mdx = md

[*.md]
BasedOnStyles = Vale, ThunderID
spelling = NO
Vale.Spelling = NO
Vale.Terms = NO
BlockIgnores = (?s)\A---.*?---,(`[^`]*[a-zA-Z0-9._-]*\.env(\.[a-zA-Z0-9_-]+)*[^`]*`),(?s)```.*?```,(?m)^\|.*\|$

# Disable Vale's built-in rules; only the ThunderID custom styles above apply
Vale.Wordiness = NO
Vale.Repetition = NO
Vale.WeaselWords = NO
Vale.PassiveVoice = NO
Vale.Readability = NO
TokenIgnores = (<(?!\!--)[^>]+>),(\!\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\[[^\]]+\]),(\[[^\]]+\]:\s+\S+),(@[a-zA-Z0-9_-]+\/[a-zA-Z0-9._-]+)

[*.mdx]
BasedOnStyles = Vale, ThunderID
spelling = NO
Vale.Spelling = NO
Vale.Terms = NO
BlockIgnores = (?s)\A---.*?---,(`[^`]*[a-zA-Z0-9._-]*\.env(\.[a-zA-Z0-9_-]+)*[^`]*`),(?s)```.*?```,(?m)^\|.*\|$,(?m)^import\s.*$,(?m)^export\s.*$,(?m)^\s+[A-Za-z][A-Za-z0-9]*=.*$,(?s)<CodeBlock[^>]*>.*?</CodeBlock>

# Disable Vale's built-in rules; only the ThunderID custom styles above apply
Vale.Wordiness = NO
Vale.Repetition = NO
Vale.WeaselWords = NO
Vale.PassiveVoice = NO
Vale.Readability = NO
TokenIgnores = (<[A-Z][^>]*>),(</[A-Z][^>]*>),(<(?!\!--)[^>]+>),(\!\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\([^)]+\)),(\[[^\]]*\]\[[^\]]+\]),(\[[^\]]+\]:\s+\S+),(@[a-zA-Z0-9_-]+\/[a-zA-Z0-9._/-]+),(\{`[^`]*`\})

[**/SKILL.md]
BasedOnStyles =

[**/AGENTS.md]
BasedOnStyles =

[**/documentation-style-guide.mdx]
BasedOnStyles =

[**/copilot-instructions.md]
BasedOnStyles =

[**/privacy-policy.mdx]
BasedOnStyles =

[**/cookie-policy.mdx]
BasedOnStyles =
