                  summary: "FLM-1034 — Prompt group is missing action.nextNode"
                  value:
                    code: "FLM-1034"
                    message:
                      key: "error.flowmgtservice.prompt_missing_action"
                      defaultValue: "Missing prompt action"
                    description:
                      key: "error.flowmgtservice.prompt_missing_action_description"
                      defaultValue: "Prompt must have an action with nextNode"
                invalid-input-type:
                  summary: "FLM-1035 — Input has an unrecognised type"
                  value:
                    code: "FLM-1035"
                    message:
                      key: "error.flowmgtservice.invalid_input_type"
                      defaultValue: "Invalid input type"
                    description:
                      key: "error.flowmgtservice.invalid_input_type_description"
                      defaultValue: "Input has an invalid type"
                invalid-validation-rule:
                  summary: "FLM-1036 — Input validation rule is invalid"
                  value:
                    code: "FLM-1036"
                    message:
                      key: "error.flowmgtservice.invalid_validation_rule"
                      defaultValue: "Invalid validation rule"
                    description:
                      key: "error.flowmgtservice.invalid_validation_rule_description"
                      defaultValue: "Input has an invalid validation rule"
                executor-not-registered:
                  summary: "FLM-1037 — Executor name is not registered"
                  value:
                    code: "FLM-1037"
                    message:
                      key: "error.flowmgtservice.executor_not_registered"
                      defaultValue: "Executor not registered"
                    description:
                      key: "error.flowmgtservice.executor_not_registered_description"
                      defaultValue: "Executor is not registered"
                interceptor-invalid-apply-to:
                  summary: "FLM-1038 — Interceptor applyTo references a non-existent node"
                  value:
                    code: "FLM-1038"
                    message:
                      key: "error.flowmgtservice.interceptor_invalid_apply_to"
                      defaultValue: "Invalid interceptor applyTo"
                    description:
                      key: "error.flowmgtservice.interceptor_invalid_apply_to_description"
                      defaultValue: "Interceptor applyTo references a non-existent node"
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "FLM-1003"
                message:
                  key: "error.flowmgtservice.flow_not_found"
                  defaultValue: "Flow not found"
                description:
                  key: "error.flowmgtservice.flow_not_found_description"
                  defaultValue: "The flow with the specified ID does not exist"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      tags:
        - Flow Management
      summary: Delete flow
      description: Deletes an existing flow definition by its unique identifier
      operationId: deleteFlow
      parameters:
        - name: flowId
          in: path
          required: true
          description: Unique identifier of the flow to delete
          schema:
            type: string
      responses:
        '204':
          description: Flow deleted successfully
        '400':
          description: Bad request — missing/invalid flow ID or attempting to delete a declarative (read-only) flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                missing-id:
                  summary: Flow ID not provided
                  value:
                    code: "FLM-1002"
                    message:
                      key: "error.flowmgtservice.invalid_flow_id"
                      defaultValue: "Invalid flow ID"
                    description:
                      key: "error.flowmgtservice.invalid_flow_id_description"
                      defaultValue: "The flow ID must be provided"
                immutable-flow:
                  summary: Declarative flow cannot be deleted
                  value:
                    code: "FLM-1017"
                    message:
                      key: "error.flowmgtservice.flow_is_immutable"
                      defaultValue: "Flow is immutable"
                    description:
                      key: "error.flowmgtservice.flow_is_immutable_description"
                      defaultValue: "Declarative flows cannot be modified or deleted"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /flows/{flowId}/versions:
    get:
      tags:
        - Flow Versioning
      summary: Get flow version history
      description: |
        Retrieves the complete version history of a specific flow.
      operationId: getFlowVersions
      parameters:
        - name: flowId
          in: path
          required: true
          description: Unique identifier of the flow
          schema:
            type: string
      responses:
        '200':
          description: Flow version history retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersionListResponse'
        '404':
          description: Flow not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "FLM-1003"
                message:
                  key: "error.flowmgtservice.flow_not_found"
                  defaultValue: "Flow not found"
                description:
                  key: "error.flowmgtservice.flow_not_found_description"
                  defaultValue: "The flow with the specified ID does not exist"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /flows/{flowId}/versions/{version}:
    get:
      tags:
        - Flow Versioning
      summary: Get specific flow version
      description: Retrieves a specific version of a flow by version number
      operationId: getFlowVersion
      parameters:
        - name: flowId
          in: path
          required: true
          description: Unique identifier of the flow
          schema:
            type: string
        - name: version
          in: path
          required: true
          description: Version number to retrieve
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: Flow version retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowVersionResponse'
        '404':
          description: Flow or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "FLM-1008"
                message:
                  key: "error.flowmgtservice.flow_version_not_found"
                  defaultValue: "Flow version not found"
                description:
                  key: "error.flowmgtservice.flow_version_not_found_description"
                  defaultValue: "The requested flow version does not exist"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /flows/{flowId}/restore:
    post:
      tags:
        - Flow Versioning
      summary: Restore flow to a previous version
      description: |
        Restores a flow to a specific previous version. This creates a new version 
        with the content from the specified version.
      operationId: restoreFlowVersion
      parameters:
        - name: flowId
          in: path
          required: true
          description: Unique identifier of the flow
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RestoreVersionRequest'
      responses:
        '200':
          description: Flow restored successfully — returns the updated flow definition with the new active version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FlowDefinitionResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "FLM-1009"
                message:
                  key: "error.flowmgtservice.invalid_flow_version"
                  defaultValue: "Invalid flow version"
                description:
                  key: "error.flowmgtservice.invalid_flow_version_description"
                  defaultValue: "The specified flow version is invalid"
        '404':
          description: Flow or version not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "FLM-1008"
                message:
                  key: "error.flowmgtservice.flow_version_not_found"
                  defaultValue: "Flow version not found"
                description:
                  key: "error.flowmgtservice.flow_version_not_found_description"
                  defaultValue: "The requested flow version does not exist"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://localhost:8090/oauth2/authorize
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs
        clientCredentials:
          tokenUrl: https://localhost:8090/oauth2/token
          scopes:
            system: Access to system management APIs

  responses:
    Unauthorized:
      description: Unauthorized - missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "AUTH-4010"
            message:
              key: "error.unauthorized"
              defaultValue: "Unauthorized"
            description:
              key: "error.unauthorized_description"
              defaultValue: "Authentication is required to access this resource"
    Forbidden:
      description: Forbidden - insufficient permissions to perform this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: "AUTH-4030"
            message:
              key: "error.forbidden"
              defaultValue: "Forbidden"
            description:
              key: "error.forbidden_description"
              defaultValue: "You do not have sufficient permissions to access this resource"

  schemas:
    FlowListResponse:
      type: object
      properties:
        totalResults:
          type: integer
          description: "Number of results that match the listing operation."
          example: 5
        startIndex:
          type: integer
          description: "Index of the first element of the page, which will be equal to offset + 1."
          example: 1
        count:
          type: integer
          description: "Number of elements in the returned page."
          example: 3
        flows:
          type: array
          items:
            $ref: '#/components/schemas/BasicFlowDefinitionResponse'
        links:
          type: array
          items:
            $ref: '#/components/schemas/Link'
          description: "Navigation links for pagination."
      example:
        totalResults: 5
        startIndex: 1
        count: 3
        flows:
          - id: "641af221-75ff-4247-ab1f-ff139040a91b"
            flowType: "AUTHENTICATION"
            name: "Basic Authentication Flow"
            handle: "default-basic-flow"
            activeVersion: 2
            isReadOnly: true
            createdAt: "2024-01-15T10:20:30Z"
            updatedAt: "2024-02-20T14:25:35Z"
          - id: "2sd4f6g7-h8i9-0j1k-2l3m-4n5o6p7q8r9s"
            flowType: "REGISTRATION"
            name: "Basic Registration Flow"
            handle: "basic-registration-flow"
            activeVersion: 7
            isReadOnly: false
            createdAt: "2024-03-10T09:15:25Z"
            updatedAt: "2024-04-12T11:30:40Z"
          - id: "b12c3d45-6789-4e0f-9abc-def123456789"
            flowType: "REGISTRATION"
            name: "Google Registration Flow"
            handle: "google-registration-flow"
            activeVersion: 1
            isReadOnly: false
            createdAt: "2024-05-05T08:10:20Z"
            updatedAt: "2024-06-01T12:00:00Z"
        links:
          - href: "/flows?offset=3&limit=3"
            rel: "next"

    FlowVersionListResponse:
      type: object
      properties:
        totalVersions:
          type: integer
          description: Total number of versions available for this flow
          example: 8
        versions:
          type: array
          items:
            $ref: '#/components/schemas/FlowVersionInfo'
          description: List of flow versions (most recent first)
      example:
        totalVersions: 8
        versions:
          - version: 8
            createdAt: "2024-12-01T15:30:00Z"
            isActive: true
          - version: 7
            createdAt: "2024-11-25T10:15:00Z"
            isActive: false
          - version: 6
            createdAt: "2024-11-20T14:20:00Z"
            isActive: false

    FlowVersionInfo:
      type: object
      required:
        - version
        - createdAt
        - isActive
      properties:
        version:
          type: integer
          description: Version number
          example: 5
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this specific version was created
        isActive:
          type: boolean
          description: Indicates if this is the currently active version
          example: false

    RestoreVersionRequest:
      type: object
      required:
        - version
      properties:
        version:
          type: integer
          description: Version number to restore to
          minimum: 1
          example: 5
      example:
        version: 5

    Link:
      type: object
      required:
        - href
        - rel
      properties:
        href:
          type: string
          description: The URI of the link
          example: "/flows?offset=1&limit=30"
        rel:
          type: string
          description: The link relation type (first, next, previous, last)
          example: "next"
    
    BasicFlowDefinitionResponse:
      type: object
      required:
        - id
        - flowType
        - name
        - handle
        - activeVersion
        - isReadOnly
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique identifier for the flow
        flowType:
          type: string
          enum:
            - AUTHENTICATION
            - REGISTRATION
        name:
          type: string
          description: Name of the flow
          example: "Basic Authentication Flow"
        handle:
          type: string
          description: |
            URL-friendly handle for the flow (lowercase letters, numbers, hyphens, and underscores only)
            Once set, the handle cannot be changed.
          pattern: '^[a-z0-9][a-z0-9_-]*[a-z0-9]$|^[a-z0-9]$'
          example: "default-basic-flow"
        activeVersion:
          type: integer
          description: The version number that is currently active
          example: 5
        isReadOnly:
          type: boolean
          description: Whether this flow is immutable (declarative resource — cannot be modified or deleted)
          example: false
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the flow was initially created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the flow was last modified

    FlowDefinitionRequest:
      type: object
      required:
        - name
        - flowType
        - handle
        - nodes
      properties:
        name:
          type: string
          description: Name of the flow
          example: "Basic Authentication Flow"
        handle:
          type: string
          description: |
            URL-friendly handle for the flow (lowercase letters, numbers, hyphens, and underscores only)
            Once set, the handle cannot be changed.
          pattern: '^[a-z0-9][a-z0-9_-]*[a-z0-9]$|^[a-z0-9]$'
          example: "default-basic-flow"
        flowType:
          type: string
          enum:
            - AUTHENTICATION
            - REGISTRATION
          description: |
            Type of flow
          example: AUTHENTICATION
        nodes:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Node'
          description: List of nodes that define the flow graph
      example:
        name: Basic Authentication Flow
        handle: default-basic-flow
        flowType: AUTHENTICATION
        nodes: &authFlowNodes
          - id: node_000
            type: START
            layout:
              size:
                width: 180
                height: 80
              position:
                x: 50
                y: 50
            onSuccess: node_001
          - id: node_001
            type: PROMPT
            layout:
              size:
                width: 320
                height: 450
              position:
                x: 50
                y: 180
            meta:
              components:
                - type: TEXT
                  id: text_001
                  label: "{{ t(signin:heading.label) }}"
                  variant: HEADING_01
                - type: BLOCK
                  id: block_001
                  components:
                    - type: TEXT_INPUT
                      id: input_001
                      label: "{{ t(signin:fields.username.label) }}"
                      required: true
                      placeholder: "{{ t(signin:fields.username.placeholder) }}"
                    - type: PASSWORD_INPUT
                      id: input_002
                      label: "{{ t(signin:fields.password.label) }}"
                      required: true
                      placeholder: "{{ t(signin:fields.password.placeholder) }}"
                    - type: ACTION
                      id: action_001
                      label: "{{ t(signin:buttons.submit) }}"
                - type: DIVIDER
                  id: divider_001
                  label: "{{ t(signin:divider.or.label) }}"
                - type: ACTION
                  id: action_002
                  label: "{{ t(signin:buttons.continue.with.sms.otp.label) }}"
            prompts:
              - inputs:
                  - ref: input_001
                    type: TEXT_INPUT
                    identifier: username
                    required: true
                  - ref: input_002
                    type: PASSWORD_INPUT
                    identifier: password
                    required: true
                action:
                  ref: action_001
                  nextNode: node_004
              - action:
                  ref: action_002
                  nextNode: node_002
          - id: node_002
            type: TASK_EXECUTION
            layout:
              size:
                width: 200
                height: 120
              position:
                x: 450
                y: 300
            executor:
              name: SendSMSExecutor
            properties:
              senderId: "<SENDER_ID>"
            onSuccess: node_003
            onFailure: node_007
          - id: node_003
            type: PROMPT
            layout:
              size:
                width: 320
                height: 380
              position:
                x: 700
                y: 280
            meta:
              components:
                - type: HEADING
                  id: heading_003
                  label: "{{ t(sms.otp:verify.heading) }}"
                - type: TEXT
                  id: text_003
                  label: "{{ t(sms.otp:verify.heading.label) }}"
                  variant: HEADING_01
                - type: OTP_INPUT
                  id: otp_001
                  label: "{{ t(sms.otp:verify.otp.input.label) }}"
                  length: 6
                  required: true
                - type: ACTION
                  id: action_003
                  label: "{{ t(sms.otp:verify.buttons.submit) }}"
                - type: ACTION
                  id: action_004
                  label: "{{ t(sms.otp:verify.buttons.resend) }}"
            prompts:
              - inputs:
                  - ref: otp_001
                    type: OTP_INPUT
                    identifier: otp
                    required: true
                action:
                  ref: action_003
                  nextNode: node_005
              - action:
                  ref: action_004
                  nextNode: node_002
          - id: node_004
            type: TASK_EXECUTION
            layout:
              size:
                width: 200
                height: 140
              position:
                x: 450
                y: 100
            executor:
              name: CredentialsAuthExecutor
              inputs:
                - ref: input_001
                  identifier: username
                  type: TEXT_INPUT
                  required: true
                - ref: input_002
                  identifier: password
                  type: PASSWORD_INPUT
                  required: true
            onSuccess: node_008
          - id: node_005
            type: TASK_EXECUTION
            layout:
              size:
                width: 200
                height: 140
              position:
                x: 1100
                y: 320
            executor:
              name: VerifyOTPExecutor
              inputs:
                - ref: otp_001
                  identifier: otp
                  type: OTP_INPUT
                  required: true
            properties:
              senderId: "<SENDER_ID>"
            onSuccess: node_008
          - id: node_007
            type: PROMPT
            layout:
              size:
                width: 300
                height: 280
              position:
                x: 450
                y: 480
            meta:
              components:
                - type: HEADING
                  id: heading_007
                  label: "{{ t(sms.otp:error.heading) }}"
                - type: TEXT
                  id: text_007
                  label: "{{ t(sms.otp:error.message) }}"
                - type: ACTION
                  id: action_007
                  label: "{{ t(sms.otp:error.buttons.retry) }}"
            prompts:
              - action:
                  ref: action_007
                  nextNode: node_002
          - id: node_008
            type: END
            layout:
              size:
                width: 180
                height: 80
              position:
                x: 1400
                y: 200

    FlowDefinitionResponse:
      type: object
      required:
        - id
        - name
        - flowType
        - handle
        - activeVersion
        - isReadOnly
        - nodes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: Unique identifier for the flow
          example: a23b45c6-d7e8-90f1-2345-6789abcdef01
        name:
          type: string
          description: Name of the flow
          example: "Basic Authentication Flow"
        flowType:
          type: string
          enum:
            - AUTHENTICATION
            - REGISTRATION
          description: |
            Type of flow
          example: AUTHENTICATION
        handle:
          type: string
          description: |
            URL-friendly handle for the flow (lowercase letters, numbers, hyphens, and underscores only)
            Once set, the handle cannot be changed.
          pattern: '^[a-z0-9][a-z0-9_-]*[a-z0-9]$|^[a-z0-9]$'
          example: "default-basic-flow"
        activeVersion:
          type: integer
          description: The version number that is currently active
          example: 5
        isReadOnly:
          type: boolean
          description: Whether this flow is immutable (declarative resource — cannot be modified or deleted)
          example: false
        nodes:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Node'
          description: List of nodes that define the flow graph
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the flow was initially created
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the flow was last modified
      example:
        id: a23b45c6-d7e8-90f1-2345-6789abcdef01
        name: Basic Authentication Flow
        flowType: AUTHENTICATION
        handle: default-basic-flow
        activeVersion: 5
        isReadOnly: false
        nodes: *authFlowNodes
        createdAt: "2024-06-15T10:20:30Z"
        updatedAt: "2024-06-20T14:25:35Z"

    FlowVersionResponse:
      type: object
      required:
        - id
        - name
        - flowType
        - handle
        - version
        - isActive
        - nodes
        - createdAt
      properties:
        id:
          type: string
          description: Unique identifier for the flow
          example: a23b45c6-d7e8-90f1-2345-6789abcdef01
        name:
          type: string
          description: Name of the flow
          example: "Basic Authentication Flow"
        flowType:
          type: string
          enum:
            - AUTHENTICATION
            - REGISTRATION
          description: |
            Type of flow
          example: AUTHENTICATION
        handle:
          type: string
          description: |
            URL-friendly handle for the flow (lowercase letters, numbers, hyphens, and underscores only)
            Once set, the handle cannot be changed.
          pattern: '^[a-z0-9][a-z0-9_-]*[a-z0-9]$|^[a-z0-9]$'
          example: "default-basic-flow"
        version:
          type: integer
          description: Version number of this flow snapshot
          example: 3
        isActive:
          type: boolean
          description: Indicates if this is the currently active version of the flow
          example: false
        nodes:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/Node'
          description: List of nodes that define the flow graph
        createdAt:
          type: string
          format: date-time
          description: Timestamp when this specific version was created
      example:
        id: a23b45c6-d7e8-90f1-2345-6789abcdef01
        name: Basic Authentication Flow
        flowType: AUTHENTICATION
        handle: default-basic-flow
        version: 3
        isActive: false
        nodes: *authFlowNodes
        createdAt: "2024-06-15T10:20:30Z"

    Node:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          description: Unique identifier for the node within the flow
          example: node_001
        type:
          type: string
          enum:
            - START
            - PROMPT
            - TASK_EXECUTION
            - END
          description: |
            Type of node
          example: PROMPT
        layout:
          allOf:
            - $ref: '#/components/schemas/NodeLayout'
        meta:
          description: Optional UI metadata for PROMPT nodes (verbose mode)
          allOf:
            - $ref: '#/components/schemas/NodeMeta'
        prompts:
          type: array
          items:
            $ref: '#/components/schemas/PromptDefinition'
          description: |
            Prompt groups for PROMPT nodes. Each entry pairs a set of inputs with a single
            action (navigation target). Mutually exclusive with `next`.
        variant:
          type: string
          description: |
            Optional PROMPT node sub-type. Use `LOGIN_OPTIONS` to activate login method
            filtering on this node.
          enum:
            - LOGIN_OPTIONS
          example: LOGIN_OPTIONS
        condition:
          description: Optional condition that gates whether this node executes
          allOf:
            - $ref: '#/components/schemas/ConditionDefinition'
        properties:
          type: object
          additionalProperties: true
          description: |
            Node-level properties for configuration (e.g., senderId for notification executors,
            idpId for social login executors)
          example:
            senderId: "<SENDER_ID>"
        executor:
          description: Executor configuration for TASK_EXECUTION nodes (required)
          allOf:
            - $ref: '#/components/schemas/Executor'
        onSuccess:
          type: string
          description: Next node ID on successful execution (START and TASK_EXECUTION nodes)
          example: node_003
        onFailure:
          type: string
          description: Next node ID on failed execution (TASK_EXECUTION nodes)
          example: node_007
        onIncomplete:
          type: string
          description: |
            For TASK_EXECUTION nodes: ID of the PROMPT node to transition to when user input
            is required to complete the task.
          example: node_003
        next:
          type: string
          description: |
            For display-only PROMPT nodes: ID of the next node to automatically transition to
            after the display content is rendered. Mutually exclusive with `prompts`.
          example: node_005
        message:
          type: string
          description: |
            For display-only PROMPT nodes: a plain-text message returned in non-verbose mode
            alongside the flow status, intended for lightweight clients that do not process
            the full meta/components payload.
          example: "Registration complete. You may now sign in."

    NodeLayout:
      type: object
      description: |
        Layout information for the flow composer UI. This metadata is used 
        only by the visual flow composer to position and size nodes on the canvas. 
      properties:
        size:
          type: object
          description: Dimensions of the node in the flow composer canvas
          required:
            - width
            - height
          properties:
            width:
              type: number
              description: Width of the node in pixels
              example: 200
            height:
              type: number
              description: Height of the node in pixels
              example: 150
        position:
          type: object
          description: Position of the node in the flow composer canvas
          required:
            - x
            - y
          properties:
            x:
              type: number
              description: X-coordinate of the node
              example: 100
            y:
              type: number
              description: Y-coordinate of the node
              example: 100
      example:
        size:
          width: 200
          height: 150
        position:
          x: 100
          y: 100

    NodeMeta:
      type: object
      description: UI metadata for rendering PROMPT nodes in verbose mode
      properties:
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
          description: UI components to render (headings, inputs, buttons, etc.)

    NodeInput:
      type: object
      required:
        - type
        - identifier
        - required
      properties:
        ref:
          type: string
          description: |
            Reference to the input component ID. For PROMPT nodes, this refers to components
            in meta.components. Optional but recommended for better
            flow visualization and debugging.
          example: input_001
        type:
          type: string
          description: Input type (TEXT_INPUT, PASSWORD_INPUT, OTP_INPUT, etc.)
          example: TEXT_INPUT
        identifier:
          type: string
          description: The mapped attribute identifier (e.g., username, password, otp)
          example: username
        required:
          type: boolean
          description: Whether this input is required
          example: true

    NodeAction:
      type: object
      required:
        - ref
        - nextNode
      properties:
        ref:
          type: string
          description: Reference to the action component ID in meta.components
          example: action_001
        type:
          type: string
          description: |
            Optional action type forwarded to the next executor so it can determine which
            processing path to take. Predefined values are `SUBMIT` (approve/confirm) and
            `REJECT` (deny/cancel). If omitted, no action-type hint is forwarded.
          example: SUBMIT
        nextNode:
          type: string
          description: ID of the next node to navigate to when this action is triggered
          example: node_004

    Executor:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Name of the registered executor
          example: CredentialsAuthExecutor
        mode:
          type: string
          description: Optional execution mode or configuration hint for the executor
          example: "default"
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/NodeInput'
          description: |
            Input references the executor should read from the accumulated user inputs.
            Each entry maps a flow input (by ref/identifier) to the executor's expected parameter.

    Component:
      type: object
      required:
        - id
        - type
      properties:
        id:
          type: string
          description: Unique identifier for the component
          example: input_001
        type:
          type: string
          description: |
            Component type. Common types:
            - TEXT, HEADING: Display text elements
            - TEXT_INPUT, PASSWORD_INPUT, OTP_INPUT: Input fields
            - ACTION: Buttons and clickable elements
            - BLOCK: Container for grouping components
            - DIVIDER: Visual separator
          example: TEXT_INPUT
        label:
          type: string
          description: Display label or text content (use {{ t(namespace:key) }} for i18n or plain text)
          example: "{{ t(signin:fields.username.label) }}"
        variant:
          type: string
          description: Component style variant (e.g., HEADING_01, PRIMARY, etc.)
          example: HEADING_01
        required:
          type: boolean
          description: Whether the component is required (for input fields)
          example: true
        placeholder:
          type: string
          description: Placeholder text for input fields (use {{ t(namespace:key) }} for i18n or plain text)
          example: "{{ t(signin:fields.username.placeholder) }}"
        length:
          type: integer
          description: Length specification (e.g., for OTP_INPUT)
          example: 6
        components:
          type: array
          items:
            $ref: '#/components/schemas/Component'
          description: Nested child components (for BLOCK type)


    PromptDefinition:
      type: object
      description: |
        Groups a set of inputs with the action taken when the user submits them.
        A PROMPT node may have multiple prompt groups — one per available action path.
      properties:
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/NodeInput'
          description: Input fields presented to the user for this prompt group
        action:
          description: The action triggered when the user submits this prompt group
          allOf:
            - $ref: '#/components/schemas/NodeAction'

    ConditionDefinition:
      type: object
      description: |
        Optional condition that determines whether a node should execute.
        If the condition is not met, the engine skips the node and transitions to `onSkip`.
      required:
        - key
        - value
        - onSkip
      properties:
        key:
          type: string
          description: Runtime data key to evaluate
          example: "userAutoProvisioned"
        value:
          type: string
          description: Expected value to match against the runtime key
          example: "true"
        onSkip:
          type: string
          description: ID of the node to transition to when the condition is not met
          example: node_005

    Error:
      type: object
      properties:
        code:
          type: string
          description: "Error code. Client errors follow the FLM-XXXX convention; server errors use SSE-XXXX."
          example: "FLM-1001"
        message:
          $ref: '#/components/schemas/I18nMessage'
        description:
          $ref: '#/components/schemas/I18nMessage'

    I18nMessage:
      type: object
      description: Internationalized message with translation key and default value.
      required:
        - key
        - defaultValue
      properties:
        key:
          type: string
          description: Translation key for fetching localized message.
        defaultValue:
          type: string
          description: Default message in English (fallback).
