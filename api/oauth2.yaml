          type: string
          description: Organization Unit ID to associate the client with.
        redirect_uris:
          type: array
          items:
            type: string
          description: Registered redirect URIs.
        grant_types:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - implicit
              - client_credentials
              - refresh_token
              - urn:ietf:params:oauth:grant-type:token-exchange
        response_types:
          type: array
          items:
            type: string
            enum: [code]
        client_name:
          type: string
        client_uri:
          type: string
        logo_uri:
          type: string
        token_endpoint_auth_method:
          type: string
