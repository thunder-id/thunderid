                name: "My Web Application"
                description: "Customer portal application"
                clientId: "myapp_client_id"
                authFlowId: "edc013d0-e893-4dc0-990c-3e1d203e005b"
                registrationFlowId: "80024fb3-29ed-4c33-aa48-8aee5e96d522"
                isRegistrationFlowEnabled: true
                recoveryFlowId: "f60d3e8a-8c9a-4b2f-9e1a-5b3c8d7e2f4a"
                isRecoveryFlowEnabled: true
                url: "https://myapp.example.com"
                logoUrl: "https://myapp.example.com/logo.png"
                tosUri: "https://myapp.example.com/terms"
                policyUri: "https://myapp.example.com/privacy"
                contacts: ["admin@myapp.example.com", "support@myapp.example.com"]
                metadata:
                  env: "production"
                  team: "platform"
                assertion:
                  validityPeriod: 3600
                  userAttributes: ["email", "username"]
                certificate:
                  type: "JWKS_URI"
                  value: "https://myapp.example.com/.well-known/jwks"
                allowedUserTypes: ["employee", "customer"]
                loginConsent:
                  enabled: true
                  validityPeriod: 3600
                inboundAuthConfig:
                  - type: "oauth2"
                    config:
                      clientId: "myapp_client_id"
                      redirectUris:
                        - "https://myapp.example.com/callback"
                        - "https://myapp.example.com/oauth/callback"
                      grantTypes:
                        - "authorization_code"
                        - "refresh_token"
                      responseTypes:
                        - "code"
                      tokenEndpointAuthMethod: "client_secret_basic"
                      pkceRequired: false
                      publicClient: false
                      requirePushedAuthorizationRequests: false
                      scopes:
                        - "openid"
                        - "profile"
                        - "email"
                      token:
                        accessToken:
                          validityPeriod: 3600
                          userAttributes: ["email", "username"]
                        idToken:
                          validityPeriod: 1800
                          userAttributes: ["email", "email_verified", "name", "given_name", "family_name"]
                          responseType: "JWE"
                          encryptionAlg: "RSA-OAEP-256"
                          encryptionEnc: "A256GCM"
                      userInfo:
                        responseType: "JWS"
                        signingAlg: "RS256"
                        userAttributes: ["email", "name", "given_name", "family_name", "picture"]
                      scopeClaims:
                        profile: ["name", "family_name", "given_name", "picture"]
                        employee: ["emp_id", "department"]
                      acrValues: ["urn:thunder:silver", "urn:thunder:gold"]
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-1001"
                message:
                  key: "error.applicationservice.invalid_request_format"
                  defaultValue: "Invalid request format"
                description:
                  key: "error.applicationservice.invalid_request_format_description"
                  defaultValue: "The request contains invalid data"
        "404":
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-1004"
                message:
                  key: "error.applicationservice.application_not_found"
                  defaultValue: "Application not found"
                description:
                  key: "error.applicationservice.application_not_found_description"
                  defaultValue: "The application with the specified ID does not exist"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: "APP-5001"
                message:
                  key: "error.internal_server_error"
                  defaultValue: "Internal server error"
                description:
                  key: "error.internal_server_error_description"
                  defaultValue: "An unexpected error occurred while processing the request"

    put:
      tags:
        - applications
      summary: Update an application
      description: Update the details of an existing application.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
