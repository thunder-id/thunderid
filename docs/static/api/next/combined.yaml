    AssertionConfig:
      type: object
      description: |
        Assertion configuration for application-level (root) assertions.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the token in seconds.
          example: 3600
        userAttributes:
          type: array
          items:
            type: string
          description: The user attributes to include in the token.
          example:
            - email
            - username
    LoginConsentConfig:
      type: object
      description: >
        Consent validity configuration. A `validityPeriod` of `0` means the
        consent never

        expires and is re-used for all sessions.
      properties:
        validityPeriod:
          type: integer
          description: Consent validity period in seconds. `0` means no expiration.
          example: 86400
    AccessTokenConfig:
      type: object
      description: |
        Access token configuration for OAuth applications.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the access token in seconds. If not
            specified, falls back to application-level or deployment default.
          example: 3600
        userAttributes:
          type: array
          items:
            type: string
          description: The user attributes to include in the access token.
          example:
            - email
            - username
    IDTokenConfig:
      type: object
      description: |
        ID token configuration for OAuth applications.
      properties:
        validityPeriod:
          type: integer
          description: The validity period of the ID token in seconds. If not specified,
            falls back to application-level or deployment default.
          example: 3600
        userAttributes:
          type: array
          items:
            type: string
          description: The user attributes to include in the ID token. Only claims
            requested by scopes AND listed here will be included.
          example:
            - email
            - name
            - given_name
            - family_name
    UserInfoConfig:
      type: object
      description: UserInfo endpoint configuration for the OAuth application
      properties:
        responseType:
          type: string
          description: >
            The format of the UserInfo response.

            JSON returns a plain JSON object.

            JWS returns a signed JWT — requires signingAlg.

            JWE returns an encrypted JWT — requires encryptionAlg,
            encryptionEnc, and a client certificate.

            NESTED_JWT returns a sign-then-encrypt JWT — requires signingAlg,
            encryptionAlg, encryptionEnc, and a client certificate.
          enum:
            - JSON
            - JWS
            - JWE
            - NESTED_JWT
          example: JWS
        userAttributes:
          type: array
          items:
            type: string
          description: |
            The user attributes to include in the userinfo response.
            If not specified, falls back to ID token user attributes.
          example:
            - email
            - name
            - given_name
            - family_name
            - picture
        signingAlg:
          type: string
          description: >
            JWS algorithm used to sign the UserInfo response JWT.

            When set (without encryptionAlg), the response is a signed JWT
            (JWS).

            When set together with encryptionAlg, the response is a Nested JWT
            (sign-then-encrypt).

            Omit to return a plain JSON response.
          enum:
            - RS256
            - RS512
            - PS256
            - ES256
            - ES384
            - ES512
            - EdDSA
          example: RS256
        encryptionAlg:
          type: string
          description: >
            JWE key-management algorithm used to encrypt the UserInfo response.

            Must be set together with encryptionEnc and a client certificate
            (JWKS).

            When set without signingAlg, the response is a JWE over the plain
            JSON payload.

            When set together with signingAlg, the response is a Nested JWT
            (sign-then-encrypt).
          enum:
            - RSA-OAEP
            - RSA-OAEP-256
          example: RSA-OAEP-256
        encryptionEnc:
          type: string
          description: >
            JWE content-encryption algorithm used to encrypt the UserInfo
            response payload.

            Required when encryptionAlg is set.
          enum:
            - A128CBC-HS256
            - A256GCM
          example: A256GCM
    Certificate:
      type: object
      properties:
        type:
          type: string
          description: The type of the certificate.
          enum:
            - JWKS
            - JWKS_URI
          example: JWKS_URI
        value:
          type: string
          description: The value of the certificate.
          example: https://myapp.example.com/.well-known/jwks
    InboundAuthConfig:
      type: object
      properties:
        type:
          type: string
          description: The type of inbound authentication.
          enum:
            - oauth2
          example: oauth2
        config:
          $ref: "#/components/schemas/OAuthAppConfig"
    InboundAuthConfigComplete:
      type: object
      properties:
        type:
          type: string
          description: The type of inbound authentication.
          enum:
            - oauth2
          example: oauth2
        config:
          $ref: "#/components/schemas/OAuthAppConfigComplete"
    OAuthAgentConfig:
      type: object
      description: >
        OAuth client configuration for an agent. Returned on read; never
        includes `clientSecret`.
      properties:
        clientId:
          type: string
          description: >
            OAuth client ID. Auto-generated when omitted on create. On update,
            the existing

            value is preserved when omitted.
          example: calendar_agent_client
        redirectUris:
          type: array
          items:
            type: string
            format: uri
          description: Redirect URIs. Required for redirect-based grant types
            (`authorization_code`).
          example:
            - https://calendar-agent.example.com/callback
        grantTypes:
          type: array
          items:
            type: string
            enum:
              - authorization_code
              - client_credentials
              - refresh_token
              - implicit
              - password
              - urn:ietf:params:oauth:grant-type:token-exchange
              - urn:ietf:params:oauth:grant-type:jwt-bearer
          example:
            - authorization_code
            - refresh_token
        responseTypes:
          type: array
          items:
            type: string
            enum:
              - code
              - token
          description: OAuth response types. Required when using `authorization_code`.
          example:
            - code
        tokenEndpointAuthMethod:
          type: string
          enum:
            - client_secret_basic
            - client_secret_post
            - private_key_jwt
            - none
          description: >
            Token endpoint authentication method. Defaults to
            `client_secret_basic` when omitted.

            - `client_secret_basic` / `client_secret_post` — authenticate with
            `clientId` + `clientSecret`.

            - `private_key_jwt` — authenticate with a signed JWT; requires
            `certificate`.

            - `none` — public client; requires `publicClient: true` and
            `pkceRequired: true`.
          example: client_secret_basic
        pkceRequired:
          type: boolean
          default: false
          description: Whether PKCE is required. Mandatory for public clients.
          example: true
        publicClient:
          type: boolean
          default: false
          description: "Whether this is a public client (no client secret). Requires
            `tokenEndpointAuthMethod: none` and `pkceRequired: true`."
          example: false
        requirePushedAuthorizationRequests:
          type: boolean
          default: false
          description: Whether all authorization requests must use PAR (RFC 9126).
          example: false
        certificate:
          $ref: "#/components/schemas/Certificate"
        scopes:
          type: array
          items:
            type: string
          description: OAuth scopes this client is allowed to request.
          example:
            - openid
            - profile
            - calendar:read
        token:
          type: object
          description: Token validity and payload configuration.
          properties:
            accessToken:
              $ref: "#/components/schemas/AccessTokenConfig"
            idToken:
              $ref: "#/components/schemas/IDTokenConfig"
        userInfo:
          $ref: "#/components/schemas/UserInfoConfig"
        scopeClaims:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Custom scope-to-claims mapping. Allows embedding claims into tokens
            when a scope is granted.
          example:
            profile:
              - name
              - family_name
              - given_name
            email:
              - email
              - email_verified
    OAuthAgentConfigComplete:
      allOf:
        - $ref: "#/components/schemas/OAuthAgentConfig"
        - type: object
          properties:
            clientSecret:
              type: string
              description: >
                OAuth client secret. Returned only in create and update
                responses.

                Never returned by GET endpoints. Absent for public clients

                (`tokenEndpointAuthMethod: none`) and `private_key_jwt` clients.
              example: s3cr3t_only_shown_once
    AgentType:
      type: object
      required:
        - id
        - name
        - ouId
        - schema
      properties:
        id:
          type: string
          format: uuid
          description: The unique identifier of the agent type
        name:
          type: string
          description: The agent type this schema defines
        ouId:
          type: string
          format: uuid
          description: The root organization unit ID associated with this agent type schema
        ouHandle:
          type: string
          readOnly: true
          description: Human-readable handle of the organization unit (only included when
            include=display query parameter is used).
        allowSelfRegistration:
          type: boolean
          description: Indicates whether agents of this type can perform self-registration
            flows
          default: false
        systemAttributes:
          type: object
          description: System-level metadata for the agent type
          properties:
            display:
              type: string
              description: The schema attribute to use as the human-readable display name for
                agents of this type
          additionalProperties: false
        schema:
          type: object
          description: JSON Schema definition for the agent type
          additionalProperties:
            oneOf:
              - type: object
                description: Leaf property - string or number
                required:
                  - type
                properties:
                  type:
                    type: string
                    enum:
                      - string
                      - number
                    description: Data type of the property
                  required:
                    type: boolean
                    default: false
                    description: Whether this attribute must be provided for the agent type
                  unique:
                    type: boolean
                    default: false
                    description: Whether this property must be unique across all agents
                  credential:
                    type: boolean
                    default: false
                    description: Whether this property should be treated as a credential attribute
                  enum:
                    type: array
                    items:
                      type: string
                    description: List of allowed values for this property
                  regex:
                    type: string
                    description: Regular expression pattern for validating the property value
                additionalProperties: false
              - type: object
                description: Leaf property - boolean
                required:
                  - type
                properties:
                  type:
                    type: string
                    enum:
                      - boolean
                    description: Data type of the property
                  required:
                    type: boolean
                    default: false
                    description: Whether this attribute must be provided for the agent type
                additionalProperties: false
              - type: object
                description: Object property definition
                required:
                  - type
                  - properties
                properties:
                  type:
                    type: string
                    enum:
                      - object
                    description: Data type (object)
                  required:
                    type: boolean
                    default: false
                    description: Whether this attribute must be provided for the agent type
                  properties:
                    type: object
                    description: Nested properties of the object
                    additionalProperties:
                      $ref: "#/components/schemas/AgentType/properties/schema/additionalProperties"
                additionalProperties: false
              - type: object
                description: Array property definition
                required:
                  - type
                  - items
                properties:
                  type:
                    type: string
                    enum:
                      - array
                    description: Data type (array)
                  required:
                    type: boolean
                    default: false
                    description: Whether this attribute must be provided for the agent type
                  items:
                    oneOf:
                      - type: object
                        description: Array of strings or numbers
                        required:
                          - type
                        properties:
                          type:
                            type: string
                            enum:
                              - string
                              - number
                          enum:
                            type: array
                            items:
                              type: string
                        additionalProperties: false
                      - type: object
                        description: Array of booleans
                        required:
                          - type
                        properties:
                          type:
                            type: string
                            enum:
                              - boolean
                        additionalProperties: false
                      - type: object
                        description: Array of objects
                        required:
                          - type
                          - properties
                        properties:
                          type:
                            type: string
                            enum:
                              - object
                          properties:
                            type: object
                            additionalProperties:
                              $ref: "#/components/schemas/AgentType/properties/schema/additionalProperties"
                        additionalProperties: false
                additionalProperties: false
          example:
            name:
              type: string
              required: true
              unique: true
            description:
              type: string
            model:
              type: string
              required: true
              enum:
                - gpt-4
                - gpt-4o
                - claude-sonnet
                - claude-opus
            temperature:
              type: number
            isActive:
              type: boolean
            capabilities:
              type: array
              items:
                type: string
                enum:
                  - chat
                  - tools
                  - vision
                  - code
    AgentTypeListResponse:
