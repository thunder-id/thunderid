server:
  hostname: "localhost"
  port: 8090
  security:
    # Gates the Direct API endpoints. The secret is generated into config/secrets/direct_auth_secret
    # by setup.sh and read from there at load time. Callers present it in the Direct-Auth-Secret header.
    direct_auth_secret: "file://config/secrets/direct_auth_secret"

tls:
  min_version: "1.3"
  cert_file: "config/certs/server.cert"
  key_file: "config/certs/server.key"

database:
  config:
    type: "sqlite"
    sqlite:
      path: "database/configdb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  runtime_transient:
    type: "sqlite"
    sqlite:
      path: "database/runtime_transient.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  entity:
    type: "sqlite"
    sqlite:
      path: "database/entitydb.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

  runtime_persistent:
    type: "sqlite"
    sqlite:
      path: "database/runtime_persistent.db"
      options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
      max_open_conns: 500
      max_idle_conns: 100
      conn_max_lifetime: 3600

crypto:
  encryption:
    key: "file://config/certs/crypto.key"
  password_hashing:
    algorithm: "PBKDF2"
  keys:
    - id: "default-key"
      cert_file: "config/certs/signing.cert"
      key_file: "config/certs/signing.key"
    - id: "ecdsa-key"
      cert_file: "config/certs/ecdsa-signing.cert"
      key_file: "config/certs/ecdsa-signing.key"

jwt:
    preferred_key_id: "default-key"

passkey:
  allowed_origins:
    - "https://localhost:8090"

# This is a sample email client configuration. Update it with real SMTP server details for production use.
email:
  smtp:
    host: "127.0.0.1"
    port: 2525
    username: "dev"
    password: "dev"
    from_address: "noreply@thunderid.dev"
    enable_start_tls: false
    enable_authentication: true
