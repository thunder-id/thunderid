# API Reference Sidebar Group Configuration
#
# This file controls how OpenAPI tags from api/*.yaml are organised into groups
# in the Scalar API reference sidebar. It is read by docs/scripts/merge-openapi-specs.mjs
# at build time — no code changes are needed when restructuring the sidebar.
#
# ─── How the sidebar is built ────────────────────────────────────────────────
#
#   1. All groups (explicit and auto-derived) are ordered by groupOrder.
#      Groups not listed in groupOrder are appended alphabetically after all
#      ordered entries. To change sidebar order, edit groupOrder only.
#
#   2. explicitSubGroups define named groups whose tags are "claimed" and will
#      NOT appear in an auto-derived group. Sidebar position is controlled by
#      groupOrder, not by the order they are defined here.
#
#   3. Remaining visible tags are auto-grouped by their source spec filename.
#      fileGroupNames maps each filename to a display name for that group.
#      Both export.yaml and import.yaml mapping to the same name merges them.
#
#   4. Tags listed in hiddenTags are excluded from the sidebar entirely.
#      Tags whose source file maps to null are also excluded (use this when
#      every visible tag in that file is already claimed by explicitSubGroups).
#
#   5. If a spec file is not listed in fileGroupNames at all, its tags
#      auto-derive a group name from the filename stem in Title Case.
#      This is the safe default for new API files — you only need to add
#      an entry here when you want a custom name or sub-grouping.
#
# ─── Adding a new API spec file ──────────────────────────────────────────────
#
#   • Drop the file into api/ — it will be picked up automatically.
#   • Its tags will appear under a Title Case group named after the filename.
#   • To customise: add the filename to fileGroupNames with your preferred name.
#   • To suppress auto-grouping and handle its tags via explicitSubGroups,
#     set the value to null (~).
#   • To control where the new group appears in the sidebar, add its display
#     name to groupOrder at the desired position.
#   • If the build emits a warning about an unassigned tag, either add it to
#     a sub-group or add its source file to fileGroupNames.
#
# ─── Adding a new sub-group ──────────────────────────────────────────────────
#
#   1. Add an entry to explicitSubGroups with a name and the list of tag names.
#      Tag names must match exactly what is declared in the spec file's `tags:` section.
#   2. If the tag's source spec file should produce no auto-derived group at all,
#      set its fileGroupNames entry to null (~).
#   3. Re-run `pnpm generate:api-specs` (or `pnpm dev`) to apply.
#
# ─────────────────────────────────────────────────────────────────────────────

# Tags that are internal routing helpers — excluded from the sidebar entirely.
# These are path-based or utility tags not intended for API consumers.
hiddenTags:
  - design-resolve
  - groups-by-path
  - management
  - organization-units-by-path
  - resolve
  - users-by-path

# Maps each spec filename to the sidebar group display name.
#   string  — custom display name for the auto-derived group
#   ~       — suppress auto-grouping (all visible tags must appear in explicitSubGroups)
#   omitted — falls back to a Title Case version of the filename stem
fileGroupNames:
  agent.yaml: ~                  # Agents + Agent Types claimed by Identities
  application.yaml: Applications
  authzen.yaml: Access Control
  authentication.yaml: ~         # all tags claimed by Authentication
  connections.yaml: Connections
  design.yaml: ~                 # all tags claimed by Branding & Localization
  discovery.yaml: ~              # all tags claimed by OAuth2 / OIDC
  export.yaml: ~                 # Export claimed by System
  flow-execution.yaml: ~         # all tags claimed by Login Flows
  flow-management.yaml: ~        # all tags claimed by Login Flows
  flow-meta.yaml: ~              # all tags claimed by Login Flows
  group.yaml: ~                  # Groups claimed by Identities
  healthcheck.yaml: ~            # Health claimed by System
  i18n.yaml: ~                   # Languages claimed by Branding & Localization
  import.yaml: ~                 # Import claimed by System
  oauth2.yaml: ~                 # all tags claimed by OAuth2 / OIDC
  ou.yaml: ~                     # Organization Units claimed by Identities
  registration.yaml: ~           # Passkeys (registration) claimed by Authentication
  resource.yaml: ~               # all tags claimed by Access Control
  role.yaml: ~                   # Roles claimed by Access Control
  scim.yaml: ~                   # SCIM tags claimed by SCIM Provisioning
  user.yaml: ~                   # all tags claimed by Identities

# Explicit named sub-groups. Tags listed here are excluded from auto-grouping.
# Sidebar position is determined by groupOrder below, not by definition order here.
explicitSubGroups:
  # ── Identity store ───────────────────────────────────────────────────────────
  - name: Identities
    tags:
      - Users
      - Self
      - User Types
      - Groups
      - Organization Units
      - Agents
      - Agent Types

  # ── RBAC ─────────────────────────────────────────────────────────────────────
  - name: Access Control
    tags:
      - AuthZEN
      - Roles
      - Resource Servers
      - Resources
      - Actions
      - Permissions

  # ── Authentication mechanisms ─────────────────────────────────────────────────
  - name: Authentication
    tags:
      - Credentials
      - SMS OTP
      - Google
      - Github
      - Standard
      - Passkeys

  # ── Flow orchestration ────────────────────────────────────────────────────────
  - name: Login Flows
    tags:
      - Flow Execution
      - Flow Management
      - Flow Versioning
      - Flow Meta

  # ── Login UI customisation ────────────────────────────────────────────────────
  - name: Branding & Localization
    tags:
      - Themes
      - Layouts
      - Languages

  # ── OAuth2 / OIDC protocol ────────────────────────────────────────────────────
  - name: OAuth2 / OIDC
    tags:
      - Authorization
      - Token
      - PAR
      - Introspection
      - UserInfo
      - JWKS
      - DCR
      - Discovery

  # ── Operational ───────────────────────────────────────────────────────────────
  - name: System
    tags:
      - Export
      - Import
      - Health

  # ── SCIM Provisioning ─────────────────────────────────────────────────────────
  - name: SCIM Provisioning
    tags:
      - SCIM Discovery

# Defines the display order of all sidebar groups (explicit and auto-derived).
# Groups not listed here are appended alphabetically after all ordered entries.
# To reorder: move entries in this list. To include a new group in the order:
# add its display name at the desired position.
groupOrder:
  - Applications
  - Connections
  - Identities
  - Access Control
  - Authentication
  - Login Flows
  - OAuth2 / OIDC
  - Branding & Localization
  - System
  - SCIM Provisioning
  - Other
