          example: example.com
        relyingPartyName:
          type: string
          description: Human-readable name for the Relying Party
          example: Example Corp
        authenticatorSelection:
          type: object
          description: Criteria for selecting authenticators
          properties:
            authenticatorAttachment:
              type: string
              description: Authenticator attachment modality
              enum:
                - platform
                - cross-platform
              example: platform
            requireResidentKey:
              type: boolean
              description: Whether a resident key is required
              example: false
            residentKey:
              type: string
              description: Resident key requirement
              enum:
                - discouraged
                - preferred
                - required
              example: preferred
            userVerification:
              type: string
              description: User verification requirement
              enum:
                - required
                - preferred
                - discouraged
              example: preferred
        attestation:
          type: string
          description: Attestation conveyance preference
          enum:
            - none
            - indirect
            - direct
            - enterprise
          example: none
      required:
        - userId
        - relyingPartyId
    PasskeyRegistrationStartResponse:
      type: object
