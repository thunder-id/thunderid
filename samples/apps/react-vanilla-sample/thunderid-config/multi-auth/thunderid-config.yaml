resource_type: application
id: 019e3a5c-0500-7f3e-a66e-66fc7918c3a7
ouHandle: default
name: Sample App
description: Sample vanilla application for testing
url: https://localhost:3000
logoUrl: emoji:🎁
tosUri: https://localhost:3000/terms
policyUri: https://localhost:3000/privacy
contacts:
  - admin@example.com
  - support@example.com
authFlowHandle: sample-vanilla-multi-auth-single-step-sms
registrationFlowHandle: sample-vanilla-multi-auth-single-step-sms
isRegistrationFlowEnabled: true
isRecoveryFlowEnabled: false
assertion:
  validityPeriod: 3600
loginConsent:
  validityPeriod: 0
allowedUserTypes:
  - Customer
inboundAuthConfig:
  - type: oauth2
    config:
      clientId: {{.SAMPLE_APP_CLIENT_ID}}
      redirectUris:
        {{- range .SAMPLE_APP_REDIRECT_URIS}}
        - {{.}}
        {{- end}}
      grantTypes:
        - authorization_code
      responseTypes:
        - code
      tokenEndpointAuthMethod: none
      pkceRequired: true
      publicClient: true
      requirePushedAuthorizationRequests: false
      token:
        accessToken:
          userConfig:
            validityPeriod: 3600
            attributes:
              - given_name
              - family_name
              - email
              - groups
        idToken:
          validityPeriod: 3600
          userAttributes:
            - given_name
            - family_name
            - email
            - groups
          responseType: JWT
      scopes:
        - openid
        - profile
        - email
      userInfo:
        responseType: JSON
        userAttributes:
          - given_name
          - family_name
          - email
          - groups
      scopeClaims:
        email:
          - email
          - email_verified
        group:
          - groups
        phone:
          - phone_number
          - phone_number_verified
        profile:
          - name
          - given_name
          - family_name
          - picture
