---
resource_type: application
id: 01900000-0000-7000-8000-000000000060
name: Console
description: Management application for ThunderID
ouId: 01900000-0000-7000-8000-000000000001
url: "{{ .PUBLIC_URL }}/console"
logoUrl: "emoji:👨‍💻"
authFlowId: 01900000-0000-7000-8000-000000000068
registrationFlowId: 01900000-0000-7000-8000-000000000069
isRegistrationFlowEnabled: false
allowedUserTypes:
  - Person
inboundAuthConfig:
  - type: oauth2
    config:
      clientId: CONSOLE
      redirectUris:
        - "{{ .PUBLIC_URL }}/console"
        {{- range .CONSOLE_REDIRECT_URIS }}
        - "{{ . }}"
        {{- end }}
      grantTypes:
        - authorization_code
        - refresh_token
      responseTypes:
        - code
      pkceRequired: true
      tokenEndpointAuthMethod: none
      publicClient: true
      token:
        accessToken:
          userConfig:
            validityPeriod: 3600
            attributes:
              - given_name
              - family_name
              - email
              - groups
              - name
              - ouId
        idToken:
          validityPeriod: 3600
          userAttributes:
            - given_name
            - family_name
            - email
            - groups
            - name
            - ouId
      scopeClaims:
        profile:
          - name
          - given_name
          - family_name
          - picture
        email:
          - email
          - email_verified
        phone:
          - phone_number
          - phone_number_verified
        group:
          - groups
        ou:
          - ouId
---
resource_type: user
id: 01900000-0000-7000-8000-000000000030
type: Person
ouHandle: default
attributes:
  username: "{{ .ADMIN_USERNAME }}"
  sub: "{{ .ADMIN_USERNAME }}"
  email: admin@example.com
  name: Administrator
  given_name: Admin
  family_name: User
  picture: https://example.com/avatar.jpg
  phone_number: "+12345678920"
credentials:
  password: "{{ .ADMIN_PASSWORD }}"
---
resource_type: group
id: 01900000-0000-7000-8000-000000000040
name: Administrators
description: System administrators group
ouHandle: default
members:
  - id: 01900000-0000-7000-8000-000000000030
    type: user
---
resource_type: role
id: 01900000-0000-7000-8000-000000000050
name: Administrator
description: System administrator role with full permissions
ouHandle: default
permissions:
  - resourceServerId: 01900000-0000-7000-8000-000000000020
    permissions:
      - system
assignments:
  - id: 01900000-0000-7000-8000-000000000040
    type: group
