---
apiVersion: openchoreo.dev/v1alpha1
kind: {{ if .Values.componentType.cluster }}ClusterComponentType{{ else }}ComponentType{{ end }}
metadata:
  name: thunderid
  annotations:
    openchoreo.dev/description: "ThunderID ComponentType"
    openchoreo.dev/display-name: "ThunderID"
spec:
  workloadType: deployment

  # ─── Parameters (application configuration set at component creation) ────────
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        image:
          type: string
          default: "ghcr.io/thunder-id/thunderid:latest"
        runtime:
          type: object
          properties:
            imagePullPolicy:
              type: string
              enum: [Always, IfNotPresent, Never]
              default: "Always"
            gate:
              type: object
              properties:
                clientBase: { type: string, default: "/gate" }
            console:
              type: object
              properties:
                clientBase: { type: string, default: "/console" }
                clientId: { type: string, default: "CONSOLE" }
                scopes: { type: string, default: "[\"openid\", \"profile\", \"email\"]" }
            dbType:
              type: string
              enum: [sqlite, postgres]
              default: "sqlite"
            dbStorageSize:
              type: string
              default: "1Gi"
        # Trusted issuer (federated-authentication) configuration.
        # Leaving issuer empty keeps the feature disabled. When issuer is set,
        # jwks_url and audience become required and the JWKS URL must use https
        # (http is only allowed for localhost). See server.security.trusted_issuer
        # in the generated deployment.yaml.
        trustedIssuer:
          type: object
          properties:
            issuer:
              type: string
              default: ""
            jwksUrl:
              type: string
              default: ""
            audience:
              type: string
              default: ""
            discoveryUrl:
              type: string
              default: ""
              description: "OIDC discovery base URL the console uses to redirect login to the trusted issuer. Falls back to `issuer` when empty — set this when `issuer` is a literal iss claim (e.g. `platform-idp`) rather than a URL."
            consoleClientId:
              type: string
              default: ""
              description: "OAuth client_id the console uses when redirecting login to the trusted issuer. Falls back to `audience` when empty — set this when the audience differs from the console's client_id (e.g. aud=tenant-public-url, client_id=FEDERATED_CONSOLE-<env>)."
            caBundle:
              type: string
              default: ""
              description: "PEM-encoded CA certificate(s) Thunder must trust to verify the jwksUrl TLS chain. Mounted into /etc/ssl/certs so Go's default cert loader picks it up; leave empty when jwksUrl's server presents a publicly-trusted cert."
            requiredClaims:
              type: array
              default: []
              items:
                type: object
                properties:
                  claim:
                    type: string
                  value:
                    type: string

  # ─── EnvironmentConfigs (infra + per-environment config set via ReleaseBinding) ─
  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        replicas:
          type: integer
          default: 1
        endpointVisibility:
          type: string
          enum: [external, internal]
          default: "external"
        serverPublicUrl:
          type: string
          default: ""
        # Optional external hostname for the tenant's HTTPRoute. When non-empty,
        # the HTTPRoute listens on this host and serverPublicUrl is expected to
        # resolve to it. When empty, the HTTPRoute falls back to the generated
        # "<env>-<component>-<namespace>.<gateway-host>" pattern. Set by the
        # thunder-cloud operator from ThunderInstance.spec.networking.publicHost
        # so the console's own config.js (serverPublicUrl) and the route on the
        # gateway stay in sync.
        publicHost:
          type: string
          default: ""
        gateClientHostname:
          type: string
          default: ""
        # Infra resource configuration for the ThunderID deployment container.
        resourceRequestsCpu:
          type: string
          default: "100m"
        resourceRequestsMemory:
          type: string
          default: "128Mi"
        resourceLimitsCpu:
          type: string
          default: "500m"
        resourceLimitsMemory:
          type: string
          default: "512Mi"

  # ─── Resources (Kubernetes objects rendered by the OpenChoreo controller) ─────
  resources:
    # PVC for SQLite database files — shared between the setup job and the deployment.
    # Always created; for postgres deployments the mount is present but unused.
    - id: sqlite-pvc
      template:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: "${metadata.componentName}-sqlite"
          namespace: "${metadata.namespace}"
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: "${parameters.runtime.dbStorageSize}"

    - id: setup-job
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: "${metadata.componentName}-setup"
          namespace: "${metadata.namespace}"
        spec:
          backoffLimit: 3
          ttlSecondsAfterFinished: 300
          template:
            spec:
              restartPolicy: OnFailure
              initContainers:
                # Thunder image runs as UID/GID 10001 (Dockerfile `USER thunder`).
                # Pod-level securityContext.fsGroup would normally handle PVC
                # ownership, but the OpenChoreo renderer strips pod-level
                # securityContext. Workaround: a first initContainer that
                # chowns the PVC as root (container-level runAsUser: 0).
                # Ownership persists on the PVC so the main Deployment pod
                # (also UID 10001) can mount rw without a second chown.
                - name: fix-perms
                  image: "${parameters.image}"
                  imagePullPolicy: "${parameters.runtime.imagePullPolicy}"
                  command: ['sh', '-c', 'chown -R 10001:10001 /data']
                  securityContext:
                    runAsUser: 0
                    runAsGroup: 0
                  volumeMounts:
                    - name: sqlite-data
                      mountPath: /data
                - name: init-database
                  image: "${parameters.image}"
                  imagePullPolicy: "${parameters.runtime.imagePullPolicy}"
                  command: ['sh', '-c']
                  args:
                    - |
                      if [ ! -f /data/.initialized ]; then
                        echo "Copying database directory from image..."
                        cp -r /opt/thunderid/repository/database/* /data/
                        touch /data/.initialized
                        echo "Database initialization complete"
                      else
                        echo "Database already initialized"
                      fi
                  volumeMounts:
                    - name: sqlite-data
                      mountPath: /data
              containers:
                - name: setup
                  image: "${parameters.image}"
                  imagePullPolicy: "${parameters.runtime.imagePullPolicy}"
                  command: ["sh", "-c", "./setup.sh && touch /opt/thunderid/repository/database/.setup-complete"]
                  env: |
                    ${configurations.configs.envs.map(e, {"name": e.name, "value": e.value}) + [
                      {"name": "WITH_CONSENT", "value": "false"}
                    ]}
                  volumeMounts:
                    - name: thunderid-config
                      mountPath: /opt/thunderid/repository/conf/deployment.yaml
                      subPath: deployment.yaml
                    - name: sqlite-data
                      mountPath: /opt/thunderid/repository/database
              volumes:
                - name: thunderid-config
                  configMap:
                    name: "${metadata.componentName}-config"
                - name: sqlite-data
                  persistentVolumeClaim:
                    claimName: "${metadata.componentName}-sqlite"

    - id: thunderid-config
      includeWhen: "${parameters.runtime.dbType == 'sqlite'}"
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${metadata.componentName}-config"
          namespace: "${metadata.namespace}"
        data:
          deployment.yaml: |
            server:
              hostname: "0.0.0.0"
              public_url: "${environmentConfigs.serverPublicUrl}"
              port: ${workload.endpoints["api"].port}
              http_only: true
              security:
                trusted_issuer:
                  issuer: "${parameters.trustedIssuer.issuer}"
                  jwks_url: "${parameters.trustedIssuer.jwksUrl}"
                  audience: "${parameters.trustedIssuer.audience}"
                  required_claims: ${parameters.trustedIssuer.requiredClaims.map(c, {"claim": c.claim, "value": c.value})}

            gate_client:
              hostname: "${environmentConfigs.gateClientHostname}"
              port: {{ "{{.GATE_CLIENT_PORT}}" }}
              scheme: "{{ "{{.GATE_CLIENT_SCHEME}}" }}"

            crypto:
              encryption:
                key: "{{ "{{.CRYPTO_ENCRYPTION_KEY}}" }}"

            database:
              config:
                type: "sqlite"
                sqlite:
                  path: "{{ "{{.DB_CONFIG_PATH}}" }}"
              runtime:
                type: "sqlite"
                sqlite:
                  path: "{{ "{{.DB_RUNTIME_PATH}}" }}"
              user:
                type: "sqlite"
                sqlite:
                  path: "{{ "{{.DB_USER_PATH}}" }}"

            cache:
              disabled: false
              type: "inmemory"
              size: {{ "{{.CACHE_SIZE}}" }}
              ttl: {{ "{{.CACHE_TTL}}" }}
              eviction_policy: "LRU"
              cleanup_interval: 600

            jwt:
              validity_period: {{ "{{.JWT_VALIDITY}}" }}

            oauth:
              refresh_token:
                renew_on_grant: true
                validity_period: {{ "{{.OAUTH_REFRESH_TOKEN_VALIDITY}}" }}

            flow:
              max_version_history: 3
              auto_infer_registration: true

            cors:
              allowed_origins: {{ "{{.CORS_ALLOWED_ORIGINS}}" }}

            consent:
              enabled: {{ "{{.CONSENT_ENABLED}}" }}
              base_url: "{{ "{{.CONSENT_BASE_URL}}" }}"

    - id: thunderid-config-pg
      includeWhen: "${parameters.runtime.dbType == 'postgres'}"
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${metadata.componentName}-config"
          namespace: "${metadata.namespace}"
        data:
          deployment.yaml: |
            server:
              hostname: "0.0.0.0"
              public_url: "${environmentConfigs.serverPublicUrl}"
              port: ${workload.endpoints["api"].port}
              http_only: true
              security:
                trusted_issuer:
                  issuer: "${parameters.trustedIssuer.issuer}"
                  jwks_url: "${parameters.trustedIssuer.jwksUrl}"
                  audience: "${parameters.trustedIssuer.audience}"
                  required_claims: ${parameters.trustedIssuer.requiredClaims.map(c, {"claim": c.claim, "value": c.value})}

            gate_client:
              hostname: "${environmentConfigs.gateClientHostname}"
              port: {{ "{{.GATE_CLIENT_PORT}}" }}
              scheme: "{{ "{{.GATE_CLIENT_SCHEME}}" }}"

            crypto:
              encryption:
                key: "{{ "{{.CRYPTO_ENCRYPTION_KEY}}" }}"

            database:
              config:
                type: "postgres"
                postgres:
                  hostname: "{{ "{{.DB_CONFIG_HOSTNAME}}" }}"
                  port: {{ "{{.DB_PORT}}" }}
                  name: "{{ "{{.DB_CONFIG_NAME}}" }}"
                  username: "{{ "{{.DB_CONFIG_USERNAME}}" }}"
                  password: "{{ "{{.DB_CONFIG_PASSWORD}}" }}"
                  sslmode: "{{ "{{.DB_CONFIG_SSLMODE}}" }}"
              runtime:
                type: "postgres"
                postgres:
                  hostname: "{{ "{{.DB_RUNTIME_HOSTNAME}}" }}"
                  port: {{ "{{.DB_PORT}}" }}
                  name: "{{ "{{.DB_RUNTIME_NAME}}" }}"
                  username: "{{ "{{.DB_RUNTIME_USERNAME}}" }}"
                  password: "{{ "{{.DB_RUNTIME_PASSWORD}}" }}"
                  sslmode: "{{ "{{.DB_RUNTIME_SSLMODE}}" }}"
              user:
                type: "postgres"
                postgres:
                  hostname: "{{ "{{.DB_USER_HOSTNAME}}" }}"
                  port: {{ "{{.DB_PORT}}" }}
                  name: "{{ "{{.DB_USER_NAME}}" }}"
                  username: "{{ "{{.DB_USER_USERNAME}}" }}"
                  password: "{{ "{{.DB_USER_PASSWORD}}" }}"
                  sslmode: "{{ "{{.DB_USER_SSLMODE}}" }}"

            cache:
              disabled: false
              type: "inmemory"
              size: {{ "{{.CACHE_SIZE}}" }}
              ttl: {{ "{{.CACHE_TTL}}" }}
              eviction_policy: "LRU"
              cleanup_interval: 600

            jwt:
              validity_period: {{ "{{.JWT_VALIDITY}}" }}

            oauth:
              refresh_token:
                renew_on_grant: true
                validity_period: {{ "{{.OAUTH_REFRESH_TOKEN_VALIDITY}}" }}

            flow:
              max_version_history: 3
              auto_infer_registration: true

            cors:
              allowed_origins: {{ "{{.CORS_ALLOWED_ORIGINS}}" }}

            consent:
              enabled: {{ "{{.CONSENT_ENABLED}}" }}
              base_url: "{{ "{{.CONSENT_BASE_URL}}" }}"

    - id: gate-config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${metadata.componentName}-gate-config"
          namespace: "${metadata.namespace}"
        data:
          config.js: |
            window.__THUNDERID_RUNTIME_CONFIG__ = {
              client: {
                base: "${parameters.runtime.gate.clientBase}",
              },
              server: {
                public_url: "${environmentConfigs.serverPublicUrl}",
              },
            };

    - id: console-config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${metadata.componentName}-console-config"
          namespace: "${metadata.namespace}"
        data:
          # trusted_issuer tells the console to authenticate against an external
          # issuer (typically a CP Thunder) instead of its own backend. Emitted
          # only when parameters.trustedIssuer.issuer is set. hostname/port/
          # http_only are required by ConfigProvider's type but ignored at
          # runtime when public_url is set, so we emit sentinels.
          config.js: |
            window.__THUNDERID_RUNTIME_CONFIG__ = {
              client: {
                base: "${parameters.runtime.console.clientBase}",
                client_id: "${parameters.runtime.console.clientId}",
                scopes: ${parameters.runtime.console.scopes},
              },
              server: {
                public_url: "${environmentConfigs.serverPublicUrl}",
              },
              ${has(parameters.trustedIssuer) && parameters.trustedIssuer.issuer != "" ? 'trusted_issuer: {hostname: "", port: 0, http_only: false, public_url: "' + (has(parameters.trustedIssuer.discoveryUrl) && parameters.trustedIssuer.discoveryUrl != "" ? parameters.trustedIssuer.discoveryUrl : parameters.trustedIssuer.issuer) + '", client_id: "' + (has(parameters.trustedIssuer.consoleClientId) && parameters.trustedIssuer.consoleClientId != "" ? parameters.trustedIssuer.consoleClientId : parameters.trustedIssuer.audience) + '", scopes: ["openid","profile","email","group","system","system:user","system:group","system:ou:view","system:userschema:view"]},' : ''}
            };

    - id: file-config
      forEach: ${configurations.toConfigFileList()}
      var: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${config.resourceName}
          namespace: ${metadata.namespace}
        data:
          ${config.name}: |
            ${config.value}

    # ConfigMap carrying the PEM bundle Thunder trusts when the trusted-issuer
    # JWKS URL uses TLS. Always rendered; data is empty when caBundle is blank,
    # and the mount below resolves to a zero-byte file that Go's cert loader
    # silently ignores.
    - id: trust-ca
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${metadata.componentName}-trust-ca"
          namespace: "${metadata.namespace}"
        data:
          ca.crt: |
            ${parameters.trustedIssuer.caBundle}

    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: "${metadata.componentName}"
          namespace: "${metadata.namespace}"
        spec:
          replicas: ${environmentConfigs.replicas}
          selector:
            matchLabels:
              app: "${metadata.componentName}"
          template:
            metadata:
              labels:
                app: "${metadata.componentName}"
            spec:
              # Note: pod-level securityContext is stripped by the OpenChoreo
              # renderer. The setup Job's fix-perms initContainer chowns the
              # PVC to 10001:10001 before this pod ever mounts it, so the
              # main thunder container (image runs as UID 10001) has rw.
              initContainers:
                - name: wait-for-setup
                  image: "${parameters.image}"
                  imagePullPolicy: "${parameters.runtime.imagePullPolicy}"
                  command: ['sh', '-c']
                  args:
                    - |
                      until [ -f /opt/thunderid/repository/database/.setup-complete ]; do
                        echo "Waiting for setup job to complete..."
                        sleep 2
                      done
                      echo "Setup complete, starting ThunderID..."
                  volumeMounts:
                    - name: sqlite-data
                      mountPath: /opt/thunderid/repository/database
              containers:
                - name: thunderid
                  image: "${parameters.image}"
                  imagePullPolicy: "${parameters.runtime.imagePullPolicy}"
                  command:
                    - /opt/thunderid/thunder
                  ports:
                    - containerPort: ${workload.endpoints["api"].port}
                  env: |
                    ${configurations.configs.envs.map(e, {"name": e.name, "value": e.value})}
                  resources:
                    requests:
                      cpu: "${environmentConfigs.resourceRequestsCpu}"
                      memory: "${environmentConfigs.resourceRequestsMemory}"
                    limits:
                      cpu: "${environmentConfigs.resourceLimitsCpu}"
                      memory: "${environmentConfigs.resourceLimitsMemory}"
                  volumeMounts: |
                    ${[
                      {"name": "thunder-config", "mountPath": "/opt/thunder/repository/conf/deployment.yaml", "subPath": "deployment.yaml"},
                      {"name": "gate-config", "mountPath": "/opt/thunder/apps/gate/config.js", "subPath": "config.js"},
                      {"name": "console-config", "mountPath": "/opt/thunder/apps/console/config.js", "subPath": "config.js"},
                      {"name": "sqlite-data", "mountPath": "/opt/thunder/repository/database"},
                      {"name": "trust-ca", "mountPath": "/etc/ssl/certs/thunder-cp-ca.crt", "subPath": "ca.crt"}
                    ] + configurations.toContainerVolumeMounts().map(m, {"name": m.name, "mountPath": m.mountPath, "subPath": m.subPath})}
              volumes: |
                ${[
                  {"name": "thunderid-config", "configMap": {"name": metadata.componentName + "-config"}},
                  {"name": "gate-config", "configMap": {"name": metadata.componentName + "-gate-config"}},
                  {"name": "console-config", "configMap": {"name": metadata.componentName + "-console-config"}},
                  {"name": "sqlite-data", "persistentVolumeClaim": {"claimName": metadata.componentName + "-sqlite"}},
                  {"name": "trust-ca", "configMap": {"name": metadata.componentName + "-trust-ca"}}
                ] + configurations.toVolumes().map(v, {"name": v.name, "configMap": {"name": v.configMap.name}})}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: "${metadata.componentName}"
          namespace: "${metadata.namespace}"
        spec:
          type: ClusterIP
          selector:
            app: "${metadata.componentName}"
          ports:
            - port: ${workload.endpoints["api"].port}
              targetPort: ${workload.endpoints["api"].port}
              protocol: TCP
              name: http

    - id: httproute-external
      includeWhen: "${environmentConfigs.endpointVisibility == 'external'}"
      forEach: '${workload.endpoints.transformMap(name, ep, ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint.key)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          # When publicHost is set on the ReleaseBinding, use it verbatim so the
          # route matches what the tenant's own server.public_url advertises.
          # Otherwise fall back to the deterministic gateway-derived hostname.
          hostnames: |
            ${environmentConfigs.publicHost != ""
              ? [environmentConfigs.publicHost]
              : [gateway.ingress.external.?http, gateway.ingress.external.?https]
                  .filter(g, g.hasValue()).map(g, g.value().host).distinct()
                  .map(h, metadata.environmentName + "-" + metadata.componentName + "-" + metadata.componentNamespace + "." + h)}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: /
              filters:
                - type: URLRewrite
                  urlRewrite:
                    path:
                      type: ReplacePrefixMatch
                      replacePrefixMatch: '${endpoint.value.?basePath.orValue("/")}'
              backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}
