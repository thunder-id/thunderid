## Default values for the component sub-chart.
## Override via -f my-values.yaml or --set when installing directly.

# ── Core ──────────────────────────────────────────────────────────────────────
componentName: thunderid  # Base name for Component, Workload, Release, and data plane resources
pipelineName: identity-platform-pipeline  # DeploymentPipeline name (must exist or set pipeline.create: true)

# Container image configuration
image:
  repository: ghcr.io/thunder-id/thunderid  # ThunderID container image repository
  tag: "latest"                          # Use a specific version tag in production

# ThunderID server configuration
thunderid:
  server:
    port: 8090  # Port ThunderID listens on inside the container

# ── Database ──────────────────────────────────────────────────────────────────
# NOTE: Replace all placeholder values (e.g. <DB_HOST>) before deploying to production.
database:
  # Database engine.
  #   sqlite   — default; no external DB needed, data stored on a PVC.
  #   postgres — requires an accessible PostgreSQL instance; fill in the sections below.
  type: sqlite

  # ── SQLite (used when type: sqlite) ────────────────────────────────────────
  # Paths are relative to the ThunderID working directory inside the container.
  # A PVC of `storageSize` is always provisioned — used for SQLite data files and
  # the setup-job completion marker (.setup-complete) regardless of dbType.
  storageSize: "1Gi"  # PVC size
  config:
    sqlite:
      path: "repository/database/configdb.db"
  runtime:
    sqlite:
      path: "repository/database/runtimedb.db"
  user:
    sqlite:
      path: "repository/database/userdb.db"

  # ── PostgreSQL (used when type: postgres) — uncomment and fill in ──────────
  # config:
  #   postgres:
  #     hostname: <DB_HOST>
  #     port: 5432              # Rendered as an integer in the ConfigMap — do not quote
  #     name: configdb
  #     username: <DB_USERNAME>
  #     password: <DB_PASSWORD>
  #     sslmode: disable        # Use verify-full in production
  # runtime:
  #   postgres:
  #     hostname: <DB_HOST>
  #     port: 5432
  #     name: runtimedb
  #     username: <DB_USERNAME>
  #     password: <DB_PASSWORD>
  #     sslmode: disable
  # user:
  #   postgres:
  #     hostname: <DB_HOST>
  #     port: 5432
  #     name: userdb
  #     username: <DB_USERNAME>
  #     password: <DB_PASSWORD>
  #     sslmode: disable

# ── Application config ────────────────────────────────────────────────────────
jwt:
  validity: 3600      # JWT token validity in seconds (default: 1 hour)

oauth:
  refresh_token_validity: 86400  # Refresh token validity in seconds (default: 24 hours)

crypto:
  encryption:
    # WARNING: Replace with a 32-byte (64 hex character) key in production.
    key: "file://repository/resources/security/crypto.key"

cache:
  type: "memory"
  size: 10000   # Maximum number of cache entries
  ttl: 3600     # Cache entry TTL in seconds

cors:
  allowed_origins:
    - "https://gate.your-domain.com"
    - "https://localhost:3000"

# ── Gate and Console ──────────────────────────────────────────────────────────
# Gate is the ThunderID API gateway frontend.
gate:
  hostname: <GATE_HOSTNAME>   # Hostname used in the development ReleaseBinding environmentConfigs
  port: 19080
  scheme: http
  clientBase: "/gate"         # Gate frontend base path (frozen as a parameter at release time)

# Console is the ThunderID admin console frontend.
console:
  clientBase: "/console"
  clientId: "CONSOLE"
  scopes: '["openid", "profile", "email", "system"]'

# ThunderID's externally accessible URL — used in Gate and Console config.js and server config.
serverPublicUrl: "<SERVER_PUBLIC_URL>"

# Consent server integration (disabled by default).
consent:
  enabled: false
  baseUrl: "http://localhost:9090/api/v1"

# ── OpenChoreo platform ───────────────────────────────────────────────────────
# Name of the ClusterDataPlane resource to bind all environments to.
dataPlane:
  name: default

replicas: 1  # Pod replicas for the development environment

# Endpoint visibility: external → HTTPRoute created; internal → ClusterIP only.
endpointVisibility: "external"

# Whether the ComponentType was installed as cluster-scoped (ClusterComponentType).
# Must match the componentType.cluster value used when installing thunderid-oc-componenttype.
componentType:
  cluster: true

# ── Resource requests and limits ──────────────────────────────────────────────
resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# ── On-demand platform resources ─────────────────────────────────────────────
# Each flag controls whether the chart creates the corresponding resource.
# Set to false when the resource is managed externally (GitOps, another release,
# a platform team, etc.) and already exists in the cluster.

namespace:
  # Create the Kubernetes namespace used as the OpenChoreo control-plane namespace.
  # Set false if the namespace is pre-created or managed by an external tool.
  create: true

project:
  # Create the OpenChoreo Project resource.
  # Set false if this component shares a project that already exists.
  create: true
  name: identity-platform 
  description: "Identity platform powered by ThunderID"
  displayName: "Identity Platform"

pipeline:
  # Create the OpenChoreo DeploymentPipeline (development → staging → production).
  # Set false to reuse an existing pipeline (ensure pipelineName matches it).
  create: true

environments:
  # Each environment can be independently toggled.
  # Set create: false for any environment that is already provisioned or not needed.
  development:
    create: true
    description: "Development environment for identity platform"
    displayName: "Development"
  staging:
    create: true
    description: "Staging environment for identity platform"
    displayName: "Staging"
  production:
    create: true
    description: "Production environment for identity platform"
    displayName: "Production"

releaseBinding:
  # Set to false to skip automatic deployment to the development environment.
  # Useful when you want to deploy via the OC UI or promote manually from another environment.
  create: true

# ── Ingress / Gateway ─────────────────────────────────────────────────────────
# Used to construct the HTTPRoute hostname in the development ReleaseBinding.
# Hostname format: <environmentName>-<componentName>-<componentNamespace>.<domain>
ingress:
  domain: "openchoreoapis.localhost"
  port: 19080
  scheme: "http"
