# This workflow deploys the Documentation to GitHub Pages
# Uses:
#   OS: ubuntu-latest
#   Node.js: lts/*

name: 📚 Deploy Documentation

on:
  workflow_dispatch:
    inputs:
      use-artifact:
        description: 'Use pre-built docs from artifact (leave empty to build from source)'
        required: false
        type: string
        default: ''

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-docs:
    name: 📚 Deploy Docs to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔧 Resolve Site URLs
        id: resolve-urls
        env:
          REPO: ${{ github.repository }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          if [ "$REPO" = "thunder-id/thunderid" ]; then
            echo "site-url=" >> $GITHUB_OUTPUT
            echo "site-base-url=" >> $GITHUB_OUTPUT
          else
            echo "site-url=https://$REPO_OWNER.github.io" >> $GITHUB_OUTPUT
            echo "site-base-url=/$REPO_NAME/" >> $GITHUB_OUTPUT
          fi

      - name: 📚 Deploy Documentation
        uses: ./.github/actions/deploy-docs
        with:
          docs-artifact-name: ${{ inputs.use-artifact }}
          build-docs: ${{ inputs.use-artifact == '' && 'true' || 'false' }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          site-url: ${{ steps.resolve-urls.outputs.site-url }}
          site-base-url: ${{ steps.resolve-urls.outputs.site-base-url }}

      - name: 🎉 Deployment Complete
        run: |
          echo "# 📚 Documentation Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Documentation has been successfully deployed to GitHub Pages!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 View the documentation at: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> $GITHUB_STEP_SUMMARY
